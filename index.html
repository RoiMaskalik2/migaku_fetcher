<radical>moon</radical>, you hide two <radical>spoon</radical>s that give you a special <kanji>ability</kanji>. It's the ability to predict the future! The private moon spoons reflect the knowledge of time and space into your brain. Now that's a cool ability!","reading_mnemonic":"This <kanji>ability</kanji> to predict the future makes you famous and now everyone knows your name: <reading>No</reading>stradamus (のう)! And now that people know about your name and special ability, everyone will love you!","scene_hook":"In a private place on the moon, you hide two spoons that give you a special ability."}]},{"word":"漆原","reading":"うるしばら","meaning":null,"frequency_in_section":15,"kanji":[{"character":"漆","meaning":"Lacquer","reading":"しつ","meaning_mnemonic":"A <radical>tsunami</radical> hits a <radical>tree</radical> and your <radical>hat</radical> protects you from the <radical>water</radical>, but the hat itself is now covered in <kanji>lacquer</kanji>. You take it off and see that it's shiny and hard and protected.","reading_mnemonic":"You decide to scoop up the rest of the <kanji>lacquer</kanji> water and use it on your furniture to protect it from your <reading>shih tzu</reading> (しつ). Now it can't bite or scratch or ruin any of your things anymore!","scene_hook":"A tsunami hits a tree and your hat protects you from the water, but the hat itself is now covered in lacquer."},{"character":"原","meaning":"Original","reading":"げん","meaning_mnemonic":"The <radical>original</radical> radical and the <kanji>original</kanji> kanji are the same!\n\nThis kanji can also mean <kanji>field</kanji>, probably because that's what everything originally looked like before humans: just a bunch of fields.","reading_mnemonic":"The <kanji>original</kanji> Japanese hero was <reading>Gen</reading>ji (げん), from \"The Tale of Genji.\"","scene_hook":"The original radical and the original kanji are the same!"}]},{"word":"引っかかる","reading":"ひっかから","meaning":null,"frequency_in_section":15,"kanji":[{"character":"引","meaning":"Pull","reading":"ひ","meaning_mnemonic":"If you have a <radical>bow</radical> and a <radical>stick</radical> you need to <kanji>pull</kanji> the two back together to shoot it. If you can't pull it, you won't be shooting anything.","reading_mnemonic":"When you <kanji>pull</kanji> the bow back, your body strains and you feel an immense <reading>he</reading>at (ひ) rise inside of you. You keep pulling and the heat grows hotter and hotter.","scene_hook":"If you have a bow and a stick you need to pull the two back together to shoot it."}]},{"word":"戦う","reading":"たたかう","meaning":"To Fight","frequency_in_section":14,"kanji":[{"character":"戦","meaning":"War","reading":"せん","meaning_mnemonic":"A <radical>simple</radical> <radical>drunkard</radical> starting a <kanji>war</kanji>.","reading_mnemonic":"The simple drunkard started a <kanji>war</kanji> with the <reading>cen</reading>taurs (せん)! This is especially unfortunate, because the centaurs are really good at <kanji>battle</kanji>s because they're all automatically cavalry troops.","scene_hook":"A simple drunkard starting a war."}]},{"word":"少し","reading":"すこし","meaning":"A Little","frequency_in_section":14,"kanji":[{"character":"少","meaning":"Few","reading":"しょう","meaning_mnemonic":"You have a <radical>small</radical> <radical>slide</radical>. The thing about small slides is that <kanji>few</kanji> people can use them. Not everyone can fit their bum in a small slide — only a few small ones can make it down.","reading_mnemonic":"Another reason so <kanji>few</kanji> people can use it is that the <reading>Sho</reading>gun (しょう) is trying to go down the slide. We're talking a grown man who's way too big for this little slide, so a few people have to wait behind him — it's a slide traffic jam.","scene_hook":"You have a small slide."}]},{"word":"最後","reading":"さいご","meaning":"Last","frequency_in_section":14,"kanji":[{"character":"最","meaning":"Most","reading":"さい","meaning_mnemonic":"Let the <radical>sun</radical> shine into your <radical>ear</radical> while sitting on a <radical>stool</radical> and make sure <kanji>most</kanji> of it gets in your head. You want to fill your brain with the most sun anyone ever has.","reading_mnemonic":"<kanji>Most</kanji> of this is for your <reading>cy</reading>borg (さい). You're testing out a new way to power it, but if you can't get most of the sun into your ear, it won't be enough to power most of the cyborg's robo-parts.","scene_hook":"Let the sun shine into your ear while sitting on a stool and make sure most of it gets in your head."},{"character":"後","meaning":"Behind","reading":"ご","meaning_mnemonic":"If you <radical>loiter</radical> around to <radical>poop</radical> in <radical>winter</radical> you never know what could be happening <kanji>behind</kanji> you. <kanji>After</kanji> you're done you could turn <kanji>back</kanji> to see something really crazy that you missed because you took so long to poop in the cold.","reading_mnemonic":"You finally look <kanji>behind</kanji> you and see <reading>Go</reading>dzilla (ご) and a giant <reading>こう</reading>いち having a violent battle <kanji>back</kanji> there!","scene_hook":"If you loiter around to poop in winter you never know what could be happening behind you."}]},{"word":"一番","reading":"いちばん","meaning":"Number One","frequency_in_section":14,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live.","reading_mnemonic":"As you're sitting there next to <kanji>One</kanji>, holding him up, you start feeling a weird sensation all over your skin. From the wound comes a fine powder (obviously coming from the special bullet used to kill One) that causes the person it touches to get extremely <reading>itchy</reading> (いち).","scene_hook":"Lying on the ground is something that looks just like the ground, the number One."},{"character":"番","meaning":"Number In A Series","reading":"ばん","meaning_mnemonic":"You have to <radical>sickle</radical> the <radical>rice paddy</radical> today because it's your <kanji>turn</kanji>. This kanji also means <kanji>number in a series</kanji>, which is a lot like a turn. For example, you're number 3, so your turn will be number 3.","reading_mnemonic":"This <kanji>turn</kanji>-based rice sickle system is a contest as well! But, you are disappointed to find out that you have been <reading>ban</reading>ned (ばん) from the game because of the performance enhancing steroids you've been taking.","scene_hook":"You have to sickle the rice paddy today because it's your turn."}]},{"word":"普通","reading":"ふつう","meaning":"Normal","frequency_in_section":14,"kanji":[{"character":"普","meaning":"Normal","reading":"ふ","meaning_mnemonic":"You <radical>line up</radical> your body with the <radical>sun</radical> and everything looks <kanji>normal</kanji>.  The sun is lined up behind you, and you’re looking at all the things the sun has lit up. Everything looks normal.","reading_mnemonic":"Soon you see something that doesn’t look so <kanji>normal</kanji>. It’s a <reading>foo</reading>l (ふ), a jester. Dressed all in fool’s garb, this fool is dancing up towards you with a ridiculously unsettling grin on his face.","scene_hook":"You line up your body with the sun and everything looks normal."},{"character":"通","meaning":"Pass Through","reading":"つう","meaning_mnemonic":"There's a <radical>scooter</radical> with your <radical>mama</radical> carrying a <radical>task</radical> she needs to get done. You see her <kanji>pass through</kanji>, hurrying by to get that task done.","reading_mnemonic":"As you watch your mama <kanji>pass through</kanji> the house, she yells, \"YOU HAVE TO DO THIS TASK <reading>TOO</reading> (つう)!\" Too?! Oh no, now you have to do it too. Hurry up!","scene_hook":"There's a scooter with your mama carrying a task she needs to get done."}]},{"word":"通路","reading":"つうろ","meaning":null,"frequency_in_section":14,"kanji":[{"character":"通","meaning":"Pass Through","reading":"つう","meaning_mnemonic":"There's a <radical>scooter</radical> with your <radical>mama</radical> carrying a <radical>task</radical> she needs to get done. You see her <kanji>pass through</kanji>, hurrying by to get that task done.","reading_mnemonic":"As you watch your mama <kanji>pass through</kanji> the house, she yells, \"YOU HAVE TO DO THIS TASK <reading>TOO</reading> (つう)!\" Too?! Oh no, now you have to do it too. Hurry up!","scene_hook":"There's a scooter with your mama carrying a task she needs to get done."},{"character":"路","meaning":"Road","reading":"ろ","meaning_mnemonic":"If you've been walking all day, your <radical>foot</radical> is the last thing anyone would want to <radical>kiss</radical>, especially after wandering barefoot down a <kanji>road</kanji>. Your feet are filthy, sweaty, and stinky. Nobody is going to want to kiss those feet.","reading_mnemonic":"What was this person walking down again? Oh, that's right – a <reading>ro</reading>ad (ろ). They were walking down a filthy road.","scene_hook":"If you've been walking all day, your foot is the last thing anyone would want to kiss, especially after wandering barefoot down a road."}]},{"word":"寝る","reading":"ねる","meaning":"To Sleep","frequency_in_section":14,"kanji":[{"character":"寝","meaning":"Lie Down","reading":"ね","meaning_mnemonic":"From the <radical>roof</radical>, an <radical>icicle</radical> falls and hits <radical>Wolverine</radical> in the <radical>forehead</radical>, and he has to go over to the <radical>stool</radical> to <kanji>lie down</kanji>. And eventually he goes to <kanji>sleep</kanji>.","reading_mnemonic":"While wolverine <kanji>sleep</kanji>s, he makes a horrible <reading>neigh</reading>ing (ね) sound. It's like there's a giant horse in his mouth screaming to get out! NEIGH NEIGH!","scene_hook":"From the roof, an icicle falls and hits Wolverine in the forehead, and he has to go over to the stool to lie down."}]},{"word":"割れる","reading":"われ","meaning":"To Be Divided","frequency_in_section":14,"kanji":[{"character":"割","meaning":"Divide","reading":"わり","meaning_mnemonic":"A <radical>roof</radical> falls on you right between your <radical>rib cage</radical> and your <radical>mouth</radical>, slicing through you like a <radical>knife</radical> and managing to completely <kanji>divide</kanji> your body in two.","reading_mnemonic":"Who caused this roof to fall on you and <kanji>divide</kanji> your body in two? <reading>Wari</reading>o (わり) and his <reading>wa</reading>lrus (わ) sidekick. Wario's always been a bad guy, but since teaming up with his walrus buddy, he's gotten into some really twisted stuff… like using roofs to divide people in half, guillotine-style.","scene_hook":"A roof falls on you right between your rib cage and your mouth, slicing through you like a knife and managing to completely divide your body in two."}]},{"word":"同時に","reading":"どうじに","meaning":null,"frequency_in_section":14,"kanji":[{"character":"同","meaning":"Same","reading":"どう","meaning_mnemonic":"There's a <radical>mustache</radical> on the <radical>ground</radical>. Upon closer inspection, you see that the mustache on the ground is exactly the <kanji>same</kanji> as yours!","reading_mnemonic":"When we need to remember the reading どう, we use the word \"doughnut\".\n\nWhile this is already strange enough, you notice something stranger. Over a couple feet away is a <reading>dou</reading>ghnut (どう) who also has the <kanji>same</kanji> mustache as you (and the one that fell on the ground). The doughnut looks at you for a moment, then scampers off. This doughnut must be a mutant because normally doughnuts don't move.","scene_hook":"There's a mustache on the ground."},{"character":"時","meaning":"Time","reading":"じ","meaning_mnemonic":"The <radical>sun</radical> is used in a <radical>temple</radical> to tell <kanji>time</kanji>. They don't have clocks or cell phones, they have sun dials and good old fashioned \"looking up and seeing where the sun is right now.\"\n\nThis also can mean <kanji>o' clock</kanji>, as in \"five o'clock\" It's used when measuring what time it is in Japanese.","reading_mnemonic":"<kanji>Time</kanji> in a temple makes you think of <reading>Je</reading>sus (じ). Specifically, Jesus being able to perform time travel magic. He winks at you, goes back to the dinosaur ages, where he wrestles a T-rex. Then, he goes to WWII era and punches Hitler in the mouth.","scene_hook":"The sun is used in a temple to tell time."}]},{"word":"魔力","reading":"まりょく","meaning":null,"frequency_in_section":14,"kanji":[{"character":"魔","meaning":"Devil","reading":"ま","meaning_mnemonic":"Below the <radical>canopy</radical> of <radical>tree</radical>s is a <radical>demon</radical>. This demon is a <kanji>devil</kanji>.","reading_mnemonic":"Why is the <kanji>devil</kanji> under a canopy of trees? Because he's looking for his <reading>ma</reading>ma (ま).","scene_hook":"Below the canopy of trees is a demon."},{"character":"力","meaning":"Power","reading":"りょく","meaning_mnemonic":"The radical and the meaning of this kanji are the same. Both are <kanji>power</kanji>.","reading_mnemonic":"Who has the most power of anyone? It's the <kanji>Power</kanji> Rangers. They are battling their arch enemy <reading>Ricky</reading> (りき). They defeat him and <reading>lock</reading> (りょく) him up, so that he can't hurt anyone ever again.","scene_hook":"The radical and the meaning of this kanji are the same."}]},{"word":"最初","reading":"さいしょ","meaning":"The First","frequency_in_section":13,"kanji":[{"character":"最","meaning":"Most","reading":"さい","meaning_mnemonic":"Let the <radical>sun</radical> shine into your <radical>ear</radical> while sitting on a <radical>stool</radical> and make sure <kanji>most</kanji> of it gets in your head. You want to fill your brain with the most sun anyone ever has.","reading_mnemonic":"<kanji>Most</kanji> of this is for your <reading>cy</reading>borg (さい). You're testing out a new way to power it, but if you can't get most of the sun into your ear, it won't be enough to power most of the cyborg's robo-parts.","scene_hook":"Let the sun shine into your ear while sitting on a stool and make sure most of it gets in your head."},{"character":"初","meaning":"First","reading":"しょ","meaning_mnemonic":"You wear a special <radical>outfit</radical> and equip a <radical>sword</radical> whenever you do something for the <kanji>first</kanji> time. Doing something for the first time is always scary, but the right outfit and a sword at your side can give you the confidence and courage to overcome your jitters!","reading_mnemonic":"So, what is it you're doing for the <kanji>first</kanji> time? A fashion <reading>show</reading> (しょ). Your special outfit and sword aren't just to calm your nerves — they're also what you'll be showing off on the catwalk.","scene_hook":"You wear a special outfit and equip a sword whenever you do something for the first time."}]},{"word":"終わる","reading":"おわっ","meaning":"To End","frequency_in_section":13,"kanji":[{"character":"終","meaning":"End","reading":"しゅう","meaning_mnemonic":"The <radical>thread</radical> of <radical>winter</radical> and <radical>ice</radical> has brought this year to its <kanji>end</kanji>. Once you're in the long thread of winter and ice, you know the year will end soon.","reading_mnemonic":"Whenever winter <kanji>end</kanji>s, you take the thread covered in ice, and lace it into your <reading>shoe</reading> (しゅう). ","scene_hook":"The thread of winter and ice has brought this year to its end."}]},{"word":"兄弟","reading":"きょうだい","meaning":"Brothers","frequency_in_section":13,"kanji":[{"character":"兄","meaning":"Older Brother","reading":"きょう","meaning_mnemonic":"Who's someone who's just a <radical>mouth</radical> with <radical>legs</radical>? That's your know-it-all <kanji>older brother</kanji>, who won't shut up about anything.","reading_mnemonic":"You wish you could box your loud-mouth <kanji>older brother</kanji> up and send him far away to <reading>きょう</reading>と. きょうと is super far away from where you currently live, so just ship your older bro off so he can never bother you again.","scene_hook":"Who's someone who's just a mouth with legs?"},{"character":"弟","meaning":"Younger Brother","reading":"だい","meaning_mnemonic":"There is someone wearing <radical>horns</radical>, holding a <radical>bow</radical>, and going down a <radical>slide</radical> held up by a <radical>stick</radical>. What type of person do you imagine? I'd say someone who's an immature boy. That would be your <kanji>younger brother</kanji>.","reading_mnemonic":"Your <kanji>younger brother</kanji> loves playing dress-up so much that he's now started <reading>dye</reading>ing (だい) his hair all kinds of colors.","scene_hook":"There is someone wearing horns, holding a bow, and going down a slide held up by a stick."}]},{"word":"記憶","reading":"きおく","meaning":"Memory","frequency_in_section":13,"kanji":[{"character":"記","meaning":"Write Down","reading":"き","meaning_mnemonic":"What you <radical>say</radical> to <radical>oneself</radical> (yourself), you decide to <kanji>write down</kanji>. Whether this is in the form of a journal, diary, or blog, you feel the need to <kanji>record</kanji> these important thoughts in some way.","reading_mnemonic":"You need to protect what you <kanji>write down</kanji> and <kanji>record</kanji> for yourself with a <reading>key</reading> (き). These are your special thoughts and feelings, you don't want anyone else to see! Lock them away with a key!","scene_hook":"What you say to oneself (yourself), you decide to write down."},{"character":"憶","meaning":"Recollection","reading":"おく","meaning_mnemonic":"When your <radical>soul</radical> has an <radical>idea</radical> it's just a <kanji>recollection</kanji> of something you already know. Only your brain can have original ideas, so when your soul tries to come up with one, it's just a recollection of something you thought before now.","reading_mnemonic":"Your soul is sending you a <kanji>recollection</kanji> right now of... your past life as a farmer in <reading>Ok</reading>lahoma (おく). You see yourself farming and sweating and living a wonderful life. Hmm, maybe you should move to Oklahoma and live the simple life again.","scene_hook":"When your soul has an idea it's just a recollection of something you already know."}]},{"word":"始める","reading":"はじめる","meaning":"To Begin Something","frequency_in_section":13,"kanji":[{"character":"始","meaning":"Begin","reading":"し","meaning_mnemonic":"If you give a <radical>woman</radical> a <radical>machine</radical> she'll <kanji>begin</kanji> learning how to use it right away. She'll also get it to <kanji>start</kanji> before anyone else could. Women are really good at starting up new machines!","reading_mnemonic":"Actually, before she can <kanji>begin</kanji>, she has to shear the <reading>shee</reading>p (し) over there. The machine is going to turn wool into yarn, but you can't just start that process by shoving the sheep in there. You have to keep the little sheep safe!","scene_hook":"If you give a woman a machine she'll begin learning how to use it right away."}]},{"word":"種族","reading":"しゅぞく","meaning":null,"frequency_in_section":13,"kanji":[{"character":"種","meaning":"Kind","reading":"しゅ","meaning_mnemonic":"If a <radical>grain</radical> seems extra <radical>heavy</radical>, you know it's a different <kanji>kind</kanji>. Not all <kanji>type</kanji>s of grains are the same. So when you feel the heavy type, you know it isn't the same as the light kind.","reading_mnemonic":"You sort all of the different <kanji>kind</kanji>s and <kanji>type</kanji>s by putting them in the right <reading>chu</reading>tes (しゅ). They slide away, probably to some big type-based piles you can't see.","scene_hook":"If a grain seems extra heavy, you know it's a different kind."},{"character":"族","meaning":"Tribe","reading":"ぞく","meaning_mnemonic":"If someone is headed in your <radical>direction</radical> with a <radical>gun</radical>, nock an <radical>arrow</radical> in your bow and gather your <kanji>tribe</kanji> behind you because it’s about to get real! This man with a gun is headed your direction and he doesn’t even know what you and your tribe are gonna do to him. If he gets any closer, you’re likely to shoot that arrow right at him.","reading_mnemonic":"When he starts to get closer, you notice that this guy is a boso<reading>zoku</reading> (ぞく) bike gang member. Bosozoku means “running <kanji>tribe</kanji>” and this guy is running right at you. With a gun. So gather your own tribe behind you and prepare to defend yourself against this bosozoku member.","scene_hook":"If someone is headed in your direction with a gun, nock an arrow in your bow and gather your tribe behind you because it’s about to get real!"}]},{"word":"違い","reading":"ちがい","meaning":"Difference","frequency_in_section":13,"kanji":[{"character":"違","meaning":"Different","reading":"ちが","meaning_mnemonic":"You take your <radical>scooter</radical> to <radical>Korea</radical> and everything is <kanji>different</kanji>!","reading_mnemonic":"What's also <kanji>different</kanji> is that there's a weird tiger bouncing on its tail alongside you yelling that its name is <reading>Tigger</reading> (ちが). You didn't know Tigger was living in Korea these days. That's definitely different.","scene_hook":"You take your scooter to Korea and everything is different!"}]},{"word":"広い","reading":"ひろ","meaning":"Wide","frequency_in_section":13,"kanji":[{"character":"広","meaning":"Wide","reading":"ひろ","meaning_mnemonic":"The <radical>canopy</radical> you use in <radical>private</radical> is very <kanji>wide</kanji>.","reading_mnemonic":"You like being <kanji>wide</kanji> because it makes you feel like a different person. But not just any person, like a super <reading>hero</reading> (ひろ)!","scene_hook":"The canopy you use in private is very wide."}]},{"word":"聞く","reading":"きい","meaning":"To Hear","frequency_in_section":13,"kanji":[{"character":"聞","meaning":"Hear","reading":"ぶん","meaning_mnemonic":"If you go up to a <radical>gate</radical> and press your <radical>ear</radical> to it, you'll <kanji>hear</kanji> what's going on on the other side. The people on the other side will have no idea you can hear their conversation.","reading_mnemonic":"From the other side of the gate, you <kanji>hear</kanji> one of the people start to play a song on a recorder. You recognize the song as \"Hot Cross <reading>Bun</reading>s (ぶん).\" You haven't heard this song since grade school. \"Hot cross buns, hot cross buns~\"","scene_hook":"If you go up to a gate and press your ear to it, you'll hear what's going on on the other side."}]},{"word":"理由","reading":"りゆう","meaning":"Reason","frequency_in_section":13,"kanji":[{"character":"理","meaning":"Reason","reading":"り","meaning_mnemonic":"The <radical>king</radical>'s <radical>village</radical> is the <kanji>reason</kanji> he's king. Without the village there would be no reason to have a king in the first place.","reading_mnemonic":"You can't have <kanji>reason</kanji> without <reading>re</reading> (り).","scene_hook":"The king's village is the reason he's king."},{"character":"由","meaning":"Reason","reading":"ゆう","meaning_mnemonic":"A giant <radical>cross</radical> with a <radical>mouth</radical> stands above you. \"I am <kanji>reason</kanji>!\" it says to you. It is the Cross of Reason.","reading_mnemonic":"The <kanji>reason</kanji> that this Cross of Reason exists is to combat the <reading>you</reading>ths (ゆう) of the world, who just bring chaos into everything.","scene_hook":"A giant cross with a mouth stands above you."}]},{"word":"日本語","reading":"にほんご","meaning":"Japanese Language","frequency_in_section":13,"kanji":[{"character":"日","meaning":"Sun","reading":"にち","meaning_mnemonic":"The <radical>sun</radical> radical and <kanji>sun</kanji> kanji are the same, huzzah! Also, if you want to remember <kanji>day</kanji> as well, you can just think about how a day is the time it takes for the sun to cross the sky.","reading_mnemonic":"There are so many on'yomi for this kanji, but since this kanji is so important and common, you'll end up learning them all eventually whether you want to or not. For now, you're only going to have to learn one of the readings, and that one is にち. \n\nThe <kanji>sun</kanji> is so hot. It focused its rays to take out one man... and that man is Friedrich <reading>Nietzsche</reading> (にち), famous philosopher. He philosophized one too many things about the sun, so the sun decided it was time he paid.","scene_hook":"The sun radical and sun kanji are the same, huzzah!"},{"character":"本","meaning":"Book","reading":"ほん","meaning_mnemonic":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for <radical>book</radical> first! If you know the radical, you know this kanji means <kanji>book</kanji> as well.\n\nTake note that the second, third, and fourth meanings of this kanji are <kanji>origin</kanji>, <kanji>real</kanji>, and <kanji>main</kanji>. You can figure this out by thinking about how books mainly have their origins in real life.","reading_mnemonic":"<kanji>Book</kanji>s are one of the best ways to <reading>hone</reading> (ほん) your intellect, you know?","scene_hook":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for book first!"},{"character":"語","meaning":"Language","reading":"ご","meaning_mnemonic":"What you <radical>say</radical> between <radical>five</radical> <radical>mouth</radical>s is a <kanji>language</kanji>. As long as there are five different people saying these same words with their five mouths, it's considered its own language.","reading_mnemonic":"Another mouth joins in speaking the <kanji>language</kanji>, but it's green and scaled and... it's <reading>Go</reading>dzilla's (ご) mouth! Godzilla speaks this language too.","scene_hook":"What you say between five mouths is a language."}]},{"word":"巻く","reading":"まき","meaning":"To Roll","frequency_in_section":13,"kanji":[{"character":"巻","meaning":"Scroll","reading":"かん","meaning_mnemonic":"A <radical>gladiator</radical> only sees himself (<radical>oneself</radical>) on those big <kanji>scroll</kanji>s they advertise the fights with. Gladiators don't get mirrors and there are no cameras or videos yet. The scroll drawings are all they get of themselves.","reading_mnemonic":"When you look at the <kanji>scroll</kanji> you realize... you look just like Genghis <reading>Khan</reading> (かん)! You excitedly fist pump and start showing everyone how cool you are.","scene_hook":"A gladiator only sees himself (oneself) on those big scrolls they advertise the fights with."}]},{"word":"今回","reading":"こんかい","meaning":"This Time","frequency_in_section":13,"kanji":[{"character":"今","meaning":"Now","reading":"こん","meaning_mnemonic":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for <radical>now</radical> first! If you know the radical, you know this kanji means <kanji>now</kanji> as well.","reading_mnemonic":"Right <kanji>now</kanji> the <reading>con</reading>dors (こん) are in danger! Not next week, not next year, right now! Haven't you heard that deforestation and pollution are killing all of the condors?!","scene_hook":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for now first!"},{"character":"回","meaning":"Times","reading":"かい","meaning_mnemonic":"There's a <radical>mouth</radical> inside a <radical>mouth</radical>. But if you look even closer (not actually, but we're pretending), you can see another mouth inside that mouth... and another one inside of that one! It keeps going and going. Can you count the number of <kanji>times</kanji> there's a mouth inside a mouth? This kanji also means <kanji>revolve</kanji> too. Think of each \"time\" a thing happens, it loops back around and comes back to the beginning, revolving around again another time.","reading_mnemonic":"If you're having a hard time wrapping your head around the infinite number of <kanji>times</kanji> these mouths <kanji>revolve</kanji>, just picture yourself in a little <reading>kay</reading>ak (かい) going around and down through the mouths.","scene_hook":"There's a mouth inside a mouth."}]},{"word":"経験","reading":"けいけん","meaning":"Experience","frequency_in_section":13,"kanji":[{"character":"経","meaning":"Passage of Time","reading":"けい","meaning_mnemonic":"Tying a <radical>thread</radical> to a <radical>tombstone</radical> each year will help you <kanji>manage</kanji> the <kanji>passage of time</kanji>. That way you’ll know how many years you <kanji>pass through</kanji>, since you’ll have one thread for each year to count.","reading_mnemonic":"Dealing with the <kanji>passage of time</kanji> can be tough, so after you tie the thread to the tombstone, each year you eat a piece of <reading>ca</reading>ke (けい). You already eat cake to mark the passage of time on your birthday, so why not here as well?","scene_hook":"Tying a thread to a tombstone each year will help you manage the passage of time."},{"character":"験","meaning":"Test","reading":"けん","meaning_mnemonic":"A <radical>horse</radical> and a <radical>squid</radical> are going to <kanji>test</kanji> you. ","reading_mnemonic":"The <kanji>test</kanji> is being supervised by <reading>Ken</reading> (けん) the samurai.","scene_hook":"A horse and a squid are going to test you."}]},{"word":"生まれ変わる","reading":"うまれかわる","meaning":null,"frequency_in_section":12,"kanji":[{"character":"生","meaning":"Life","reading":"せい","meaning_mnemonic":"The <radical>life</radical> radical and the <kanji>life</kanji> kanji are the same, so hopefully you now just know them both.","reading_mnemonic":"You can save <kanji>life</kanji> or take it away with your new <reading>sa</reading>ber (せい). This is the saber you got from doing the correct thing (remember?), and now you need to figure out how to use it with this life. So what do you do?","scene_hook":"The life radical and the life kanji are the same, so hopefully you now just know them both."},{"character":"変","meaning":"Change","reading":"へん","meaning_mnemonic":"<radical>Again</radical> and again, <radical>winter</radical> <kanji>change</kanji>s you each year. ","reading_mnemonic":"You know what else <kanji>change</kanji>s each winter? <reading>Hen</reading>s (へん)! They're constantly laying eggs, which then (possibly) turn into new hens.","scene_hook":"Again and again, winter changes you each year."}]},{"word":"状態","reading":"じょうたい","meaning":"Condition","frequency_in_section":12,"kanji":[{"character":"状","meaning":"Condition","reading":"じょう","meaning_mnemonic":"See all those <radical>icicle</radical>s to the <radical>dog</radical>'s left? Good thing they all fell on his left, or he would've been in a terrible <kanji>condition</kanji>.","reading_mnemonic":"What saved the dog's <kanji>condition</kanji> was none other than <reading>Joe</reading> (じょう), the local farmhand. He constantly keeps an eye on the dog's condition, including any dangerously sharp icicles that could descend on him.","scene_hook":"See all those icicles to the dog's left?"},{"character":"態","meaning":"Appearance","reading":"たい","meaning_mnemonic":"You have a great <radical>ability</radical> because your <radical>heart</radical> gives you the <kanji>appearance</kanji> of a superhuman. Your heart is really strong and powerful, fuelling your body to the best of its ability. All this together gives you the appearance of someone in top condition.","reading_mnemonic":"While you may have the <kanji>appearance</kanji> of someone who is super strong, powerful, and awesome, you do have one shortcoming. You don’t know how to <reading>tie</reading> (たい) a tie. Actually, you don’t even know how to tie your shoes, let alone your tie. How embarrassing.","scene_hook":"You have a great ability because your heart gives you the appearance of a superhuman."}]},{"word":"覚える","reading":"おぼえ","meaning":"To Memorize","frequency_in_section":12,"kanji":[{"character":"覚","meaning":"Memorize","reading":"かく","meaning_mnemonic":"<radical>Viking</radical> <radical>see</radical>, Viking <kanji>memorize</kanji>. That’s how Vikings learn things. They see something, and then they memorize it. Quite simple, really.\n\nIt can also mean <kanji>awake</kanji>. Just remember that Vikings can't see if they aren't awake. There won't be anything to memorize if their eyes are still closed, after all!","reading_mnemonic":"Every morning, a <reading>cock</reading> (かく) crows and rouses the Vikings. Seeing this, one of the Vikings <kanji>memorize</kanji>s the cock crow so that he can mimic it and play pranks on his fellow Vikings.","scene_hook":"Viking see, Viking memorize."}]}];

  "jail":        "囚",
};

// ── Mnemonic renderer ─────────────────────────────────────
function renderMne(text) {
  if (!text) return '<em style="color:var(--muted)">No mnemonic available.</em>';
  const d = document.createElement('div');
  d.innerHTML = text;
  const wrap = (tag, cls) =>
    d.querySelectorAll(tag).forEach(el => {
      const s = document.createElement('span');
      s.className = cls;
      if (cls === 't-r') s.dataset.radical = el.textContent.trim().toLowerCase();
      s.textContent = el.textContent;
      el.replaceWith(s);
    });
  wrap('radical','t-r'); wrap('kanji','t-k');
  wrap('vocabulary','t-v'); wrap('reading','t-rd');
  // Strip remaining unknown tags
  d.querySelectorAll(':not(span)').forEach(el => el.replaceWith(...el.childNodes));
  return d.innerHTML;
}

// ── Build card HTML ───────────────────────────────────────
function buildCard(w, i) {
  const kanji = w.kanji || [];
  const chips = kanji.map(k =>
    `<span class="kanji-chip">${k.character}</span>`
  ).join('');

  const meaningPrev = w.meaning ? escHtml(w.meaning) : '<span style="color:var(--muted)">—</span>';

  let kanjiHTML = '';
  if (kanji.length) {
    kanjiHTML = `
      <div class="legend">
        <div class="legend-item"><span class="legend-dot ld-r"></span>Radical</div>
        <div class="legend-item"><span class="legend-dot ld-k"></span>Kanji</div>
        <div class="legend-item"><span class="legend-dot ld-v"></span>Vocabulary</div>
        <div class="legend-item"><span class="legend-dot ld-rd"></span>Reading</div>
      </div>
      <div class="kanji-section">
    `;

    for (const k of kanji) {
      const mm = renderMne(k.meaning_mnemonic);
      const rm = k.reading_mnemonic ? renderMne(k.reading_mnemonic) : null;
      const hook = k.scene_hook ? `<div class="scene-hook">💡 ${escHtml(k.scene_hook)}</div>` : '';

      kanjiHTML += `
        <div class="kanji-entry">
          <div class="kanji-glyph">${k.character}</div>
          <div class="kanji-info">
            <div class="kanji-head">
              <span class="kanji-meaning">${k.meaning ? escHtml(k.meaning) : '—'}</span>
              ${k.reading ? `<span class="kanji-reading">${escHtml(k.reading)}</span>` : ''}
            </div>
            <div class="mne-block">
              <div class="mne-label">Meaning mnemonic</div>
              ${hook}
              <div class="mne-text">${mm}</div>
            </div>
            ${rm ? `
            <div class="mne-block">
              <div class="mne-label">Reading mnemonic</div>
              <div class="mne-text">${rm}</div>
            </div>` : ''}
          </div>
        </div>
      `;
    }
    kanjiHTML += '</div>';
  }

  return `
    <div class="card" id="c${i}" data-i="${i}">
      <div class="card-row" onclick="toggle(${i})">
        <span class="rank">${i+1}</span>
        <div class="row-main">
          <span class="word-jp">${w.word}</span>
          <span class="meaning-preview">${meaningPrev}</span>
        </div>
        <div class="row-right">
          <div class="kanji-chips">${chips}</div>
          <span class="freq">${w.frequency_in_section}×</span>
          <button class="btn-learn${learned.has(w.word)?` done`:''}"
                  onclick="toggleLearn(event,${i})">${learned.has(w.word)?'Learned':'Learn'}</button>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="word-header">
          <div class="word-display">${w.word}</div>
          <div class="word-meta">
            <div class="meta-row">
              <span class="meta-label">Reading</span>
              <span class="meta-value reading">${w.reading ? escHtml(w.reading) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Meaning</span>
              <span class="meta-value">${w.meaning ? escHtml(w.meaning) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Freq</span>
              <span class="meta-value">${w.frequency_in_section}× in text</span>
            </div>
          </div>
        </div>
        ${kanjiHTML}
      </div>
    </div>
  `;
}

// ── State ─────────────────────────────────────────────────
let learned  = new Set(JSON.parse(localStorage.getItem('kl-v3') || '[]'));
let curFilter = 'all';

function save() { localStorage.setItem('kl-v3', JSON.stringify([...learned])); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toggle(i) {
  const card = document.getElementById('c'+i);
  card.classList.toggle('open');
}

function toggleLearn(ev, i) {
  ev.stopPropagation();
  const w   = WORDS[i];
  const btn = ev.currentTarget;
  if (learned.has(w.word)) {
    learned.delete(w.word);
    btn.textContent = 'Learn'; btn.classList.remove('done');
    document.getElementById('c'+i).classList.remove('learned');
  } else {
    learned.add(w.word);
    btn.textContent = 'Learned'; btn.classList.add('done');
    document.getElementById('c'+i).classList.add('learned');
  }
  save();
  updateProgress();
  if (curFilter === 'pending') applyFilter();
}

function updateProgress() {
  const done  = WORDS.filter(w => learned.has(w.word)).length;
  const total = WORDS.length;
  document.getElementById('progTxt').textContent = `${done} / ${total} learned`;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-all,.filter-pending').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  WORDS.forEach((w, i) => {
    const card = document.getElementById('c'+i);
    if (curFilter === 'pending') {
      card.classList.toggle('hidden', learned.has(w.word));
    } else {
      card.classList.remove('hidden');
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttCh  = document.getElementById('ttCh');
const ttNm  = document.getElementById('ttNm');
const ttDesc= document.getElementById('ttDesc');
let ttOn = false;

function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const w = tt.offsetWidth  || 90;
  const h = tt.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 14, vw - w - 6) + 'px';
  tt.style.top  = Math.max(y - h - 10, 6) + 'px';
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('.t-r'); if (!t) return;
  const name = t.dataset.radical || '';
  const char = RC[name] ?? null;
  const desc = RDESC[name] ?? null;

  if (char) {
    ttCh.textContent = char;
    ttCh.className   = 'tt-char';
    ttDesc.textContent = '';
  } else {
    ttCh.textContent = '？';
    ttCh.className   = 'tt-char none';
    ttDesc.textContent = desc || 'WK custom radical (no Unicode equivalent)';
  }
  ttNm.textContent = name;
  moveTT(e);
  tt.classList.add('vis');
  ttOn = true;
});

document.addEventListener('mousemove', e => {
  if (ttOn && e.target.closest('.t-r')) moveTT(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.t-r')) return;
  const rel = e.relatedTarget;
  if (rel && rel.closest('.t-r')) return;
  tt.classList.remove('vis');
  ttOn = false;
});

// ── Init ──────────────────────────────────────────────────
(function() {
  const list = document.getElementById('list');
  list.innerHTML = WORDS.map((w,i) => buildCard(w,i)).join('');

  const done  = WORDS.filter(w => learned.has(w.word)).length;
  WORDS.forEach((w,i) => {
    if (learned.has(w.word)) document.getElementById('c'+i).classList.add('learned');
  });

  document.getElementById('hSub').textContent = `${WORDS.length} words · sorted by frequency`;
  updateProgress();
})();
</script>
</body>
