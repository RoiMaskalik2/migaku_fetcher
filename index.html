<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語 Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ede8;
  --surface:  #ffffff;
  --raised:   #f8f7f5;
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.16);
  --text:     #18160f;
  --dim:      #6b6456;
  --muted:    #aaa090;
  --accent:   #5a4fcf;
  --accent-l: rgba(90,79,207,0.10);
  --wk-r:     #0093dd;
  --wk-k:     #f0a000;
  --wk-v:     #9820c8;
  --wk-rd:    #555;
  --green:    #1a9e6a;
  --rr:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.header-sub {
  font-size: 0.8rem;
  color: var(--dim);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-all, .filter-pending {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-all.active, .filter-pending.active,
.filter-all:hover, .filter-pending:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--dim);
  white-space: nowrap;
}

/* ── Word list ────────────────────────────────────────────── */
.list {
  max-width: 800px;
  margin: 18px auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
.card.learned { opacity: 0.45; }
.card.hidden  { display: none; }

/* Collapsed row */
.card-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
}
.card-row:hover { background: rgba(0,0,0,0.015); }

.rank {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.row-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.word-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.55rem;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
  color: var(--text);
}

.row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.kanji-chips {
  display: flex;
  gap: 3px;
}
.kanji-chip {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-l);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

.freq {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--raised);
  padding: 3px 8px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.btn-learn {
  padding: 5px 13px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-learn:hover { opacity: 0.82; }
.btn-learn.done  { background: var(--green); }

.chevron {
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Expanded body ────────────────────────────────────────── */
.card-body {
  display: none;
  padding: 0 18px 20px;
  border-top: 1px solid var(--border);
}
.card.open .card-body { display: block; }

/* Word header */
.word-header {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.word-display {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.4rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}

.word-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-bottom: 3px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  width: 50px;
  flex-shrink: 0;
}

.meta-value {
  font-size: 0.95rem;
  color: var(--text);
}

.meta-value.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--dim);
}

/* Kanji section */
.kanji-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.kanji-entry {
  display: flex;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.kanji-entry:last-child { border-bottom: none; }

.kanji-glyph {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  width: 76px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2px;
}

.kanji-info { flex: 1; min-width: 0; }

.kanji-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.kanji-meaning {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.kanji-reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--dim);
}

/* Mnemonic blocks */
.mne-block { margin-top: 8px; }
.mne-block + .mne-block { margin-top: 12px; }

.mne-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.mne-text {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}

/* ── WaniKani tag colours ─────────────────────────────────── */
.t-r  { color: var(--wk-r); font-weight: 600; cursor: help;
        border-bottom: 1px dashed var(--wk-r); }
.t-k  { color: var(--wk-k); font-weight: 600; }
.t-v  { color: var(--wk-v); font-weight: 600; }
.t-rd { color: var(--wk-rd); font-weight: 600;
        background: rgba(0,0,0,0.055); padding: 0 3px; border-radius: 3px; }

/* ── Radical tooltip ─────────────────────────────────────── */
.tt {
  position: fixed;
  pointer-events: none;
  background: #1c1a14;
  color: #f0ede8;
  border-radius: 9px;
  padding: 9px 13px 8px;
  display: none;
  z-index: 999;
  text-align: center;
  min-width: 68px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}
.tt.vis { display: flex; flex-direction: column; align-items: center; }

.tt-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
  color: var(--wk-r);
}
.tt-char.none { font-size: 0.85rem; color: #888; font-style: italic; }
.tt-name { font-size: 0.72rem; color: #bbb; margin-top: 2px; text-transform: lowercase; }
.tt-desc { font-size: 0.68rem; color: #888; margin-top: 1px; max-width: 110px; line-height: 1.3; }

/* ── Mnemonic legend ─────────────────────────────────────── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--raised);
  border-radius: 7px;
  margin-bottom: 14px;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; }
.ld-r  { background: var(--wk-r); }
.ld-k  { background: var(--wk-k); }
.ld-v  { background: var(--wk-v); }
.ld-rd { background: var(--wk-rd); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">日本語</span>
    <span class="header-sub" id="hSub">loading...</span>
  </div>
  <div class="header-right">
    <button class="filter-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pending" onclick="setFilter('pending',this)">To Learn</button>
    <span class="progress-text" id="progTxt"></span>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Radical tooltip -->
<div class="tt" id="tt">
  <span class="tt-char" id="ttCh"></span>
  <span class="tt-name" id="ttNm"></span>
  <span class="tt-desc" id="ttDesc"></span>
</div>

_mnemonic":"If you scrape a sharp <radical>stone</radical> against your <radical>skin</radical>, it will <kanji>tear</kanji>. The sharp stone tears your skin. It hurts!"}]},{"word":"探索","reading":"たんさく","meaning":"look for + search","frequency_in_section":8,"kanji":[{"character":"探","meaning":"Look For","reading":"たん","meaning_mnemonic":"Put your <radical>fingers</radical> to your <radical>forehead</radical> and stand your <radical>legs</radical> high up in a <radical>tree</radical> if you want to <kanji>look for</kanji> something. After all, shielding your eyes and getting up high is the best way to look for something, isn’t it?"},{"character":"索","meaning":"Search","reading":"さく","meaning_mnemonic":"There is a <radical>cross</radical> in your <radical>forehead</radical> with a <radical>thread</radical> attached to it, forcing you to <kanji>search</kanji> where it leads. You’re not sure how the cross got stuck in your forehead, but you are interested in seeing where this piece of thread leads. The search is on."}]},{"word":"血縁","reading":"けつえん","meaning":"blood relationship","frequency_in_section":8,"kanji":[{"character":"血","meaning":"Blood","reading":"けつ","meaning_mnemonic":"The <radical>blood</radical> radical and <kanji>blood</kanji> are the same in looks as well as in meaning."},{"character":"縁","meaning":"Edge","reading":"えん","meaning_mnemonic":"A <radical>thread</radical> is all that's keeping <radical>Wolverine</radical> and a <radical>pig</radical> from falling off the <kanji>edge</kanji> of a cliff. Wolverine and this pig had no <kanji>relation</kanji> prior to this, but after such a harrowing experience they're sure to form a deep bond. "}]},{"word":"禁忌","reading":"きんき","meaning":"Taboo","frequency_in_section":8,"kanji":[{"character":"禁","meaning":"Prohibit","reading":"きん","meaning_mnemonic":"Killing two <radical>tree</radical>s with a <radical>jackhammer</radical> is expressly <kanji>prohibit</kanji>ed. Don't get me wrong, you can rip up one tree with y acter":"見","meaning":"See","reading":"み","meaning_mnemonic":"The radical <radical>see</radical> and the kanji <kanji>see</kanji> are exactly the same!"}]},{"word":"流れ込む","reading":"ながれこん","meaning":"to flow into","frequency_in_section":3,"kanji":[{"character":"流","meaning":"Stream","reading":"りゅう","meaning_mnemonic":"A <radical>tsunami</radical> lifts all the <radical>trash</radical> out of the <radical>river</radical> and it <kanji>stream</kanji>s out onto the shores."},{"character":"込","meaning":"Into","reading":"こ","meaning_mnemonic":"If you get on your <radical>scooter</radical> and <radical>enter</radical> somewhere, you’re going <kanji>into</kanji> that place."}]},{"word":"大島","reading":"おおしま","meaning":"large island","frequency_in_section":3,"kanji":[{"character":"大","meaning":"Big","reading":"たい","meaning_mnemonic":"The <radical>big</radical> radical and the <kanji>big</kanji> kanji are exactly the same!"},{"character":"島","meaning":"Island","reading":"しま","meaning_mnemonic":"A <radical>bird</radical> sits upon a <radical>mountain</radical>. If you look at the radicals, the bird is quite large and the mountain quite small. Think of this in the mnemonic as well. The reason the mountain is small is because you can only see the top of it, sticking out of the water. On it is the bird. This small mountain with the bird on it is an <kanji>island</kanji>."}]},{"word":"眠気","reading":"ねむけ","meaning":"sleepiness","frequency_in_section":3,"kanji":[{"character":"眠","meaning":"Sleep","reading":"みん","meaning_mnemonic":"Closing each <radical>eye</radical> is something that the <radical>peoples</radical> do before they <kanji>sleep</kanji>. The peoples can’t sleep with both eyes open and they can’t sleep with just one eye open either. Peoples have to close each eye before they can sleep."},{"character":"気","meaning":"Energy","reading":"き","meaning_mnemonic":"These days <radical>energy</radical> is the greatest <radical>treasure</radical>. Not gold, money, or anything like that. Imagine finding some in a literal treasure chest. As soon as you open it, out bursts the <kanji>energy</kanji> in a kind of <kanji>spirit</kanji> ball."}]},{"word":"字路","reading":"じろ","meaning":"letter + road","frequency_in_section":3,"kanji":[{"character":"字","meaning":"Letter","reading":"じ","meaning_mnemonic":"The <radical>roof</radical> <radical>child</radical> stands upon the roof, holding up a single <kanji>letter</kanji>, a single <kanji>character</kanji>, a single <kanji>symbol</kanji> for the world to see."},{"character":"路","meaning":"Road","reading":"ろ","meaning_mnemonic":"If you've been walking all day, your <radical>foot</radical> is the last thing anyone would want to <radical>kiss</radical>, especially after wandering barefoot down a <kanji>road</kanji>. Your feet are filthy, sweaty, and stinky. Nobody is going to want to kiss those feet."}]},{"word":"ゴム状","reading":"ごむじょう","meaning":"elastomer","frequency_in_section":3,"kanji":[{"character":"状","meaning":"Condition","reading":"じょう","meaning_mnemonic":"See all those <radical>icicle</radical>s to the <radical>dog</radical>'s left? Good thing they all fell on his left, or he would've been in a terrible <kanji>condition</kanji>."}]},{"word":"大いに","reading":"おおいに","meaning":"very","frequency_in_section":3,"kanji":[{"character":"大","meaning":"Big","reading":"たい","meaning_mnemonic":"The <radical>big</radical> radical and the <kanji>big</kanji> kanji are exactly the same!"}]},{"word":"突撃","reading":"とつげき","meaning":"charge","frequency_in_section":3,"kanji":[{"character":"突","meaning":"Stab","reading":"とつ","meaning_mnemonic":"How do you make a <radical>hole</radical> nice and <radical>big</radical>? You gotta <kanji>stab</kanji> something in it. Just <kanji>thrust</kanji> it right in there. And make sure your movements are really <kanji>sudden</kanji>. Stabs and thrusts are more effective when they're sudden."},{"character":"撃","meaning":"Attack","reading":"げき","meaning_mnemonic":"If someone is coming toward you in a <radical>car</radical>, holding a <radical>weapon</radical> in their <radical>hand</radical>, they're going to <kanji>attack</kanji> you!"}]},{"word":"スキル的","reading":"すきるてき","meaning":"target","frequency_in_section":3,"kanji":[{"character":"的","meaning":"Target","reading":"てき","meaning_mnemonic":"A <radical>white</radical> guy jumps into a <radical>pool</radical> with a <kanji>target</kanji> painted on the bottom. He's aiming for the target, of course.\n\nThis kanji can also mean <kanji>-al</kanji>, as in the endings you get on some English adjectives. You know, like the pool is artifici-al. Or painting a target down there is not practic-al. That kind of -al."}]},{"word":"規格外","reading":"きかくがい","meaning":"nonstandard","frequency_in_section":3,"kanji":[{"character":"規","meaning":"Standard","reading":"き","meaning_mnemonic":"A man who is <radical>husband</radical> material can <radical>see</radical> a <kanji>standard</kanji> woman and think she’s the greatest thing ever. This man will make a great husband. Even though the lady is pretty standard, the husband treats her like she’s anything but."},{"character":"格","meaning":"Status","reading":"かく","meaning_mnemonic":"If a <radical>tree</radical> wants to <radical>kiss</radical> you, it's a sign of your <kanji>status</kanji>. Only someone of high status would be worthy enough to receive the gnarly but gentle kiss of a tree. Trees don't kiss just anyone, you know."},{"character":"外","meaning":"Outside","reading":"がい","meaning_mnemonic":"You're known to get the ailment <radical>evening</radical> <radical>toe</radical>, which is when your toe catches on fire after getting really, really hot (imagine this happening, ouch!). The only way to fix it is to cool your toe down, and the best way to do that is to go <kanji>outside</kanji>."}]},{"word":"感知","reading":"かんち","meaning":"perception","frequency_in_section":3,"kanji":[{"character":"感","meaning":"Feeling","reading":"かん","meaning_mnemonic":"When a <radical>canine</radical> puts its <radical>mouth</radical> on your <radical>heart</radical>, it's a pretty unforgettable <kanji>feeling</kanji>. "},{"character":"知","meaning":"Know","reading":"し","meaning_mnemonic":"You take an <radical>arrow</radical> to the <radical>mouth</radical> because you <kanji>know</kanji> too much. You know some very sensitive information, and someone's sent a bow-slinging enforcer to pin your big blabbermouth shut with arrows."}]},{"word":"闘法","reading":"","meaning":"fight + method","frequency_in_section":3,"kanji":[{"character":"闘","meaning":"Fight","reading":"とう","meaning_mnemonic":"At this <radical>gate</radical> you're trying to get some <radical>beans</radical> through, but your <radical>measurements</radical> were off, leading to a big <kanji>fight</kanji>. The bean authorities at the gate always want to fight about bean sizes, and now you have to fight to get those beans through."},{"character":"法","meaning":"Method","reading":"ほう","meaning_mnemonic":"<radical>Tsunami</radical>s in the <radical>past</radical> changed the <kanji>method</kanji>s and <kanji>law</kanji>s of today."}]},{"word":"視覚","reading":"しかく","meaning":"Sense Of Sight","frequency_in_section":3,"kanji":[{"character":"視","meaning":"Look At","reading":"し","meaning_mnemonic":"If you use your <radical>spirit</radical> to <radical>see</radical> something, it means you really <kanji>look at</kanji> it. You're not just seeing something passively with your eyes, you're actually looking at it with your whole spirit."},{"character":"覚","meaning":"Memorize","reading":"かく","meaning_mnemonic":"<radical>Viking</radical> <radical>see</radical>, Viking <kanji>memorize</kanji>. That’s how Vikings learn things. They see something, and then they memorize it. Quite simple, really.\n\nIt can also mean <kanji>awake</kanji>. Just remember that Vikings can't see if they aren't awake. There won't be anything to memorize if their eyes are still closed, after all!"}]},{"word":"補正","reading":"ほせい","meaning":"correction","frequency_in_section":3,"kanji":[{"character":"補","meaning":"Supplement","reading":"ほ","meaning_mnemonic":"The <radical>outfit</radical> you wear at your <radical>wedding</radical> is a <kanji>supplement</kanji> to the occasion. It's not as important as the vows or the kiss or anything, but a sharp tux and a gorgeous dress really supplement the festive mood and get everyone into \"wedding mode.\""},{"character":"正","meaning":"Correct","reading":"せい","meaning_mnemonic":"There is a line on the <radical>ground</radical> so you <radical>stop</radical>, making a giant sign pop up that says <kanji>CORRECT</kanji>! You obeyed the rules of the road and did the correct thing. Good on you."}]},{"word":"王子様","reading":"おうじさま","meaning":"prince","frequency_in_section":3,"kanji":[{"character":"王","meaning":"King","reading":"おう","meaning_mnemonic":"The <radical>king</radical> radical and the <kanji>king</kanji> kanji are the same!"},{"character":"子","meaning":"Child","reading":"し","meaning_mnemonic":"The <radical>child</radical> radical and the <kanji>child</kanji> kanji are exactly the same."},{"character":"様","meaning":"Formal Name Ender","reading":"さま","meaning_mnemonic":"By a <radical>tree</radical>, there's a <radical>sheep</radical> in the <radical>water</radical> with a <kanji>formal name ender</kanji>. That means everyone calls him Sheep-sama. No one calls him just \"Sheep,\" since he's kind of a big deal. He's actually like sheep royalty. When he's not in his castle, Sheep-sama enjoys playing in the water by the trees.\n\nThis can also mean <kanji>manner</kanji>, as in your manner of doing things. I guess someone with a formal name ender has a different manner of doing things."}]},{"word":"張り巡らせる","reading":"はりめぐらせる","meaning":"stretch + patrol","frequency_in_section":3,"kanji":[{"character":"張","meaning":"Stretch","reading":"ちょう","meaning_mnemonic":"You have a <radical>bow</radical> and you want to make it <radical>long</radical>. To do that, you'd naturally just <kanji>stretch</kanji> it."},{"character":"巡","meaning":"Patrol","reading":"じゅん","meaning_mnemonic":"You're using your <radical>scooter</radical> to navigate the <radical>flood</radical> because you're on <kanji>patrol</kanji>. You're one of the few people with a floating scooter, so it's your job to patrol the flood waters and look for people and animals that need help."}]},{"word":"積む","reading":"つま","meaning":"To Pile Something Up","frequency_in_section":3,"kanji":[{"character":"積","meaning":"Accumulate","reading":"せき","meaning_mnemonic":"<radical>Grain</radical>s get <radical>blame</radical>d for how much they <kanji>accumulate</kanji>. If the grains accumulate too much then they make more work for the farmers. If they accumulate too little, then they're starving the people. Ugh, grains just can't win with you people. They're blamed for everything."}]},{"word":"生息","reading":"せいそく","meaning":"inhabiting","frequency_in_section":3,"kanji":[{"character":"生","meaning":"Life","reading":"せい","meaning_mnemonic":"The <radical>life</radical> radical and the <kanji>life</kanji> kanji are the same, so hopefully you now just know them both."},{"character":"息","meaning":"Breath","reading":"そく","meaning_mnemonic":"Imagining one’s <radical>self</radical> without a <radical>heart</radical> can make it hard to draw <kanji>breath</kanji>. Without a heart, you’d have no blood pumping and you would start to die. This would make it increasingly harder to draw breath and get oxygen to stay alive."}]},{"word":"規模","reading":"きぼ","meaning":"Scale","frequency_in_section":3,"kanji":[{"character":"規","meaning":"Standard","reading":"き","meaning_mnemonic":"A man who is <radical>husband</radical> material can <radical>see</radical> a <kanji>standard</kanji> woman and think she’s the greatest thing ever. This man will make a great husband. Even though the lady is pretty standard, the husband treats her like she’s anything but."},{"character":"模","meaning":"Imitation","reading":"も","meaning_mnemonic":"A <radical>tree</radical> grows next to a <radical>greenhouse</radical> enclosing an <kanji>imitation</kanji> of the tree. The imitation greenhouse tree wants to be big and impressive like the tree outside, so it does its very best imitation of a real tree."}]},{"word":"段階","reading":"だんかい","meaning":"Stage","frequency_in_section":3,"kanji":[{"character":"段","meaning":"Steps","reading":"だん","meaning_mnemonic":"Cut this <radical>comb</radical> up with your <radical>weapon</radical> and turn it into the <kanji>steps</kanji> for some <kanji>stairs</kanji>."},{"character":"階","meaning":"Floor","reading":"かい","meaning_mnemonic":"Look at a <radical>building</radical> and <radical>compare</radical> the <radical>white</radical> parts. Each of those white parts is a <kanji>floor</kanji>. Multi-<kanji>story</kanji> buildings have tons of different floors that you can see from the outside."}]},{"word":"生産系","reading":"せいさんけい","meaning":"life + give birth + lineage","frequency_in_section":3,"kanji":[{"character":"生","meaning":"Life","reading":"せい","meaning_mnemonic":"The <radical>life</radical> radical and the <kanji>life</kanji> kanji are the same, so hopefully you now just know them both."},{"character":"産","meaning":"Give Birth","reading":"さん","meaning_mnemonic":"You <radical>stand</radical> on the <radical>Cliff</radical> of <radical>Life</radical> and <kanji>give birth</kanji> to a child. Oh no! You’re standing too close to the edge of the Cliff of Life! The baby falls off the cliff right after you give birth to it! In your despair, you throw all your <kanji>property</kanji> off the cliff too."},{"character":"系","meaning":"Lineage","reading":"けい","meaning_mnemonic":"The <radical>lineage</radical> radical and the <kanji>lineage</kanji> kanji are the same. Sometimes this kanji can also mean <kanji>system</kanji>. I guess a lineage is a kind of system, if you think about it."}]},{"word":"拡張","reading":"かくちょう","meaning":"Enlargement","frequency_in_section":3,"kanji":[{"character":"拡","meaning":"Extend","reading":"かく","meaning_mnemonic":"To make your <radical>fingers</radical> <radical>wide</radical> you <kanji>extend</kanji> them."},{"character":"張","meaning":"Stretch","reading":"ちょう","meaning_mnemonic":"You have a <radical>bow</radical> and you want to make it <radical>long</radical>. To do that, you'd naturally just <kanji>stretch</kanji> it."}]},{"word":"打ち込む","reading":"うちこん","meaning":"to drive in (a nail, stake, etc.)","frequency_in_section":3,"kanji":[{"character":"打","meaning":"Hit","reading":"だ","meaning_mnemonic":"Take your <radical>fingers</radical> to the <radical>street</radical> to <kanji>hit</kanji> some people! Street fingers are for curling into a fist. And that street fist wants to do some hitting!"},{"character":"込","meaning":"Into","reading":"こ","meaning_mnemonic":"If you get on your <radical>scooter</radical> and <radical>enter</radical> somewhere, you’re going <kanji>into</kanji> that place."}]},{"word":"疑惑","reading":"ぎわく","meaning":"doubt","frequency_in_section":3,"kanji":[{"character":"疑","meaning":"Doubt","reading":"ぎ","meaning_mnemonic":"You reach for a <radical>spoon</radical> to start eating, but your <radical>mama</radical> hands you an <radical>arrow</radical> instead and points towards the <radical>coat rack</radical>. Hm, that's not like her… Suddenly you're filled with <kanji>doubt</kanji>. Is this really your mama? You doubt it."},{"character":"惑","meaning":"Misguided","reading":"わく","meaning_mnemonic":"A <radical>drunkard</radical> who has his <radical>mouth</radical> on the <radical>ground</radical>, has a <radical>heart</radical> that is <kanji>misguided</kanji>. First of all, he tries to drink his problems away, but worse, he's so drunk he's trying to drink out of the ground."}]},{"word":"毒持ち","reading":"どくもち","meaning":"poison","frequency_in_section":3,"kanji":[{"character":"毒","meaning":"Poison","reading":"どく","meaning_mnemonic":"A <radical>rib cage</radical> hanging in the <radical>window</radical> of a shop indicates they sell <kanji>poison</kanji>. It's a universal sign, kinda like barber poles or those crosses on pharmacies."},{"character":"持","meaning":"Hold","reading":"じ","meaning_mnemonic":"You need to get your <radical>fingers</radical> around a <radical>temple</radical> if you want to <kanji>hold</kanji> it. Is the temple too big? Hold smaller temples you can buy in the temple's souvenir shop."}]},{"word":"引きちぎる","reading":"ひきちぎる","meaning":"to tear off","frequency_in_section":3,"kanji":[{"character":"引","meaning":"Pull","reading":"ひ","meaning_mnemonic":"If you have a <radical>bow</radical> and a <radical>stick</radical> you need to <kanji>pull</kanji> the two back together to shoot it. If you can't pull it, you won't be shooting anything."}]},{"word":"転載","reading":"てんさい","meaning":"reprinting","frequency_in_section":2,"kanji":[{"character":"転","meaning":"Revolve","reading":"てん","meaning_mnemonic":"If your <radical>car</radical> runs into a <radical>cloud</radical> you'll <kanji>revolve</kanji> around it instead of going straight through. Clouds are really hard to see through, so even though you're trying not to, you revolve in a tight circle up and around the cloud anyway."},{"character":"載","meaning":"Place On","reading":"さい","meaning_mnemonic":"You have a <radical>cross</radical> for a <radical>drunkard</radical>'s <radical>car</radical>, to <kanji>place on</kanji> its dashboard. Drunkards should not drive, and when you <kanji>put on</kanji> a cross, it prevents the car from starting!"}]},{"word":"巣立ち","reading":"すだち","meaning":"Leave The Nest","frequency_in_section":2,"kanji":[{"character":"巣","meaning":"Nest","reading":"す","meaning_mnemonic":"Birds use <radical>grass</radical> and <radical>fruit</radical> to make their <kanji>nest</kanji>s."},{"character":"立","meaning":"Stand","reading":"りつ","meaning_mnemonic":"The radical <radical>stand</radical> and the kanji <kanji>stand</kanji> are the same thing, so now you know them both."}]},{"word":"独白","reading":"どくはく","meaning":"monologue","frequency_in_section":2,"kanji":[{"character":"独","meaning":"Alone","reading":"どく","meaning_mnemonic":"There once was an <radical>animal</radical> with an <radical>insect</radical> friend who felt very <kanji>alone</kanji> unless he was around. An animal and an insect are an unlikely pairing, but these two get along delightfully and hate to be alone without the other."},{"character":"白","meaning":"White","reading":"はく","meaning_mnemonic":"The radical <radical>white</radical> and the kanji <kanji>white</kanji> are the same."}]},{"word":"直撃","reading":"ちょくげき","meaning":"direct hit","frequency_in_section":2,"kanji":[{"character":"直","meaning":"Straight","reading":"ちょく","meaning_mnemonic":"This kanji is the same as the radical — <kanji>straight</kanji> as straight can be.\n\nIt can also mean <kanji>direct</kanji>, because when you go straight to a place, you're going there directly. Depending on the context it can even mean <kanji>fix</kanji>, since fixing something means straightening out all the messed up crooked bits."},{"character":"撃","meaning":"Attack","reading":"げき","meaning_mnemonic":"If someone is coming toward you in a <radical>car</radical>, holding a <radical>weapon</radical> in their <radical>hand</radical>, they're going to <kanji>attack</kanji> you!"}]},{"word":"異なる","reading":"ことなる","meaning":"To Differ","frequency_in_section":2,"kanji":[{"character":"異","meaning":"Differ","reading":"い","meaning_mnemonic":"Put a <radical>rice paddy</radical> <radical>together</radical> with other paddies and you'll see how much they <kanji>differ</kanji>. When you're driving or taking a train through the countryside it may seem like all of those rice paddies blurring together are all the same, but they can differ quite a bit!"}]},{"word":"物質","reading":"ぶっしつ","meaning":"material","frequency_in_section":2,"kanji":[{"character":"物","meaning":"Thing","reading":"ぶつ","meaning_mnemonic":"A <radical>cow</radical> with // ── Mnemonic renderer ─────────────────────────────────────
function renderMne(text) {
  if (!text) return '<em style="color:var(--muted)">No mnemonic available.</em>';
  const d = document.createElement('div');
  d.innerHTML = text;
  const wrap = (tag, cls) =>
    d.querySelectorAll(tag).forEach(el => {
      const s = document.createElement('span');
      s.className = cls;
      if (cls === 't-r') s.dataset.radical = el.textContent.trim().toLowerCase();
      s.textContent = el.textContent;
      el.replaceWith(s);
    });
  wrap('radical','t-r'); wrap('kanji','t-k');
  wrap('vocabulary','t-v'); wrap('reading','t-rd');
  // Strip remaining unknown tags
  d.querySelectorAll(':not(span)').forEach(el => el.replaceWith(...el.childNodes));
  return d.innerHTML;
}

  const kanji = w.kanji || [];

  ).join('');

  if (kanji.length) {
    kanjiHTML = `
      <div class="legend">
        <div class="legend-item"><span class="legend-dot ld-r"></span>Radical</div>
        <div class="legend-item"><span class="legend-dot ld-k"></span>Kanji</div>
        <div class="legend-item"><span class="legend-dot ld-v"></span>Vocabulary</div>
        <div class="legend-item"><span class="legend-dot ld-rd"></span>Reading</div>
      </div>
      <div class="kanji-section">
    `;

    for (const k of kanji) {
      const mm = renderMne(k.meaning_mnemonic);

      kanjiHTML += `
        <div class="kanji-entry">
          <div class="kanji-glyph">${k.character}</div>
          <div class="kanji-info">
            <div class="kanji-head">
              <span class="kanji-meaning">${k.meaning ? escHtml(k.meaning) : '—'}</span>
              ${k.reading ? `<span class="kanji-reading">${escHtml(k.reading)}</span>` : ''}
            </div>
            <div class="mne-block">
              <div class="mne-label">Meaning mnemonic</div>
              <div class="mne-text">${mm}</div>
            </div>
          </div>
        </div>
      `;
    }
    kanjiHTML += '</div>';
  }

  return `
    <div class="card" id="c${i}" data-i="${i}">
      <div class="card-row" onclick="toggle(${i})">
        <span class="rank">${i+1}</span>
        <div class="row-main">
          <span class="word-jp">${w.word}</span>
        </div>
        <div class="row-right">
          <div class="kanji-chips">${chips}</div>
          <span class="freq">${w.frequency_in_section}×</span>
          <button class="btn-learn${learned.has(w.word)?` done`:''}"
                  onclick="toggleLearn(event,${i})">${learned.has(w.word)?'Learned':'Learn'}</button>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="word-header">
          <div class="word-display">${w.word}</div>
          <div class="word-meta">
            <div class="meta-row">
              <span class="meta-label">Reading</span>
              <span class="meta-value reading">${w.reading ? escHtml(w.reading) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Meaning</span>
              <span class="meta-value">${w.meaning ? escHtml(w.meaning) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Freq</span>
              <span class="meta-value">${w.frequency_in_section}× in text</span>
            </div>
          </div>
        </div>
        ${kanjiHTML}
      </div>
    </div>
  `;
}

// ── State ─────────────────────────────────────────────────
let learned  = new Set(JSON.parse(localStorage.getItem('kl-v3') || '[]'));
let curFilter = 'all';

function save() { localStorage.setItem('kl-v3', JSON.stringify([...learned])); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toggle(i) {
  const card = document.getElementById('c'+i);
  card.classList.toggle('open');
}

function toggleLearn(ev, i) {
  ev.stopPropagation();
  const w   = WORDS[i];
  const btn = ev.currentTarget;
  if (learned.has(w.word)) {
    learned.delete(w.word);
    btn.textContent = 'Learn'; btn.classList.remove('done');
    document.getElementById('c'+i).classList.remove('learned');
  } else {
    learned.add(w.word);
    btn.textContent = 'Learned'; btn.classList.add('done');
    document.getElementById('c'+i).classList.add('learned');
  }
  save();
  updateProgress();
  if (curFilter === 'pending') applyFilter();
}

function updateProgress() {
  const done  = WORDS.filter(w => learned.has(w.word)).length;
  const total = WORDS.length;
  document.getElementById('progTxt').textContent = `${done} / ${total} learned`;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-all,.filter-pending').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  WORDS.forEach((w, i) => {
    const card = document.getElementById('c'+i);
    if (curFilter === 'pending') {
      card.classList.toggle('hidden', learned.has(w.word));
    } else {
      card.classList.remove('hidden');
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttCh  = document.getElementById('ttCh');
const ttNm  = document.getElementById('ttNm');
const ttDesc= document.getElementById('ttDesc');
let ttOn = false;

function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const w = tt.offsetWidth  || 90;
  const h = tt.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 14, vw - w - 6) + 'px';
  tt.style.top  = Math.max(y - h - 10, 6) + 'px';
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('.t-r'); if (!t) return;
  const name = t.dataset.radical || '';
  const char = RC[name] ?? null;
  const desc = RDESC[name] ?? null;

  if (char) {
    ttCh.textContent = char;
    ttCh.className   = 'tt-char';
    ttDesc.textContent = '';
  } else {
    ttCh.textContent = '？';
    ttCh.className   = 'tt-char none';
    ttDesc.textContent = desc || 'WK custom radical (no Unicode equivalent)';
  }
  ttNm.textContent = name;
  moveTT(e);
  tt.classList.add('vis');
  ttOn = true;
});

document.addEventListener('mousemove', e => {
  if (ttOn && e.target.closest('.t-r')) moveTT(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.t-r')) return;
  const rel = e.relatedTarget;
  if (rel && rel.closest('.t-r')) return;
  tt.classList.remove('vis');
  ttOn = false;
});

// ── Init ──────────────────────────────────────────────────
(function() {
  const list = document.getElementById('list');
  list.innerHTML = WORDS.map((w,i) => buildCard(w,i)).join('');

  const done  = WORDS.filter(w => learned.has(w.word)).length;
  WORDS.forEach((w,i) => {
    if (learned.has(w.word)) document.getElementById('c'+i).classList.add('learned');
  });

  document.getElementById('hSub').textContent = `${WORDS.length} words · sorted by frequency`;
  updateProgress();
})();
</script>
</body>
