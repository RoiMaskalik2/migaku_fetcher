<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語 · Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ede8;
  --surface:  #ffffff;
  --raised:   #f8f7f5;
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.16);
  --text:     #18160f;
  --dim:      #6b6456;
  --muted:    #aaa090;
  --accent:   #5a4fcf;
  --accent-l: rgba(90,79,207,0.10);
  --wk-r:     #0093dd;
  --wk-k:     #f0a000;
  --wk-v:     #9820c8;
  --wk-rd:    #555;
  --green:    #1a9e6a;
  --rr:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.header-sub {
  font-size: 0.8rem;
  color: var(--dim);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-all, .filter-pending {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-all.active, .filter-pending.active,
.filter-all:hover, .filter-pending:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--dim);
  white-space: nowrap;
}

/* ── Word list ────────────────────────────────────────────── */
.list {
  max-width: 800px;
  margin: 18px auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
.card.learned { opacity: 0.45; }
.card.hidden  { display: none; }

/* Collapsed row */
.card-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
}
.card-row:hover { background: rgba(0,0,0,0.015); }

.rank {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.row-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.word-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.55rem;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
  color: var(--text);
}

.row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.kanji-chips {
  display: flex;
  gap: 3px;
}
.kanji-chip {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-l);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

.freq {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--raised);
  padding: 3px 8px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.btn-learn {
  padding: 5px 13px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-learn:hover { opacity: 0.82; }
.btn-learn.done  { background: var(--green); }

.chevron {
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Expanded body ────────────────────────────────────────── */
.card-body {
  display: none;
  padding: 0 18px 20px;
  border-top: 1px solid var(--border);
}
.card.open .card-body { display: block; }

/* Word header */
.word-header {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.word-display {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.4rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}

.word-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-bottom: 3px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  width: 50px;
  flex-shrink: 0;
}

.meta-value {
  font-size: 0.95rem;
  color: var(--text);
}

.meta-value.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--dim);
}

/* Kanji section */
.kanji-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.kanji-entry {
  display: flex;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.kanji-entry:last-child { border-bottom: none; }

.kanji-glyph {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  width: 76px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2px;
}

.kanji-info { flex: 1; min-width: 0; }

.kanji-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.kanji-meaning {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.kanji-reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--dim);
}

/* Mnemonic blocks */
.mne-block { margin-top: 8px; }
.mne-block + .mne-block { margin-top: 12px; }

.mne-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.mne-text {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}

/* ── WaniKani tag colours ─────────────────────────────────── */
.t-r  { color: var(--wk-r); font-weight: 600; cursor: help;
        border-bottom: 1px dashed var(--wk-r); }
.t-k  { color: var(--wk-k); font-weight: 600; }
.t-v  { color: var(--wk-v); font-weight: 600; }
.t-rd { color: var(--wk-rd); font-weight: 600;
        background: rgba(0,0,0,0.055); padding: 0 3px; border-radius: 3px; }

/* ── Radical tooltip ─────────────────────────────────────── */
.tt {
  position: fixed;
  pointer-events: none;
  background: #1c1a14;
  color: #f0ede8;
  border-radius: 9px;
  padding: 9px 13px 8px;
  display: none;
  z-index: 999;
  text-align: center;
  min-width: 68px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}
.tt.vis { display: flex; flex-direction: column; align-items: center; }

.tt-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
  color: var(--wk-r);
}
.tt-char.none { font-size: 0.85rem; color: #888; font-style: italic; }
.tt-name { font-size: 0.72rem; color: #bbb; margin-top: 2px; text-transform: lowercase; }
.tt-desc { font-size: 0.68rem; color: #888; margin-top: 1px; max-width: 110px; line-height: 1.3; }

/* ── Mnemonic legend ─────────────────────────────────────── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--raised);
  border-radius: 7px;
  margin-bottom: 14px;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; }
.ld-r  { background: var(--wk-r); }
.ld-k  { background: var(--wk-k); }
.ld-v  { background: var(--wk-v); }
.ld-rd { background: var(--wk-rd); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">日本語</span>
    <span class="header-sub" id="hSub">loading...</span>
  </div>
  <div class="header-right">
    <button class="filter-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pending" onclick="setFilter('pending',this)">To Learn</button>
    <span class="progress-text" id="progTxt"></span>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Radical tooltip -->
<div class="tt" id="tt">
  <span class="tt-char" id="ttCh"></span>
  <span class="tt-name" id="ttNm"></span>
  <span class="tt-desc" id="ttDesc"></span>
</div>

<script>
const WORDS = [{"word":"蛇","reading":"へび","meaning":"Snake","frequency_in_section":26,"kanji":[{"character":"蛇","meaning":"Snake","reading":"へび","meaning_mnemonic":"There is an <radical>insect</radical> on the <radical>roof</radical> in a <radical>spoon</radical>. It's there for the eating, and it's how you plan to attract a <kanji>snake</kanji> to your roof."}]},{"word":"蜂","reading":"はち","meaning":"Bee","frequency_in_section":16,"kanji":[{"character":"蜂","meaning":"Bee","reading":"はち","meaning_mnemonic":"On the <radical>insect</radical> <radical>signpost</radical> there is a single sign that says <kanji>bee</kanji>."}]},{"word":"熟練度","reading":"じゅくれんど","meaning":"deeply","frequency_in_section":13,"kanji":[{"character":"熟","meaning":"Ripen","reading":"じゅく","meaning_mnemonic":"If you <radical>receive</radical> something edible, arrange it in a <radical>circle</radical> and <radical>boil</radical> it. That way, it’ll <kanji>ripen</kanji> more quickly."},{"character":"練","meaning":"Practice","reading":"れん","meaning_mnemonic":"Pointing a <radical>thread</radical> to the <radical>east</radical> is what you <kanji>practice</kanji> every day. You're incredibly passionate about eastward thread-pointing, so you make sure to practice every day."},{"character":"度","meaning":"Degree","reading":"ど","meaning_mnemonic":"A <radical>yurt</radical>'s <radical>stool</radical> is always placed at certain <kanji>degree</kanji>s. The degrees change depending on specific <kanji>occurrence</kanji>s."}]},{"word":"操糸","reading":"みさおいと","meaning":null,"frequency_in_section":13,"kanji":[{"character":"操","meaning":"Manipulate","reading":"そう","meaning_mnemonic":"If someone has their <radical>fingers</radical> in your <radical>syrup</radical>, it's just another way of saying they <kanji>manipulate</kanji>d you. Cause only slimy people manipulate other people, so their fingers are slimy and sticky because they're covered in your syrup from mucking up your life.\n\nThis also has another meaning: <kanji>chastity</kanji>. Just imagine if someone wanted you to keep your chastity and they called s.e.x. when someone \"puts their fingers in your syrup.\" That would be pretty effective, right? Cause it's like, super gross."},{"character":"糸","meaning":"Thread","reading":"いと","meaning_mnemonic":"The <radical>thread</radical> radical and <kanji>thread</kanji> are the same in looks as well as in meaning."}]},{"word":"三匹","reading":"さんひき","meaning":"The Three Little Pigs (fable)","frequency_in_section":11,"kanji":[{"character":"三","meaning":"Three","reading":"さん","meaning_mnemonic":"This kanji is made up of the ground radical (which also happens to be the kanji for \"one\") and the radical for two. Combine <radical>one</radical> and <radical>two</radical> together and what do you get? <kanji>Three</kanji>!"},{"character":"匹","meaning":"Small Animal","reading":"ひき","meaning_mnemonic":"In the <radical>cage</radical> there are some <radical>legs</radical>. They are the legs attached to a <kanji>small animal</kanji>."}]},{"word":"人族","reading":"ひとぞく","meaning":null,"frequency_in_section":6,"kanji":[{"character":"人","meaning":"Person","reading":"にん","meaning_mnemonic":"Remember how the radical version of this kanji meant <radical>person</radical> because it looks like a person with their arms down and their legs spread out? Well this is a <kanji>person</kanji> too!"},{"character":"族","meaning":"Tribe","reading":"ぞく","meaning_mnemonic":"If someone is headed in your <radical>direction</radical> with a <radical>gun</radical>, nock an <radical>arrow</radical> in your bow and gather your <kanji>tribe</kanji> behind you because it’s about to get real! This man with a gun is headed your direction and he doesn’t even know what you and your tribe are gonna do to him. If he gets any closer, you’re likely to shoot that arrow right at him."}]},{"word":"平均","reading":"へいきん","meaning":"Average","frequency_in_section":5,"kanji":[{"character":"平","meaning":"Flat","reading":"へい","meaning_mnemonic":"If you want to <radical>dry</radical> your <radical>horns</radical> you need to lay them <kanji>flat</kanji>. If they aren't flat they'll always be a little damp somewhere and you'll never have a moment's <kanji>peace</kanji>."},{"character":"均","meaning":"Equal","reading":"きん","meaning_mnemonic":"You have some <radical>dirt</radical> next to a <radical>pool</radical> that has an extra <radical>drop</radical> of water in it because you need them to be <kanji>equal</kanji>. If there's too much dirt outside the pool and not enough water inside, it's gonna look weird. We can't have that."}]},{"word":"鑑定さん","reading":"かんていさん","meaning":"judgement","frequency_in_section":5,"kanji":[{"character":"鑑","meaning":"Model","reading":"かん","meaning_mnemonic":"See that <radical>gold</radical> man <radical>oversee</radical>ing everyone? He's a <kanji>model</kanji> human. His goldenness is a sign of how exemplary he is, and he's overseeing all of us flawed, regular folks to try to help us get on his level."},{"character":"定","meaning":"Determine","reading":"てい","meaning_mnemonic":"You build a <radical>roof</radical> over your <radical>coat rack</radical> because you <kanji>determine</kanji> that this is the best way to protect your coats from the elements."}]},{"word":"壁面","reading":"へきめん","meaning":"surface of a wall","frequency_in_section":5,"kanji":[{"character":"壁","meaning":"Wall","reading":"かべ","meaning_mnemonic":"There are <radical>hot peppers</radical> hiding in this <radical>dirt</radical>, so you build a <kanji>wall</kanji> to protect yourself from them. Have you ever stepped on a really hot pepper? The oils bleed into your shoes and burn your feet! You don't want anyone stepping on these so you wall them up."},{"character":"面","meaning":"Face","reading":"めん","meaning_mnemonic":"The <radical>face</radical> radical and the <kanji>face</kanji> kanji are the same! But this isn't just a face like the one you're looking at your computer/phone with. It's the <kanji>surface</kanji> kind of face too!"}]},{"word":"四分の","reading":"よんぶんの","meaning":"dividing into four","frequency_in_section":4,"kanji":[{"character":"四","meaning":"Four","reading":"し","meaning_mnemonic":"Imagine contorting yourself in such a way that your <radical>mouth</radical> now has your <radical>legs</radical> inside it. You've bent your body in all the wrong ways to achieve this. In fact, if you look at yourself, you look like a square now... You're just a person with <kanji>four</kanji> sides."},{"character":"分","meaning":"Part","reading":"ぶん","meaning_mnemonic":"The <radical>fins</radical> that fell onto my <radical>sword</radical> were sliced into many <kanji>part</kanji>s. Following this logic, this also means <kanji>minute</kanji>, which is part of an hour, and <kanji>divide</kanji>, which is the action of splitting something into many parts."}]},{"word":"巨体","reading":"きょたい","meaning":"huge body","frequency_in_section":4,"kanji":[{"character":"巨","meaning":"Giant","reading":"きょ","meaning_mnemonic":"The <radical>giant</radical> radical and the <kanji>giant</kanji> kanji are exactly the same! Massive!"},{"character":"体","meaning":"Body","reading":"たい","meaning_mnemonic":"The <radical>leader</radical> has a <radical>book</radical> all about the human <kanji>body</kanji>. Knowing about bodies is a privilege. One that only leaders get—it helps them control all their subjects, like you."}]},{"word":"仮","reading":"かり","meaning":"temporary","frequency_in_section":4,"kanji":[{"character":"仮","meaning":"Temporary","reading":"か","meaning_mnemonic":"Your <radical>leader</radical> is very <radical>anti</radical>-everything, making it all <kanji>temporary</kanji>. You get a new shirt, \"I'm anti shirts!\" she yells, and out it goes."}]},{"word":"膨れる","reading":"ふくれ","meaning":"To Swell","frequency_in_section":4,"kanji":[{"character":"膨","meaning":"Swell","reading":"ぼう","meaning_mnemonic":"Play your <radical>drum</radical> under the <radical>moon</radical> and your <radical>hair</radical> will <kanji>swell</kanji>! The more you play and the longer it's under the moon, the larger your hair will swell."}]},{"word":"予感","reading":"よかん","meaning":"presentiment","frequency_in_section":4,"kanji":[{"character":"予","meaning":"Beforehand","reading":"よ","meaning_mnemonic":"What does your <radical>mama</radical> tell you to do in the <radical>street</radical>? Look before you cross! You gotta do it <kanji>beforehand</kanji>, or it could be too late."},{"character":"感","meaning":"Feeling","reading":"かん","meaning_mnemonic":"When a <radical>canine</radical> puts its <radical>mouth</radical> on your <radical>heart</radical>, it's a pretty unforgettable <kanji>feeling</kanji>. "}]},{"word":"比較","reading":"ひかく","meaning":"Comparison","frequency_in_section":3,"kanji":[{"character":"比","meaning":"Compare","reading":"ひ","meaning_mnemonic":"The <radical>compare</radical> radical and the <kanji>compare</kanji> kanji are exactly the same! Huzzah!"},{"character":"較","meaning":"Contrast","reading":"かく","meaning_mnemonic":"Your new <radical>car</radical> doesn’t <radical>mix</radical> well with the other cars in your garage because its color is in stark <kanji>contrast</kanji> to the others. All of your other cars are pristine white in color, but this new car is a mix of lots of colors. It almost looks like a peacock or something it’s so colorful. Such a contrast."}]},{"word":"探知","reading":"たんち","meaning":"detection","frequency_in_section":3,"kanji":[{"character":"探","meaning":"Look For","reading":"たん","meaning_mnemonic":"Put your <radical>fingers</radical> to your <radical>forehead</radical> and stand your <radical>legs</radical> high up in a <radical>tree</radical> if you want to <kanji>look for</kanji> something. After all, shielding your eyes and getting up high is the best way to look for something, isn’t it?"},{"character":"知","meaning":"Know","reading":"し","meaning_mnemonic":"You take an <radical>arrow</radical> to the <radical>mouth</radical> because you <kanji>know</kanji> too much. You know some very sensitive information, and someone's sent a bow-slinging enforcer to pin your big blabbermouth shut with arrows."}]},{"word":"化物","reading":"ばけもの","meaning":"goblin","frequency_in_section":3,"kanji":[{"character":"化","meaning":"Change","reading":"か","meaning_mnemonic":"A <radical>leader</radical> with a <radical>spoon</radical> is a powerful thing. Even something as ordinary as a spoon can create great <kanji>change</kanji> in the world when given to the right person."},{"character":"物","meaning":"Thing","reading":"ぶつ","meaning_mnemonic":"A <radical>cow</radical> with <radical>wing</radical>s is flying in the air. What a strange <kanji>thing</kanji>! You've heard of flying pigs before, but cows? This is a new and strange thing indeed! Cows with wings! What a silly thing."}]},{"word":"落下","reading":"らっか","meaning":"fall","frequency_in_section":3,"kanji":[{"character":"落","meaning":"Fall","reading":"らく","meaning_mnemonic":"<radical>Flowers</radical> are knocked down by a violent <radical>tsunami</radical>, and swirl through the air to <radical>kiss</radical> your face gently as they <kanji>fall</kanji>. With the tsunami came a great windy storm that blew the flowers down. Amongst all the destruction, it's a pretty sight to watch them fall."},{"character":"下","meaning":"Below","reading":"か","meaning_mnemonic":"There's the <radical>ground</radical>, and there's a <radical>toe</radical> just <kanji>below</kanji> it. Yep, you know this means \"below\" because the ground has a toe below it in this kanji."}]},{"word":"縦穴","reading":"たてあな","meaning":"pit","frequency_in_section":3,"kanji":[{"character":"縦","meaning":"Vertical","reading":"たて","meaning_mnemonic":"When a <radical>thread</radical> <radical>loiter</radical>s on the <radical>horns</radical> of a <radical>coat rack</radical>, it's always <kanji>vertical</kanji>. By loitering I mean hanging around, and by horns I mean the little bits sticking off a coat rack that // ── Mnemonic renderer ─────────────────────────────────────
function renderMne(text) {
  if (!text) return '<em style="color:var(--muted)">No mnemonic available.</em>';
  const d = document.createElement('div');
  d.innerHTML = text;
  const wrap = (tag, cls) =>
    d.querySelectorAll(tag).forEach(el => {
      const s = document.createElement('span');
      s.className = cls;
      if (cls === 't-r') s.dataset.radical = el.textContent.trim().toLowerCase();
      s.textContent = el.textContent;
      el.replaceWith(s);
    });
  wrap('radical','t-r'); wrap('kanji','t-k');
  wrap('vocabulary','t-v'); wrap('reading','t-rd');
  // Strip remaining unknown tags
  d.querySelectorAll(':not(span)').forEach(el => el.replaceWith(...el.childNodes));
  return d.innerHTML;
}

// ── Build card HTML ───────────────────────────────────────
function buildCard(w, i) {
  const kanji = w.kanji || [];
  const chips = kanji.map(k =>
    `<span class="kanji-chip">${k.character}</span>`
  ).join('');

  let kanjiHTML = '';
  if (kanji.length) {
    kanjiHTML = `
      <div class="legend">
        <div class="legend-item"><span class="legend-dot ld-r"></span>Radical</div>
        <div class="legend-item"><span class="legend-dot ld-k"></span>Kanji</div>
        <div class="legend-item"><span class="legend-dot ld-v"></span>Vocabulary</div>
        <div class="legend-item"><span class="legend-dot ld-rd"></span>Reading</div>
      </div>
      <div class="kanji-section">
    `;

    for (const k of kanji) {
      const mm = renderMne(k.meaning_mnemonic);

      kanjiHTML += `
        <div class="kanji-entry">
          <div class="kanji-glyph">${k.character}</div>
          <div class="kanji-info">
            <div class="kanji-head">
              <span class="kanji-meaning">${k.meaning ? escHtml(k.meaning) : '—'}</span>
              ${k.reading ? `<span class="kanji-reading">${escHtml(k.reading)}</span>` : ''}
            </div>
            <div class="mne-block">
              <div class="mne-label">Meaning mnemonic</div>
              <div class="mne-text">${mm}</div>
            </div>
          </div>
        </div>
      `;
    }
    kanjiHTML += '</div>';
  }

  return `
    <div class="card" id="c${i}" data-i="${i}">
      <div class="card-row" onclick="toggle(${i})">
        <span class="rank">${i+1}</span>
        <div class="row-main">
          <span class="word-jp">${w.word}</span>
        </div>
        <div class="row-right">
          <div class="kanji-chips">${chips}</div>
          <span class="freq">${w.frequency_in_section}×</span>
          <button class="btn-learn${learned.has(w.word)?` done`:''}"
                  onclick="toggleLearn(event,${i})">${learned.has(w.word)?'Learned':'Learn'}</button>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="word-header">
          <div class="word-display">${w.word}</div>
          <div class="word-meta">
            <div class="meta-row">
              <span class="meta-label">Reading</span>
              <span class="meta-value reading">${w.reading ? escHtml(w.reading) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Meaning</span>
              <span class="meta-value">${w.meaning ? escHtml(w.meaning) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Freq</span>
              <span class="meta-value">${w.frequency_in_section}× in text</span>
            </div>
          </div>
        </div>
        ${kanjiHTML}
      </div>
    </div>
  `;
}

// ── State ─────────────────────────────────────────────────
let learned  = new Set(JSON.parse(localStorage.getItem('kl-v3') || '[]'));
let curFilter = 'all';

function save() { localStorage.setItem('kl-v3', JSON.stringify([...learned])); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toggle(i) {
  const card = document.getElementById('c'+i);
  card.classList.toggle('open');
}

function toggleLearn(ev, i) {
  ev.stopPropagation();
  const w   = WORDS[i];
  const btn = ev.currentTarget;
  if (learned.has(w.word)) {
    learned.delete(w.word);
    btn.textContent = 'Learn'; btn.classList.remove('done');
    document.getElementById('c'+i).classList.remove('learned');
  } else {
    learned.add(w.word);
    btn.textContent = 'Learned'; btn.classList.add('done');
    document.getElementById('c'+i).classList.add('learned');
  }
  save();
  updateProgress();
  if (curFilter === 'pending') applyFilter();
}

function updateProgress() {
  const done  = WORDS.filter(w => learned.has(w.word)).length;
  const total = WORDS.length;
  document.getElementById('progTxt').textContent = `${done} / ${total} learned`;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-all,.filter-pending').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  WORDS.forEach((w, i) => {
    const card = document.getElementById('c'+i);
    if (curFilter === 'pending') {
      card.classList.toggle('hidden', learned.has(w.word));
    } else {
      card.classList.remove('hidden');
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttCh  = document.getElementById('ttCh');
const ttNm  = document.getElementById('ttNm');
const ttDesc= document.getElementById('ttDesc');
let ttOn = false;

function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const w = tt.offsetWidth  || 90;
  const h = tt.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 14, vw - w - 6) + 'px';
  tt.style.top  = Math.max(y - h - 10, 6) + 'px';
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('.t-r'); if (!t) return;
  const name = t.dataset.radical || '';
  const char = RC[name] ?? null;
  const desc = RDESC[name] ?? null;

  if (char) {
    ttCh.textContent = char;
    ttCh.className   = 'tt-char';
    ttDesc.textContent = '';
  } else {
    ttCh.textContent = '？';
    ttCh.className   = 'tt-char none';
    ttDesc.textContent = desc || 'WK custom radical (no Unicode equivalent)';
  }
  ttNm.textContent = name;
  moveTT(e);
  tt.classList.add('vis');
  ttOn = true;
});

document.addEventListener('mousemove', e => {
  if (ttOn && e.target.closest('.t-r')) moveTT(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.t-r')) return;
  const rel = e.relatedTarget;
  if (rel && rel.closest('.t-r')) return;
  tt.classList.remove('vis');
  ttOn = false;
});

// ── Init ──────────────────────────────────────────────────
(function() {
  const list = document.getElementById('list');
  list.innerHTML = WORDS.map((w,i) => buildCard(w,i)).join('');

  const done  = WORDS.filter(w => learned.has(w.word)).length;
  WORDS.forEach((w,i) => {
    if (learned.has(w.word)) document.getElementById('c'+i).classList.add('learned');
  });

  document.getElementById('hSub').textContent = `${WORDS.length} words · sorted by frequency`;
  updateProgress();
})();
</script>
