<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語 Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ede8;
  --surface:  #ffffff;
  --raised:   #f8f7f5;
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.16);
  --text:     #18160f;
  --dim:      #6b6456;
  --muted:    #aaa090;
  --accent:   #5a4fcf;
  --accent-l: rgba(90,79,207,0.10);
  --wk-r:     #0093dd;
  --wk-k:     #f0a000;
  --wk-v:     #9820c8;
  --wk-rd:    #555;
  --green:    #1a9e6a;
  --rr:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.header-sub {
  font-size: 0.8rem;
  color: var(--dim);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-all, .filter-pending {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-all.active, .filter-pending.active,
.filter-all:hover, .filter-pending:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--dim);
  white-space: nowrap;
}

/* ── Word list ────────────────────────────────────────────── */
.list {
  max-width: 800px;
  margin: 18px auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
.card.learned { opacity: 0.45; }
.card.hidden  { display: none; }

/* Collapsed row */
.card-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
}
.card-row:hover { background: rgba(0,0,0,0.015); }

.rank {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.row-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.word-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.55rem;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
  color: var(--text);
}

.meaning-preview {
  font-size: 0.88rem;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.kanji-chips {
  display: flex;
  gap: 3px;
}
.kanji-chip {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-l);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

.freq {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--raised);
  padding: 3px 8px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.btn-learn {
  padding: 5px 13px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-learn:hover { opacity: 0.82; }
.btn-learn.done  { background: var(--green); }

.chevron {
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Expanded body ────────────────────────────────────────── */
.card-body {
  display: none;
  padding: 0 18px 20px;
  border-top: 1px solid var(--border);
}
.card.open .card-body { display: block; }

/* Word header */
.word-header {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.word-display {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.4rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}

.word-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-bottom: 3px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  width: 50px;
  flex-shrink: 0;
}

.meta-value {
  font-size: 0.95rem;
  color: var(--text);
}

.meta-value.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--dim);
}

/* Kanji section */
.kanji-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.kanji-entry {
  display: flex;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.kanji-entry:last-child { border-bottom: none; }

.kanji-glyph {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  width: 76px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2px;
}

.kanji-info { flex: 1; min-width: 0; }

.kanji-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.kanji-meaning {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.kanji-reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--dim);
}

/* Mnemonic blocks */
.mne-block { margin-top: 8px; }
.mne-block + .mne-block { margin-top: 12px; }

.mne-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

/* Scene hook — the visual summary */
.scene-hook {
  background: var(--accent-l);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  padding: 7px 11px;
  font-size: 0.85rem;
  font-style: italic;
  color: var(--dim);
  margin-bottom: 7px;
  line-height: 1.5;
}

.mne-text {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}

/* ── WaniKani tag colours ─────────────────────────────────── */
.t-r  { color: var(--wk-r); font-weight: 600; cursor: help;
        border-bottom: 1px dashed var(--wk-r); }
.t-k  { color: var(--wk-k); font-weight: 600; }
.t-v  { color: var(--wk-v); font-weight: 600; }
.t-rd { color: var(--wk-rd); font-weight: 600;
        background: rgba(0,0,0,0.055); padding: 0 3px; border-radius: 3px; }

/* ── Radical tooltip ─────────────────────────────────────── */
.tt {
  position: fixed;
  pointer-events: none;
  background: #1c1a14;
  color: #f0ede8;
  border-radius: 9px;
  padding: 9px 13px 8px;
  display: none;
  z-index: 999;
  text-align: center;
  min-width: 68px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}
.tt.vis { display: flex; flex-direction: column; align-items: center; }

.tt-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
  color: var(--wk-r);
}
.tt-char.none { font-size: 0.85rem; color: #888; font-style: italic; }
.tt-name { font-size: 0.72rem; color: #bbb; margin-top: 2px; text-transform: lowercase; }
.tt-desc { font-size: 0.68rem; color: #888; margin-top: 1px; max-width: 110px; line-height: 1.3; }

/* ── Mnemonic legend ─────────────────────────────────────── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--raised);
  border-radius: 7px;
  margin-bottom: 14px;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; }
.ld-r  { background: var(--wk-r); }
.ld-k  { background: var(--wk-k); }
.ld-v  { background: var(--wk-v); }
.ld-rd { background: var(--wk-rd); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">日本語</span>
    <span class="header-sub" id="hSub">loading...</span>
  </div>
  <div class="header-right">
    <button class="filter-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pending" onclick="setFilter('pending',this)">To Learn</button>
    <span class="progress-text" id="progTxt"></span>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Radical tooltip -->
<div class="tt" id="tt">
  <span class="tt-char" id="ttCh"></span>
  <span class="tt-name" id="ttNm"></span>
  <span class="tt-desc" id="ttDesc"></span>
</div>

<script>
const WORDS = [{"word":"思う","reading":"おもう","meaning":"To Think","frequency_in_section":106,"kanji":[{"character":"思","meaning":"Think","reading":"おも","meaning_mnemonic":"In a <radical>rice paddy</radical> you find a <radical>heart</radical> and it makes you <kanji>think</kanji>. You think a lot of <kanji>thought</kanji>s like, \"Whose heart is this? Why is it in a rice paddy? Why am I thinking out loud?\"","reading_mnemonic":"As you are <kanji>think</kanji>ing these <kanji>thought</kanji>s, you spot someone on the edge of the rice field. He really reminds you of someone. But who? That's it! He reminds you of that bartender on The Simpsons. What's his name? You think some more. What is it? <reading>Oh! Moe</reading> (おも) is his name!","scene_hook":"In a rice paddy you find a heart and it makes you think."}]},{"word":"上がる","reading":"あがり","meaning":"To Go Up","frequency_in_section":73,"kanji":[{"character":"上","meaning":"Above","reading":"じょう","meaning_mnemonic":"You find a <radical>toe</radical> on the <radical>ground</radical>. It's weird, because it's <kanji>above</kanji> the ground, not where toes belong.","reading_mnemonic":"Of course when you find a toe <kanji>above</kanji> the ground, you want to know where the toe came from. When you examine it, you see a name written on there. This toe belongs to the local clumsy farmhand, <reading>Joe</reading> (じょう).","scene_hook":"You find a toe on the ground."}]},{"word":"食べる","reading":"たべる","meaning":"To Eat","frequency_in_section":71,"kanji":[{"character":"食","meaning":"Eat","reading":"しょく","meaning_mnemonic":"The radical for <radical>eat</radical> and the kanji for <kanji>eat</kanji> are the same! Lucky you.","reading_mnemonic":"Thank goodness, you finally get to <kanji>eat</kanji> your <kanji>meal</kanji>. You're so hungry. Someone has been starving you and now they've finally given you food. Unfortunately, though, every time you take a bite, you get a <reading>shock</reading> (しょく) from somewhere.","scene_hook":"The radical for eat and the kanji for eat are the same!"}]},{"word":"言う","reading":"いっ","meaning":"To Say","frequency_in_section":70,"kanji":[{"character":"言","meaning":"Say","reading":"げん","meaning_mnemonic":"The <radical>say</radical> radical and the <kanji>say</kanji> kanji are the same!","reading_mnemonic":"If you aren't sure what to <kanji>say</kanji>, just think about <reading>Gen</reading>ji (げん) and ask yourself, \"What would Genji say?\"","scene_hook":"The say radical and the say kanji are the same!"}]},{"word":"考える","reading":"かんがえ","meaning":"To Think About","frequency_in_section":63,"kanji":[{"character":"考","meaning":"Think","reading":"こう","meaning_mnemonic":"In a <radical>coffin</radical> there's a <radical>beggar</radical>, doing his begging. But it doesn't work, nobody helps him. So, he just begins to <kanji>think</kanji>: Why am I in this situation? How could I have avoided it? How will I get out? Think, dammit, think!!","reading_mnemonic":"What does the beggar <kanji>think</kanji> of? A thought bubble appears near his head. In it is a picture of <reading>こう</reading>いち! He's thinking that if こういち were here, he'd save him. Oh, if only こういち could save us all!","scene_hook":"In a coffin there's a beggar, doing his begging."}]},{"word":"進化","reading":"しんか","meaning":"Evolution","frequency_in_section":57,"kanji":[{"character":"進","meaning":"Advance","reading":"しん","meaning_mnemonic":"You give your <radical>scooter</radical> to a <radical>turkey</radical> so that it can <kanji>advance</kanji>. The turkey was trying and failing to walk through a crowded street, so out of the goodness of your heart you gave it a scooter so it could advance.","reading_mnemonic":"You wave as the turkey <kanji>advance</kanji>s into the street at top speeds, collides with a car, and scrapes up its <reading>shin</reading>s (しん) almost immediately. Ah!","scene_hook":"You give your scooter to a turkey so that it can advance."},{"character":"化","meaning":"Change","reading":"か","meaning_mnemonic":"A <radical>leader</radical> with a <radical>spoon</radical> is a powerful thing. Even something as ordinary as a spoon can create great <kanji>change</kanji> in the world when given to the right person.","reading_mnemonic":"Then, this hero of yours takes their spoon and says some magic words into it, <kanji>changing</kanji> it into a <reading>car</reading> (か).","scene_hook":"A leader with a spoon is a powerful thing."}]},{"word":"見る","reading":"みる","meaning":"To See","frequency_in_section":55,"kanji":[{"character":"見","meaning":"See","reading":"み","meaning_mnemonic":"The radical <radical>see</radical> and the kanji <kanji>see</kanji> are exactly the same!","reading_mnemonic":"You see something. It's walking towards you, but you need to see better. When the person comes close, you realize \"That person is <reading>me</reading> (み)!\"","scene_hook":"The radical see and the kanji see are exactly the same!"}]},{"word":"世界","reading":"せかい","meaning":"The World","frequency_in_section":48,"kanji":[{"character":"世","meaning":"World","reading":"せい","meaning_mnemonic":"The <radical>world</radical> radical and the <kanji>world</kanji> kanji are the same, but there is another really important meaning you need to know: <kanji>generation</kanji>. \n\nThink of it this way: the world is just made up of many different generations of people, plants, and animals all getting along together.","reading_mnemonic":"It's your job to protect the <kanji>world</kanji> and every <kanji>generation</kanji> with your special <reading>sa</reading>ber (せい). It was given to you to uphold correctness, and you'll pass it on to the next generation when it's time. Then they'll watch out for the world when you're gone.","scene_hook":"The world radical and the world kanji are the same, but there is another really important meaning you need to know: generation."},{"character":"界","meaning":"World","reading":"かい","meaning_mnemonic":"Every <radical>rice paddy</radical> sits <radical>jammed in</radical> to the <kanji>world</kanji>.","reading_mnemonic":"To get around this <kanji>world</kanji> of rice paddies, you need to use a <reading>kay</reading>ak (かい).","scene_hook":"Every rice paddy sits jammed in to the world."}]},{"word":"出る","reading":"で","meaning":"To Exit","frequency_in_section":41,"kanji":[{"character":"出","meaning":"Exit","reading":"しゅつ","meaning_mnemonic":"There are two <radical>mountains</radical> in front of you... and probably a bunch more around you too. You are in a pass, and don't know how to get out. You are frantically looking for the <kanji>exit</kanji> before you freeze to death. The most important thing is to find the exit from this mountain range - your life depends on it.","reading_mnemonic":"As you're trying to <kanji>exit</kanji> this mountain range, you suddenly realize that someone is actually hunting you. What? Make sure to feel that sudden realization. It's crazy. Then, you find the exit and run towards it. Sadly, the hunter is waiting there, and he <reading>shoots you</reading> (しゅつ) through the leg, knocking you down.","scene_hook":"There are two mountains in front of you..."}]},{"word":"称号","reading":"しょうごう","meaning":"title","frequency_in_section":40,"kanji":[{"character":"称","meaning":"Title","reading":"しょう","meaning_mnemonic":"You take a <radical>grain</radical> and fashion it into a <radical>gun</radical> that is <radical>small</radical>, earning you the <kanji>title</kanji> of Small Arms Dealer (or SAD). Congratulations!","reading_mnemonic":"Word of your SAD <kanji>title</kanji> makes it all the way to the <reading>Shou</reading>gun (しょう) and he travels out to see you. When he arrives at your door, with all of his fancy escorts, he hands you a plaque with your title on it.","scene_hook":"You take a grain and fashion it into a gun that is small, earning you the title of Small Arms Dealer (or SAD)."},{"character":"号","meaning":"Number","reading":"ごう","meaning_mnemonic":"There's a <radical>mouth</radical> in the <radical>ground</radical> (in our case, it's a hatch), and inside is some kind of <radical>prison</radical> you can't quite get to. If you've ever seen Lost, this will sound familiar... on the hatch, there's actually a series of <kanji>number</kanji>s that you don't understand.","reading_mnemonic":"\"You want to know the <kanji>number</kanji> to the hatch?\" yells an old voice from inside. You say \"yes,\" and the voice gives you the numbers and you're in! You go down into the prison, where there is one prisoner: Grandpa <reading>ごう</reading>いち.\n\nNote: For the ごう reading mnemonics, we use Grandpa ごういち because こういち is used for the こう reading. So just remember that ごう comes from Koichi's grandpa ごういち.","scene_hook":"There's a mouth in the ground (in our case, it's a hatch), and inside is some kind of prison you can't quite get to."}]},{"word":"持つ","reading":"もっ","meaning":"To Hold Something","frequency_in_section":39,"kanji":[{"character":"持","meaning":"Hold","reading":"じ","meaning_mnemonic":"You need to get your <radical>fingers</radical> around a <radical>temple</radical> if you want to <kanji>hold</kanji> it. Is the temple too big? Hold smaller temples you can buy in the temple's souvenir shop.","reading_mnemonic":"As you <kanji>hold</kanji> the temple you hear a voice. You look down through your fingers and see a tiny <reading>Je</reading>sus (じ). He's smiling and gives you a thumbs up. Aww, thanks Jesus!","scene_hook":"You need to get your fingers around a temple if you want to hold it."}]},{"word":"魔法","reading":"まほう","meaning":"Magic","frequency_in_section":37,"kanji":[{"character":"魔","meaning":"Devil","reading":"ま","meaning_mnemonic":"Below the <radical>canopy</radical> of <radical>tree</radical>s is a <radical>demon</radical>. This demon is a <kanji>devil</kanji>.","reading_mnemonic":"Why is the <kanji>devil</kanji> under a canopy of trees? Because he's looking for his <reading>ma</reading>ma (ま).","scene_hook":"Below the canopy of trees is a demon."},{"character":"法","meaning":"Method","reading":"ほう","meaning_mnemonic":"<radical>Tsunami</radical>s in the <radical>past</radical> changed the <kanji>method</kanji>s and <kanji>law</kanji>s of today.","reading_mnemonic":"These <kanji>method</kanji>s and <kanji>law</kanji>s affected your own <reading>ho</reading>me (ほう) the most.","scene_hook":"Tsunamis in the past changed the methods and laws of today."}]},{"word":"名前","reading":"なまえ","meaning":"Name","frequency_in_section":37,"kanji":[{"character":"名","meaning":"Name","reading":"めい","meaning_mnemonic":"What is the <radical>evening</radical> <radical>mouth</radical>? Imagine a mouth that's up in the night sky. It's just there, talking, and only comes out at night. It only appears in one area of the world. (What area would you choose? Imagine yourself going to that place to see the \"evening mouth.\") And it appears only one month out of the year (more on this in a second). The \"evening mouth\" is the most famous thing in the _____ area (this is the area you choose). He's so <kanji>famous</kanji> that everybody knows his <kanji>name</kanji> (\"Evening Mouth\").","reading_mnemonic":"So, when does “Evening Mouth” appear? Turns out, “Evening Mouth” only comes out to talk in <reading>May</reading> (めい). You know this because it’s just starting to be spring, and when you look around (you’re watching “Evening Mouth” again) you see some spring flowers come up.","scene_hook":"What is the evening mouth?"},{"character":"前","meaning":"Front","reading":"ぜん","meaning_mnemonic":"There are some <radical>horns</radical> on the <radical>ground</radical> and a <radical>moon</radical> <radical>knife</radical> in <kanji>front</kanji> of you. When you try to move, they always rotate around with you, staying right in front. You can't escape these objects, for some reason.\n\nThis kanji means <kanji>before</kanji> too. Something that's in front of you is before you, after all.","reading_mnemonic":"You're going crazy with these things in <kanji>front</kanji> of you all the time. You finally seek the help of a <reading>Zen</reading> (ぜん) master, who tells you that meditation will save you from this curse. You try it out, and sure enough, the objects are gone! It worked!","scene_hook":"There are some horns on the ground and a moon knife in front of you."}]},{"word":"自分","reading":"じぶん","meaning":"Oneself","frequency_in_section":34,"kanji":[{"character":"自","meaning":"Self","reading":"じ","meaning_mnemonic":"The <radical>self</radical> radical and <kanji>self</kanji> are the same in looks as well as in meaning. ","reading_mnemonic":"When we need to remember じ we use the word \"Jesus.\"\n\nWho said you should always look at your <kanji>self</kanji> before tossing stones (or whatever) at others? <reading>Je</reading>sus (じ) did. So, make sure you look at your own self before being a jerk.","scene_hook":"The self radical and self are the same in looks as well as in meaning."},{"character":"分","meaning":"Part","reading":"ぶん","meaning_mnemonic":"The <radical>fins</radical> that fell onto my <radical>sword</radical> were sliced into many <kanji>part</kanji>s. Following this logic, this also means <kanji>minute</kanji>, which is part of an hour, and <kanji>divide</kanji>, which is the action of splitting something into many parts.","reading_mnemonic":"Now that the fins have been cut into neat <kanji>part</kanji>s, it's time to cut something else: <reading>bun</reading>s (ぶん).","scene_hook":"The fins that fell onto my sword were sliced into many parts."}]},{"word":"死ぬ","reading":"しぬ","meaning":"To Die","frequency_in_section":33,"kanji":[{"character":"死","meaning":"Death","reading":"し","meaning_mnemonic":"If the <radical>yakuza</radical> hands you a <radical>spoon</radical>, <kanji>death</kanji> is coming for you. It's the death spoon, a sign that the yakuza is coming to cause your death.","reading_mnemonic":"<kanji>Death</kanji> comes in the form of a <reading>shee</reading>p (し). The death sheep works for the yakuza, and kills anyone who has their spoon.","scene_hook":"If the yakuza hands you a spoon, death is coming for you."}]},{"word":"大きい","reading":"おおき","meaning":"Big","frequency_in_section":30,"kanji":[{"character":"大","meaning":"Big","reading":"たい","meaning_mnemonic":"The <radical>big</radical> radical and the <kanji>big</kanji> kanji are exactly the same!","reading_mnemonic":"There's this big guy (that's how you remember the radical, remember?), and he's wearing a huge <reading>Tie Dye</reading> (たい, だい) shirt. Because he's so huge, the tie dye shirt is also super huge. Everything about him is pretty big, but the tie dye stands out more than anything.","scene_hook":"The big radical and the big kanji are exactly the same!"}]},{"word":"人間","reading":"にんげん","meaning":"Human","frequency_in_section":30,"kanji":[{"character":"人","meaning":"Person","reading":"にん","meaning_mnemonic":"Remember how the radical version of this kanji meant <radical>person</radical> because it looks like a person with their arms down and their legs spread out? Well this is a <kanji>person</kanji> too!","reading_mnemonic":"Only one <kanji>person</kanji> at <reading>Nin</reading>tendo (にん) complained about the new <reading>jean</reading>s (じん) policy, and that person was you.","scene_hook":"Remember how the radical version of this kanji meant person because it looks like a person with their arms down and their legs spread out?"},{"character":"間","meaning":"Interval","reading":"かん","meaning_mnemonic":"There's a <radical>gate</radical> that the <radical>sun</radical> goes through at a regular <kanji>interval</kanji>. There is an <kanji>interval of time</kanji> in the sense that the sun goes through it at the same time every day. And there is an <kanji>interval of space</kanji> in the sense that it has to go through the space between the gate posts.","reading_mnemonic":"This method of keeping track of <kanji>interval</kanji>s of time was invented by the great Khans of Mongolia, specifically the most famous Khan of all: Genghis <reading>Khan</reading> (かん).\n\nGenghis Khan has had a huge impact on the world as we know it, especially the Eurasian continent of the past, so he's going to come up a lot from now on. Be prepared to get very familiar with him and his friends!","scene_hook":"There's a gate that the sun goes through at a regular interval."}]},{"word":"知る","reading":"しり","meaning":"To Know","frequency_in_section":30,"kanji":[{"character":"知","meaning":"Know","reading":"し","meaning_mnemonic":"You take an <radical>arrow</radical> to the <radical>mouth</radical> because you <kanji>know</kanji> too much. You know some very sensitive information, and someone's sent a bow-slinging enforcer to pin your big blabbermouth shut with arrows.","reading_mnemonic":"One of the things you <kanji>know</kanji> too much about is the <reading>shee</reading>p (し) plan for world domination! Yes, you know that sheep are in fact plotting to overthrow humanity and take over the world. ","scene_hook":"You take an arrow to the mouth because you know too much."}]},{"word":"痛い","reading":"いた","meaning":"Painful","frequency_in_section":29,"kanji":[{"character":"痛","meaning":"Pain","reading":"つう","meaning_mnemonic":"When your <radical>sick</radical> <radical>mama</radical> tries to do a <radical>task</radical> she's filled with <kanji>pain</kanji>!","reading_mnemonic":"Your mama's <kanji>pain</kanji> is <reading>too</reading> (つう) much for her to handle, so now you have to do all of her tasks too.","scene_hook":"When your sick mama tries to do a task she's filled with pain!"}]},{"word":"強い","reading":"つよ","meaning":"Strong","frequency_in_section":28,"kanji":[{"character":"強","meaning":"Strong","reading":"きょう","meaning_mnemonic":"You keep your <radical>bow</radical> <radical>private</radical> because it's made of <radical>insect</radical>s, meaning it's extremely <kanji>strong</kanji>. Insect bodies are really durable, so they make for super strong bows. That's why you have to keep this one private — it's simply too strong to let others get ahold of.","reading_mnemonic":"You had this <kanji>strong</kanji> bow made especially for you in <reading>きょう</reading>と. きょうと is famous for their strong bows, so if you ever want another, you know where to go.","scene_hook":"You keep your bow private because it's made of insects, meaning it's extremely strong."}]},{"word":"使う","reading":"つかっ","meaning":"To Use","frequency_in_section":27,"kanji":[{"character":"使","meaning":"Use","reading":"し","meaning_mnemonic":"A good <radical>leader</radical> can put the <radical>ground</radical>'s <radical>history</radical> to great <kanji>use</kanji>. You are a good leader. You have studied the ground and dirt of the earth your entire life. You know the history of the ground and you know how to use it to lead your people.","reading_mnemonic":"You <kanji>use</kanji> the ground to raise <reading>shee</reading>p (し). When you were down there sniffing around you realized that your people will flourish best if you use this land for grazing and raising sheep. ","scene_hook":"A good leader can put the ground's history to great use."}]},{"word":"見える","reading":"みえる","meaning":"To Be Visible","frequency_in_section":26,"kanji":[{"character":"見","meaning":"See","reading":"み","meaning_mnemonic":"The radical <radical>see</radical> and the kanji <kanji>see</kanji> are exactly the same!","reading_mnemonic":"You see something. It's walking towards you, but you need to see better. When the person comes close, you realize \"That person is <reading>me</reading> (み)!\"","scene_hook":"The radical see and the kanji see are exactly the same!"}]},{"word":"減る","reading":"へっ","meaning":"To Decrease","frequency_in_section":25,"kanji":[{"character":"減","meaning":"Decrease","reading":"げん","meaning_mnemonic":"Direct a <radical>tsunami</radical> into a <radical>canine</radical>'s <radical>mouth</radical> to <kanji>decrease</kanji> the amount of water that strikes the surrounding area.","reading_mnemonic":"After you and your canine <kanji>decrease</kanji> the tsunami's power, <reading>Gen</reading>ji (げん) comes out to thank you. That tsunami was on track to wash away Genji's house, which would have forced him to majorly decrease his frivolous playboy activities.","scene_hook":"Direct a tsunami into a canine's mouth to decrease the amount of water that strikes the surrounding area."}]},{"word":"以上","reading":"いじょう","meaning":"not less than ...","frequency_in_section":25,"kanji":[{"character":"以","meaning":"From","reading":"い","meaning_mnemonic":"The <radical>lion</radical> drops a <radical>drop</radical> of saliva onto this <radical>person</radical> <kanji>from</kanji> above. The person is in a much worse place <kanji>compared with</kanji> where they were before, <kanji>since</kanji> they only just recently fell into this pit.","reading_mnemonic":"<kanji>From</kanji> above there is a loud caw, and a giant <reading>ea</reading>gle (い) swoops down, forcing the lion to back off. The eagle grabs the person with its talons, bringing him into the air! But now he's... in the air being carried by a giant eagle, <kanji>compared with</kanji> where he was before, is this really better?!","scene_hook":"The lion drops a drop of saliva onto this person from above."},{"character":"上","meaning":"Above","reading":"じょう","meaning_mnemonic":"You find a <radical>toe</radical> on the <radical>ground</radical>. It's weird, because it's <kanji>above</kanji> the ground, not where toes belong.","reading_mnemonic":"Of course when you find a toe <kanji>above</kanji> the ground, you want to know where the toe came from. When you examine it, you see a name written on there. This toe belongs to the local clumsy farmhand, <reading>Joe</reading> (じょう).","scene_hook":"You find a toe on the ground."}]},{"word":"入る","reading":"はいっ","meaning":"To Enter","frequency_in_section":25,"kanji":[{"character":"入","meaning":"Enter","reading":"にゅう","meaning_mnemonic":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for <radical>enter</radical> first! If you know the radical, you know this kanji means <kanji>enter</kanji> as well.","reading_mnemonic":"Turns out, after you <kanji>enter</kanji> the tent (remember how the person in the radical is entering one?), you're given a <reading>new</reading> (にゅう) one! Why? No idea, but hey — it's new!","scene_hook":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for enter first!"}]},{"word":"結果","reading":"けっか","meaning":"Result","frequency_in_section":25,"kanji":[{"character":"結","meaning":"Bind","reading":"けつ","meaning_mnemonic":"You use a <radical>thread</radical> for <radical>good luck</radical> by <kanji>bind</kanji>ing two fingers together. You <kanji>tie</kanji> them nice and tight.","reading_mnemonic":"After you <kanji>bind</kanji> your fingers, the good luck starts pouring in. Literally. Suddenly <reading>ketsu</reading>p (けつ) starts pouring down from the heavens.","scene_hook":"You use a thread for good luck by binding two fingers together."},{"character":"果","meaning":"Fruit","reading":"か","meaning_mnemonic":"The <radical>fruit</radical> radical and the <kanji>fruit</kanji> kanji are exactly the same! Bodacious!","reading_mnemonic":"They sell <kanji>fruit</kanji> at the store, and you need to drive your <reading>ca</reading>r (か) to get there. A car is the fastest way to fruit.","scene_hook":"The fruit radical and the fruit kanji are exactly the same!"}]},{"word":"獲物","reading":"えもの","meaning":"Spoils","frequency_in_section":24,"kanji":[{"character":"獲","meaning":"Seize","reading":"かく","meaning_mnemonic":"You see an <radical>animal</radical> with some <radical>flowers</radical> and a <radical>turkey</radical> on a <radical>stool</radical> trying to <kanji>seize</kanji> them. The animal with the flowers is really tall so the turkey needs to stand on the stool in its attempt to seize the flowers.","reading_mnemonic":"The animal the turkey is trying to <kanji>seize</kanji> the flowers from is a <reading>cock</reading> (かく). The cock is a lot bigger than the turkey, so that’s why the turkey needs to stand on the stool in its attempt to seize those flowers.","scene_hook":"You see an animal with some flowers and a turkey on a stool trying to seize them."},{"character":"物","meaning":"Thing","reading":"ぶつ","meaning_mnemonic":"A <radical>cow</radical> with <radical>wing</radical>s is flying in the air. What a strange <kanji>thing</kanji>! You've heard of flying pigs before, but cows? This is a new and strange thing indeed! Cows with wings! What a silly thing.","reading_mnemonic":"You want a <kanji>thing</kanji> to help you fly with the cow so you put on your flying <reading>boots</reading> (ぶつ). Your flying boots are a pretty strange thing in themselves, but they're the only way you can keep up.","scene_hook":"A cow with wings is flying in the air."}]},{"word":"攻撃","reading":"こうげき","meaning":"Attack","frequency_in_section":24,"kanji":[{"character":"攻","meaning":"Aggression","reading":"こう","meaning_mnemonic":"<radical>Construction</radical> in the <radical>winter</radical> leads to <kanji>aggression</kanji>. Just think about it. It's cold, it's unpleasant, and you don't want to be there. So, you start to develop an aggression towards other people working with you on this winter project.","reading_mnemonic":"You're taking your <kanji>aggression</kanji> out on everyone. Then, the sexy construction worker from WaniKani Level 1, <reading>こう</reading>いち, walks by without a shirt on. You take out all your aggression on him.","scene_hook":"Construction in the winter leads to aggression."},{"character":"撃","meaning":"Attack","reading":"げき","meaning_mnemonic":"If someone is coming toward you in a <radical>car</radical>, holding a <radical>weapon</radical> in their <radical>hand</radical>, they're going to <kanji>attack</kanji> you!","reading_mnemonic":"Right before the <kanji>attack</kanji> begins, you recognize the hand holding this weapon and driving this car. It's <reading>Gecki</reading> (げき), your long-lost gecko who you may or may not have let fly off into a really fierce tsunami. Oops. I think he may be here attacking you out of revenge.","scene_hook":"If someone is coming toward you in a car, holding a weapon in their hand, they're going to attack you!"}]},{"word":"弱い","reading":"よわい","meaning":"Weak","frequency_in_section":24,"kanji":[{"character":"弱","meaning":"Weak","reading":"じゃく","meaning_mnemonic":"You have two <radical>bow</radical>s but they're both covered in <radical>ice</radical>. This has made them very <kanji>weak</kanji>.","reading_mnemonic":"You take the bows out to your car, which is stuck in a bunch of ice and snow, and try to use them as a kind of <kanji>weak</kanji> <reading>jack</reading> (じゃく). You know, to get your car unstuck. Unfortunately, your bows are too weak and brittle to use as jacks, and they just snap in half.","scene_hook":"You have two bows but they're both covered in ice."}]},{"word":"多分","reading":"たぶん","meaning":"Maybe","frequency_in_section":23,"kanji":[{"character":"多","meaning":"Many","reading":"た","meaning_mnemonic":"How many <radical>evenings</radical> are there? There are <kanji>many</kanji>.","reading_mnemonic":"To remember the reading た we use the word \"taco.\"\n\nLet's start with the kanji meaning: <kanji>many</kanji>. You go outside in the evening (because that's what this kanji is made up of) and are surprised when you're hit by <kanji>many</kanji> <reading>ta</reading>cos (た) flying from the sky. For some reason it's raining tacos, and of course you have no idea why.","scene_hook":"How many evenings are there?"},{"character":"分","meaning":"Part","reading":"ぶん","meaning_mnemonic":"The <radical>fins</radical> that fell onto my <radical>sword</radical> were sliced into many <kanji>part</kanji>s. Following this logic, this also means <kanji>minute</kanji>, which is part of an hour, and <kanji>divide</kanji>, which is the action of splitting something into many parts.","reading_mnemonic":"Now that the fins have been cut into neat <kanji>part</kanji>s, it's time to cut something else: <reading>bun</reading>s (ぶん).","scene_hook":"The fins that fell onto my sword were sliced into many parts."}]},{"word":"来る","reading":"き","meaning":"To Come","frequency_in_section":23,"kanji":[{"character":"来","meaning":"Come","reading":"らい","meaning_mnemonic":"The <radical>ground</radical> is scattered with <radical>rice</radical>, which will cause the Predator to <kanji>come</kanji> because he loves rice. Then once he's gone, the <kanji>next</kanji> Predator will come to eat.","reading_mnemonic":"When they come, though, they're all disappointed. It turns out it's <reading>rye</reading> (らい) grains, and rye grains taste terrible. Yuck.","scene_hook":"The ground is scattered with rice, which will cause the Predator to come because he loves rice."}]},{"word":"能力","reading":"のうりょく","meaning":"Ability","frequency_in_section":23,"kanji":[{"character":"能","meaning":"Ability","reading":"のう","meaning_mnemonic":"In a <radical>private</radical> place on the <radical>moon</radical>, you hide two <radical>spoon</radical>s that give you a special <kanji>ability</kanji>. It's the ability to predict the future! The private moon spoons reflect the knowledge of time and space into your brain. Now that's a cool ability!","reading_mnemonic":"This <kanji>ability</kanji> to predict the future makes you famous and now everyone knows your name: <reading>No</reading>stradamus (のう)! And now that people know about your name and special ability, everyone will love you!","scene_hook":"In a private place on the moon, you hide two spoons that give you a special ability."},{"character":"力","meaning":"Power","reading":"りょく","meaning_mnemonic":"The radical and the meaning of this kanji are the same. Both are <kanji>power</kanji>.","reading_mnemonic":"Who has the most power of anyone? It's the <kanji>Power</kanji> Rangers. They are battling their arch enemy <reading>Ricky</reading> (りき). They defeat him and <reading>lock</reading> (りょく) him up, so that he can't hurt anyone ever again.","scene_hook":"The radical and the meaning of this kanji are the same."}]},{"word":"不安","reading":"ふあん","meaning":"Uneasiness","frequency_in_section":23,"kanji":[{"character":"不","meaning":"Not","reading":"ふ","meaning_mnemonic":"The radical <radical>not</radical> and the kanji <kanji>not</kanji> are the same thing! That makes it easy... Not!","reading_mnemonic":"To remember ふ we'll use the word \"fool.\"\n\nThink of those jokes, where someone says something, then ends with a loud \"<kanji>NOTTTT</kanji>!\" Someone is doing that to you, over and over. What is that person? That person is a <reading>foo</reading>l (ふ).","scene_hook":"The radical not and the kanji not are the same thing!"},{"character":"安","meaning":"Relax","reading":"あん","meaning_mnemonic":"With a <radical>roof</radical> over her head, a <radical>woman</radical> can <kanji>relax</kanji>. She doesn't have to worry about rain or snow or finding a place to sleep. The roof also happened to be super <kanji>cheap</kanji>, so she can even relax about her finances.","reading_mnemonic":"As she <kanji>relax</kanji>es, she pulls out the <kanji>cheap</kanji>est, most relaxing food in the world: <reading>an</reading>chovies (あん).","scene_hook":"With a roof over her head, a woman can relax."}]},{"word":"出す","reading":"だす","meaning":"To Take Out","frequency_in_section":22,"kanji":[{"character":"出","meaning":"Exit","reading":"しゅつ","meaning_mnemonic":"There are two <radical>mountains</radical> in front of you... and probably a bunch more around you too. You are in a pass, and don't know how to get out. You are frantically looking for the <kanji>exit</kanji> before you freeze to death. The most important thing is to find the exit from this mountain range - your life depends on it.","reading_mnemonic":"As you're trying to <kanji>exit</kanji> this mountain range, you suddenly realize that someone is actually hunting you. What? Make sure to feel that sudden realization. It's crazy. Then, you find the exit and run towards it. Sadly, the hunter is waiting there, and he <reading>shoots you</reading> (しゅつ) through the leg, knocking you down.","scene_hook":"There are two mountains in front of you..."}]},{"word":"結構","reading":"けっこう","meaning":"Fine","frequency_in_section":22,"kanji":[{"character":"結","meaning":"Bind","reading":"けつ","meaning_mnemonic":"You use a <radical>thread</radical> for <radical>good luck</radical> by <kanji>bind</kanji>ing two fingers together. You <kanji>tie</kanji> them nice and tight.","reading_mnemonic":"After you <kanji>bind</kanji> your fingers, the good luck starts pouring in. Literally. Suddenly <reading>ketsu</reading>p (けつ) starts pouring down from the heavens.","scene_hook":"You use a thread for good luck by binding two fingers together."},{"character":"構","meaning":"Set Up","reading":"こう","meaning_mnemonic":"A <radical>tree</radical> is what a <radical>lifeguard</radical> uses to <kanji>set up</kanji> the station where he'll <kanji>care</kanji> for the people on the beach and in the water. Trees provide the shade lifeguards need to take care of half-drowned kids and grannies with sand stuck in their bathing suits. That's why they set up their care stations here.","reading_mnemonic":"You look closer at the <kanji>set up</kanji> and realize the lifeguard is <reading>こう</reading>いち! You know he teaches Japanese but... is こういち really qualified to care for people like this?","scene_hook":"A tree is what a lifeguard uses to set up the station where he'll care for the people on the beach and in the water."}]},{"word":"上げる","reading":"あげれ","meaning":"To Lift Something","frequency_in_section":22,"kanji":[{"character":"上","meaning":"Above","reading":"じょう","meaning_mnemonic":"You find a <radical>toe</radical> on the <radical>ground</radical>. It's weird, because it's <kanji>above</kanji> the ground, not where toes belong.","reading_mnemonic":"Of course when you find a toe <kanji>above</kanji> the ground, you want to know where the toe came from. When you examine it, you see a name written on there. This toe belongs to the local clumsy farmhand, <reading>Joe</reading> (じょう).","scene_hook":"You find a toe on the ground."}]},{"word":"相手","reading":"あいて","meaning":"Partner","frequency_in_section":22,"kanji":[{"character":"相","meaning":"Mutual","reading":"そう","meaning_mnemonic":"You need to look a <radical>tree</radical> in the <radical>eye</radical> to gain a <kanji>mutual</kanji> respect for each other. Stand up straight, look the tree directly in its eye(s). If it looks right back, you know things are mutual.","reading_mnemonic":"If your respect for the tree is <kanji>mutual</kanji> with the respect the tree feels for you, you'll be able to see the tree's <reading>sou</reading>l (そう). Right now its soul looks pretty sad, like it's trying to say, \"Why are your people cutting down all my friends? I thought we had a mutual understanding.\"","scene_hook":"You need to look a tree in the eye to gain a mutual respect for each other."},{"character":"手","meaning":"Hand","reading":"て","meaning_mnemonic":"The <radical>hand</radical> radical and the <kanji>hand</kanji> kanji are identical in looks and meaning! That should make things easy!","reading_mnemonic":"To remember the reading て we will use the word \"television.\" You have great hands. Go ahead and look at them. OH MY GOD. You have little <reading>te</reading>levisions (て) on your hands. They are playing the dumbest show you can think of, too, both hands at the same time.","scene_hook":"The hand radical and the hand kanji are identical in looks and meaning!"}]},{"word":"取得","reading":"しゅとく","meaning":"obtaining (a qualification, right, object, etc.)","frequency_in_section":21,"kanji":[{"character":"取","meaning":"Take","reading":"と","meaning_mnemonic":"There's an <radical>ear</radical> just sitting on a <radical>stool</radical>. Nobody's watching, so, you <kanji>take</kanji> it.","reading_mnemonic":"You're the kind of person who likes <vocabulary>to take</vocabulary> things. \"What things?\" you ask. Little <reading>toe</reading>s (と). Because that isn't creepy.","scene_hook":"There's an ear just sitting on a stool."},{"character":"得","meaning":"Acquire","reading":"とく","meaning_mnemonic":"If you <radical>loiter</radical> around the <radical>sun</radical> <radical>temple</radical>, it's likely you'll <kanji>acquire</kanji> something. When you loiter around like that it looks like you're waiting for something, so if someone puts something in your hands and you just happen to acquire it, well, no one can fault you for that.","reading_mnemonic":"You managed to <kanji>acquire</kanji> some tobacco, but just as you're about to leave <reading>Toku</reading>gawa (とく) Ieyasu comes marching up to you!! Or at least, his ghost does. He stares you dead in the eyes and says, \"I didn't found the shogunate for you to acquire illegal goods and kill your body toking on my soil.\"","scene_hook":"If you loiter around the sun temple, it's likely you'll acquire something."}]},{"word":"迷宮","reading":"めいきゅう","meaning":"labyrinth","frequency_in_section":21,"kanji":[{"character":"迷","meaning":"Astray","reading":"めい","meaning_mnemonic":"If you're riding your <radical>scooter</radical> through some <radical>rice</radical>, it's likely you've gone <kanji>astray</kanji>. Also you might be <kanji>lost</kanji>.","reading_mnemonic":"You got so <kanji>lost</kanji> and went so <kanji>astray</kanji> you ended up on the <reading>May</reading>flower  (めい), a ship that eventually took you across the Atlantic Ocean. Now you've really, really gone astray.","scene_hook":"If you're riding your scooter through some rice, it's likely you've gone astray."},{"character":"宮","meaning":"Shinto Shrine","reading":"みや","meaning_mnemonic":"It may just be a <radical>roof</radical> over a <radical>bathtub</radical>, but this here is actually a <kanji>Shinto shrine</kanji>.","reading_mnemonic":"What god does this <kanji>Shinto shrine</kanji> hold? You see that \"It's a-<reading>me-ya</reading> (みや)! (Mario!)\"","scene_hook":"It may just be a roof over a bathtub, but this here is actually a Shinto shrine."}]},{"word":"続ける","reading":"つづけ","meaning":"To Continue Something","frequency_in_section":21,"kanji":[{"character":"続","meaning":"Continue","reading":"ぞく","meaning_mnemonic":"You have to gather <radical>thread</radical> to <radical>sell</radical> if you want to <kanji>continue</kanji> living. You want to make a living, don't you? Make sure you continue to sell that thread every single day!","reading_mnemonic":"You have to <kanji>continue</kanji> to sell that thread because a Boso<reading>zoku</reading> (ぞく) bike gang is forcing you to do it. You see? If you want to continue to live, you have to appease this Bosozoku gang. You better keep selling!","scene_hook":"You have to gather thread to sell if you want to continue living."}]},{"word":"場所","reading":"ばしょ","meaning":"Place","frequency_in_section":20,"kanji":[{"character":"場","meaning":"Location","reading":"じょう","meaning_mnemonic":"<radical>Dirt</radical> makes it <radical>easy</radical> to identify your <kanji>location</kanji>. Even if you add an extra line to mark the ground, it's still easy. Keep that in mind and you can go from <kanji>place</kanji> to place.","reading_mnemonic":"Knowing your <kanji>location</kanji> from dirt is quite a feat! Who taught you that? It was <reading>Joe</reading> (じょう), the big local farmhand. Despite being a bit weird, he can identify any <kanji>place</kanji> just from its dirt!","scene_hook":"Dirt makes it easy to identify your location."},{"character":"所","meaning":"Place","reading":"しょ","meaning_mnemonic":"You're tearing this <radical>door</radical> down with an <radical>axe</radical>. You're absolutely crazy. \"I HATE THIS <kanji>PLACE</kanji>!!\" you keep yelling as you smash in the door.","reading_mnemonic":"You smash through the door and finally get inside the <kanji>place</kanji>, only to find some kind of <reading>sho</reading>w (しょ) going on. It's a circus show — elephants, tightrope walkers, bears on unicycles! The greatest show on earth, but why is it at this place?","scene_hook":"You're tearing this door down with an axe."}]},{"word":"感じ","reading":"かんじ","meaning":"Feeling","frequency_in_section":19,"kanji":[{"character":"感","meaning":"Feeling","reading":"かん","meaning_mnemonic":"When a <radical>canine</radical> puts its <radical>mouth</radical> on your <radical>heart</radical>, it's a pretty unforgettable <kanji>feeling</kanji>. ","reading_mnemonic":"Overall, though, it's a good <kanji>feeling</kanji> — so good that you feel like Genghis <reading>Khan</reading> (かん)! With this canine lovingly slobbering on your heart, you feel like you could go out and conquer the world!","scene_hook":"When a canine puts its mouth on your heart, it's a pretty unforgettable feeling."}]},{"word":"聞こえる","reading":"きこえる","meaning":"To Be Hearable","frequency_in_section":19,"kanji":[{"character":"聞","meaning":"Hear","reading":"ぶん","meaning_mnemonic":"If you go up to a <radical>gate</radical> and press your <radical>ear</radical> to it, you'll <kanji>hear</kanji> what's going on on the other side. The people on the other side will have no idea you can hear their conversation.","reading_mnemonic":"From the other side of the gate, you <kanji>hear</kanji> one of the people start to play a song on a recorder. You recognize the song as \"Hot Cross <reading>Bun</reading>s (ぶん).\" You haven't heard this song since grade school. \"Hot cross buns, hot cross buns~\"","scene_hook":"If you go up to a gate and press your ear to it, you'll hear what's going on on the other side."}]},{"word":"逃げる","reading":"にげる","meaning":"To Escape","frequency_in_section":19,"kanji":[{"character":"逃","meaning":"Escape","reading":"とう","meaning_mnemonic":"You use your <radical>scooter</radical> when the <radical>omen</radical> comes so that you can <kanji>escape</kanji>.","reading_mnemonic":"You decide to <kanji>escape</kanji> this omen by weaving in and out of the busy streets of <reading>とう</reading>きょう. By now, you know とうきょう like the back of your hand, so you're sure you can escape this way.","scene_hook":"You use your scooter when the omen comes so that you can escape."}]},{"word":"情報","reading":"じょうほう","meaning":"Information","frequency_in_section":19,"kanji":[{"character":"情","meaning":"Feeling","reading":"じょう","meaning_mnemonic":"Your <radical>soul</radical> is <radical>blue</radical>. As in, it's sad and not feeling well. This is because your soul changes colors depending on your <kanji>feeling</kanji>s or what <kanji>emotion</kanji>s you're expressing.","reading_mnemonic":"Why is your soul <kanji>feeling</kanji> blue? Because <reading>Joe</reading> (じょう), the big local farmhand, was extremely mean to you. ","scene_hook":"Your soul is blue."},{"character":"報","meaning":"News","reading":"ほう","meaning_mnemonic":"You want to share <radical>happiness</radical> with people so you <radical>stamp</radical> <radical>stool</radical>s with the <kanji>news</kanji>. Now when people want a <kanji>report</kanji> of all the happy things going on, they can just look down before they sit.","reading_mnemonic":"You research and <kanji>report</kanji> the <kanji>news</kanji> from <reading>ho</reading>me (ほう). Only after, once all of the news is stamped onto the stools, do you leave your home.","scene_hook":"You want to share happiness with people so you stamp stools with the news."}]},{"word":"気づく","reading":"きづい","meaning":"to notice","frequency_in_section":19,"kanji":[{"character":"気","meaning":"Energy","reading":"き","meaning_mnemonic":"These days <radical>energy</radical> is the greatest <radical>treasure</radical>. Not gold, money, or anything like that. Imagine finding some in a literal treasure chest. As soon as you open it, out bursts the <kanji>energy</kanji> in a kind of <kanji>spirit</kanji> ball.","reading_mnemonic":"As you reach inside the <kanji>energy</kanji> <kanji>spirit</kanji> ball, you feel something hard inside. It's a large <reading>key</reading> (き) that gives you access to another treasure.","scene_hook":"These days energy is the greatest treasure."}]},{"word":"変わる","reading":"かわら","meaning":"To Be Changed","frequency_in_section":19,"kanji":[{"character":"変","meaning":"Change","reading":"へん","meaning_mnemonic":"<radical>Again</radical> and again, <radical>winter</radical> <kanji>change</kanji>s you each year. ","reading_mnemonic":"You know what else <kanji>change</kanji>s each winter? <reading>Hen</reading>s (へん)! They're constantly laying eggs, which then (possibly) turn into new hens.","scene_hook":"Again and again, winter changes you each year."}]},{"word":"言葉","reading":"ことば","meaning":"Word","frequency_in_section":19,"kanji":[{"character":"言","meaning":"Say","reading":"げん","meaning_mnemonic":"The <radical>say</radical> radical and the <kanji>say</kanji> kanji are the same!","reading_mnemonic":"If you aren't sure what to <kanji>say</kanji>, just think about <reading>Gen</reading>ji (げん) and ask yourself, \"What would Genji say?\"","scene_hook":"The say radical and the say kanji are the same!"},{"character":"葉","meaning":"Leaf","reading":"は","meaning_mnemonic":"All the <radical>flowers</radical> in the <radical>world</radical> of <radical>tree</radical>s owe their existence to the humble <kanji>leaf</kanji>. That's because leaves are how trees, and therefore flowers, get their nutrients from the sun.","reading_mnemonic":"Picture a little flower working really hard to grow its first leaf. The <kanji>leaf</kanji> pops out and it shouts, \"<reading>Hah</reading> (は)!”","scene_hook":"All the flowers in the world of trees owe their existence to the humble leaf."}]},{"word":"令嬢","reading":"れいじょう","meaning":"(your) daughter","frequency_in_section":19,"kanji":[{"character":"令","meaning":"Orders","reading":"れい","meaning_mnemonic":"If you know the radical meaning <radical>orders</radical> you know the kanji meaning <kanji>orders</kanji> as well!","reading_mnemonic":"Your <kanji>orders</kanji> are to get a <reading>ray</reading> (れい) gun.","scene_hook":"If you know the radical meaning orders you know the kanji meaning orders as well!"},{"character":"嬢","meaning":"Miss","reading":"じょう","meaning_mnemonic":"A <radical>woman</radical> who is a <radical>nurse</radical> should be called <kanji>miss</kanji>.","reading_mnemonic":"\"Call me <kanji>Miss</kanji> <reading>Joe</reading> (じょう),\" Joe says to you.","scene_hook":"A woman who is a nurse should be called miss."}]},{"word":"巨大","reading":"きょだい","meaning":"Huge","frequency_in_section":18,"kanji":[{"character":"巨","meaning":"Giant","reading":"きょ","meaning_mnemonic":"The <radical>giant</radical> radical and the <kanji>giant</kanji> kanji are exactly the same! Massive!","reading_mnemonic":"Just recently, a <kanji>giant</kanji> rampaged through Little <reading>Kyo</reading>to (きょ), so now it's even smaller than before. Poor Little Kyoto.","scene_hook":"The giant radical and the giant kanji are exactly the same!"},{"character":"大","meaning":"Big","reading":"たい","meaning_mnemonic":"The <radical>big</radical> radical and the <kanji>big</kanji> kanji are exactly the same!","reading_mnemonic":"There's this big guy (that's how you remember the radical, remember?), and he's wearing a huge <reading>Tie Dye</reading> (たい, だい) shirt. Because he's so huge, the tie dye shirt is also super huge. Everything about him is pretty big, but the tie dye stands out more than anything.","scene_hook":"The big radical and the big kanji are exactly the same!"}]},{"word":"付く","reading":"つけ","meaning":"To Be Attached","frequency_in_section":18,"kanji":[{"character":"付","meaning":"Attach","reading":"つ","meaning_mnemonic":"When you take your <radical>leader</radical>'s <radical>measurement</radical>s, you realize they're too short, so you <kanji>attach</kanji> things to them to make the measurements more impressive. Attach some heels to the shoes, then attach another head on top of theirs. There — perfect measurements thanks to these attachments.","reading_mnemonic":"You have to remember the kun'yomi reading of this kanji, and the part you need to remember is つ. So, think of how you would <kanji>attach</kanji> something to something else. What would you need? You'd need <reading>two</reading> (つ) things to put together!","scene_hook":"When you take your leader's measurements, you realize they're too short, so you attach things to them to make the measurements more impressive."}]},{"word":"失敗","reading":"しっぱい","meaning":"Failure","frequency_in_section":18,"kanji":[{"character":"失","meaning":"Fault","reading":"しつ","meaning_mnemonic":"That <radical>slide</radical> is your <radical>husband</radical>'s only <kanji>fault</kanji>. He loves that slide, more than you, and it's the only thing you don't like about him.","reading_mnemonic":"You try to come up with another <kanji>fault</kanji> of his so you can complain, when you see a tiny <reading>shih tzu</reading> (しつ) trotting by. Oh no! Before you can call out, your husband has fallen off the slide and crushed the poor thing. You hear a sharp yelp and then nothing.","scene_hook":"That slide is your husband's only fault."},{"character":"敗","meaning":"Failure","reading":"はい","meaning_mnemonic":"A <radical>shellfish</radical> that can't live through <radical>winter</radical> is a <kanji>failure</kanji>. Any proper shellfish would survive through the winter, so this is quite an embarrassing <kanji>defeat</kanji>.","reading_mnemonic":"The best way to avoid <kanji>failure</kanji> is to say a little <reading>hai</reading>ku (はい) to distract you from the cold. In fact, this can work in any situation where you're afraid of defeat. Say a haiku aloud, it will calm your nerves and warm you from the inside.","scene_hook":"A shellfish that can't live through winter is a failure."}]},{"word":"お腹","reading":"おなか","meaning":"Belly","frequency_in_section":17,"kanji":[{"character":"腹","meaning":"Belly","reading":"ふく","meaning_mnemonic":"Inside this <radical>moon</radical> is a <radical>black hole</radical>... haha just kidding, it's your <kanji>belly</kanji>! It's beautiful and round like the moon and it eats up everything you give it like a black hole. What a good <kanji>stomach</kanji> you have!","reading_mnemonic":"If you don't treat your <kanji>belly</kanji> with respect, when you look down at it, it'll yell, \"<reading>F**k</reading> (ふく) you!\" Whoa, looks like someone's got an <em>upset</em> stomach.","scene_hook":"Inside this moon is a black hole..."}]},{"word":"意味","reading":"いみ","meaning":"Meaning","frequency_in_section":17,"kanji":[{"character":"意","meaning":"Idea","reading":"い","meaning_mnemonic":"The <radical>sound</radical> of your <radical>heart</radical> gives me an <kanji>idea</kanji>. The methodic thump thump thumping of a heart puts me in a trance that gives me great ideas. It’s a very inspirational sound, the sound of a heart is. It gives me an idea. \n\nAlternatively, you could look at this kanji and see a \"stand\" radical and something that kind of (almost) looks like the kanji for \"think.\" When you stand up and think, you come up with your very own <kanji>idea</kanji>s!","reading_mnemonic":"The heart of an <reading>ea</reading>gle (い) is very strong. The person who knew this probably came up with the <kanji>idea</kanji> to make the bald eagle a symbol of the United States. Eagles are always flying around and doing things, so their hearts are very strong.","scene_hook":"The sound of your heart gives me an idea."},{"character":"味","meaning":"Flavor","reading":"み","meaning_mnemonic":"In your <radical>mouth</radical> there is a <radical>jet</radical> dropping <kanji>flavor</kanji> bombs. Every time you <kanji>taste</kanji> something, it's actually because a tiny jet has flown into your mouth to bomb you with flavor. ","reading_mnemonic":"And what has more <kanji>flavor</kanji> than a big slab of <reading>me</reading>at (み)? You love meat and its flavor nearly as much as you love the <kanji>taste</kanji> of its juice. So many good things to put in your mouth!","scene_hook":"In your mouth there is a jet dropping flavor bombs."}]},{"word":"本当に","reading":"ほんとうに","meaning":"Really","frequency_in_section":17,"kanji":[{"character":"本","meaning":"Book","reading":"ほん","meaning_mnemonic":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for <radical>book</radical> first! If you know the radical, you know this kanji means <kanji>book</kanji> as well.\n\nTake note that the second, third, and fourth meanings of this kanji are <kanji>origin</kanji>, <kanji>real</kanji>, and <kanji>main</kanji>. You can figure this out by thinking about how books mainly have their origins in real life.","reading_mnemonic":"<kanji>Book</kanji>s are one of the best ways to <reading>hone</reading> (ほん) your intellect, you know?","scene_hook":"The kanji and the radical are the same, so remembering the meaning of this kanji is as simple as making sure you know the radical for book first!"},{"character":"当","meaning":"Correct","reading":"とう","meaning_mnemonic":"What superhero is most like a <radical>triceratops</radical>? …If you said <radical>Wolverine</radical>, you're <kanji>correct</kanji>! Why is that the <kanji>right</kanji> answer? Because the triceratops has three horns, and Wolverine has three blades coming out of his hands. It's obvious, isn't it? But you knew that of course.","reading_mnemonic":"Because you got the answer <kanji>correct</kanji>, you win a free trip to <reading>とう</reading>きょう. Congrats!","scene_hook":"What superhero is most like a triceratops?"}]},{"word":"効果","reading":"こうか","meaning":"An Effect","frequency_in_section":17,"kanji":[{"character":"効","meaning":"Effective","reading":"こう","meaning_mnemonic":"If you <radical>mix</radical> different types of <radical>power</radical> you'll produce something <kanji>effective</kanji>.","reading_mnemonic":"The most <kanji>effective</kanji> mix of two powers is two <reading>こう</reading>いちs. Take one, mix it with another, and you have something with immeasurable power. You use it to attack that animal-like creature. It's super effective!","scene_hook":"If you mix different types of power you'll produce something effective."},{"character":"果","meaning":"Fruit","reading":"か","meaning_mnemonic":"The <radical>fruit</radical> radical and the <kanji>fruit</kanji> kanji are exactly the same! Bodacious!","reading_mnemonic":"They sell <kanji>fruit</kanji> at the store, and you need to drive your <reading>ca</reading>r (か) to get there. A car is the fastest way to fruit.","scene_hook":"The fruit radical and the fruit kanji are exactly the same!"}]},{"word":"使える","reading":"つかえる","meaning":null,"frequency_in_section":17,"kanji":[{"character":"使","meaning":"Use","reading":"し","meaning_mnemonic":"A good <radical>leader</radical> can put the <radical>ground</radical>'s <radical>history</radical> to great <kanji>use</kanji>. You are a good leader. You have studied the ground and dirt of the earth your entire life. You know the history of the ground and you know how to use it to lead your people.","reading_mnemonic":"You <kanji>use</kanji> the ground to raise <reading>shee</reading>p (し). When you were down there sniffing around you realized that your people will flourish best if you use this land for grazing and raising sheep. ","scene_hook":"A good leader can put the ground's history to great use."}]},{"word":"条件","reading":"じょうけん","meaning":"Condition","frequency_in_section":17,"kanji":[{"character":"条","meaning":"Clause","reading":"じょう","meaning_mnemonic":"A <radical>winter</radical> <radical>tree</radical> is only a winter tree due to a <kanji>clause</kanji> in its tree contract.","reading_mnemonic":"This <kanji>clause</kanji> was written into all trees' contracts by <reading>Joe</reading> (じょう), the large farmhand.","scene_hook":"A winter tree is only a winter tree due to a clause in its tree contract."},{"character":"件","meaning":"Matter","reading":"けん","meaning_mnemonic":"The <radical>leader</radical> of the <radical>cow</radical> tribe is too important to deal with small <kanji>matter</kanji>s and trivial <kanji>affair</kanji>s.","reading_mnemonic":"All of his <kanji>affair</kanji>s are taken care of by <reading>Ken</reading> (けん) the samurai, who he hired as his underling.","scene_hook":"The leader of the cow tribe is too important to deal with small matters and trivial affairs."}]},{"word":"回復","reading":"かいふく","meaning":"Recovery","frequency_in_section":17,"kanji":[{"character":"回","meaning":"Times","reading":"かい","meaning_mnemonic":"There's a <radical>mouth</radical> inside a <radical>mouth</radical>. But if you look even closer (not actually, but we're pretending), you can see another mouth inside that mouth... and another one inside of that one! It keeps going and going. Can you count the number of <kanji>times</kanji> there's a mouth inside a mouth? This kanji also means <kanji>revolve</kanji> too. Think of each \"time\" a thing happens, it loops back around and comes back to the beginning, revolving around again another time.","reading_mnemonic":"If you're having a hard time wrapping your head around the infinite number of <kanji>times</kanji> these mouths <kanji>revolve</kanji>, just picture yourself in a little <reading>kay</reading>ak (かい) going around and down through the mouths.","scene_hook":"There's a mouth inside a mouth."},{"character":"復","meaning":"Restore","reading":"ふく","meaning_mnemonic":"You <radical>loiter</radical> around a <radical>black hole</radical>, waiting for it to finish destroying and switch to <kanji>restore</kanji> mode. You were told all black holes finish eventually, and when they do you can press a button to restore everything back to the way it was.","reading_mnemonic":"Finally there's nothing else for the black hole to eat so you hit the <kanji>restore</kanji> button.... but nothing happens. \"Oh <reading>f**k</reading> (ふく) you!\" you scream as you realize you were lied to.","scene_hook":"You loiter around a black hole, waiting for it to finish destroying and switch to restore mode."}]},{"word":"存在","reading":"そんざい","meaning":"Existence","frequency_in_section":16,"kanji":[{"character":"存","meaning":"Exist","reading":"そん","meaning_mnemonic":"If a <radical>narwhal</radical> <radical>stick</radical>s a <radical>child</radical> with its horn then you have to admit that it <kanji>exist</kanji>s. We know some of you have been doubting narwhals and whether they're real. Well now your kid is a kabob, so do you believe they exist now? I <kanji>suppose</kanji> you do.","reading_mnemonic":"Oh, and the child we had to narwhal stab to prove they <kanji>exist</kanji> - that's your <reading>son</reading> (そん). Maybe you should have listened and kept your son out of the Narwhal Danger <reading>Zone</reading> (ぞん) after we warned you about it.","scene_hook":"If a narwhal sticks a child with its horn then you have to admit that it exists."},{"character":"在","meaning":"Exist","reading":"ざい","meaning_mnemonic":"A <radical>narwhal</radical> sticks a <radical>stick</radical> into the <radical>dirt</radical> to see what might <kanji>exist</kanji> underneath it. Narwhals live in the sea, you see. So they're convinced nothing can exist anywhere else.","reading_mnemonic":"The narwhal can't find anything but it can't stop thinking about what could <kanji>exist</kanji> outside of its world. It pulls out a <reading>xy</reading>lophone (ざい) and starts tapping the keys with its horn. It plays a sad song about the meaning of life and whether existence is worth it.","scene_hook":"A narwhal sticks a stick into the dirt to see what might exist underneath it."}]},{"word":"地球","reading":"ちきゅう","meaning":"The Earth","frequency_in_section":16,"kanji":[{"character":"地","meaning":"Earth","reading":"ち","meaning_mnemonic":"A <radical>dirt</radical> <radical>alligator</radical> lives in the <kanji>earth</kanji>, not the water. They can swim through the earth itself! Which is pretty scary.\n\nYou can think of this word as <kanji>ground</kanji> too, because that's kind of what earth is made of.","reading_mnemonic":"The only way to keep this dirt alligator from dragging you under the <kanji>earth</kanji> and eating you is to feed it <reading>chee</reading>se (ち). That way it won't lead you to a horrific death under the earth by dragging you under and spinning you around until you eat dirt (literally).","scene_hook":"A dirt alligator lives in the earth, not the water."},{"character":"球","meaning":"Sphere","reading":"きゅう","meaning_mnemonic":"The <radical>king</radical> <radical>request</radical>s a <kanji>sphere</kanji>!","reading_mnemonic":"The <kanji>sphere</kanji> is a <reading>cu</reading>cumber (きゅう) sphere. A strange sphere shaped cucumber.","scene_hook":"The king requests a sphere!"}]},{"word":"生まれる","reading":"うまれ","meaning":"To Be Born","frequency_in_section":16,"kanji":[{"character":"生","meaning":"Life","reading":"せい","meaning_mnemonic":"The <radical>life</radical> radical and the <kanji>life</kanji> kanji are the same, so hopefully you now just know them both.","reading_mnemonic":"You can save <kanji>life</kanji> or take it away with your new <reading>sa</reading>ber (せい). This is the saber you got from doing the correct thing (remember?), and now you need to figure out how to use it with this life. So what do you do?","scene_hook":"The life radical and the life kanji are the same, so hopefully you now just know them both."}]},{"word":"生きる","reading":"いき","meaning":"To Live","frequency_in_section":16,"kanji":[{"character":"生","meaning":"Life","reading":"せい","meaning_mnemonic":"The <radical>life</radical> radical and the <kanji>life</kanji> kanji are the same, so hopefully you now just know them both.","reading_mnemonic":"You can save <kanji>life</kanji> or take it away with your new <reading>sa</reading>ber (せい). This is the saber you got from doing the correct thing (remember?), and now you need to figure out how to use it with this life. So what do you do?","scene_hook":"The life radical and the life kanji are the same, so hopefully you now just know them both."}]},{"word":"子供","reading":"こども","meaning":"Child","frequency_in_section":16,"kanji":[{"character":"子","meaning":"Child","reading":"し","meaning_mnemonic":"The <radical>child</radical> radical and the <kanji>child</kanji> kanji are exactly the same.","reading_mnemonic":"The main reading here is し, so to remember it we'll use this mnemonic:\n\nThere is a <kanji>child</kanji> standing in front of you. You look closely at the child but something seems wrong. You rub your eyes and when you open them again, there is a <reading>shee</reading>p (し) in front of you. A sheep?! You yelp, blink again, and it's back to being a child. Are… are all children really just sheep? ","scene_hook":"The child radical and the child kanji are exactly the same."},{"character":"供","meaning":"Offer","reading":"きょう","meaning_mnemonic":"When a <radical>leader</radical> wants to work <radical>together</radical>, it means they want what you have to <kanji>offer</kanji>. Congrats! Now you can <kanji>accompany</kanji> them everywhere and offer them hot towels and bottled water, or whatever it is you do…","reading_mnemonic":"Once a year, the leader will <kanji>offer</kanji> you a vacation in <reading>きょう</reading>と. It's an all-expenses-paid trip! The catch is that you have to <kanji>accompany</kanji> your leader to きょうと…","scene_hook":"When a leader wants to work together, it means they want what you have to offer."}]},{"word":"高い","reading":"たかい","meaning":"Tall","frequency_in_section":16,"kanji":[{"character":"高","meaning":"Tall","reading":"こう","meaning_mnemonic":"There's a <radical>lid</radical> on your <radical>mouth</radical> and <radical>mustache</radical>, covering up all your talking holes. This is because you kept saying how <kanji>tall</kanji> and <kanji>expensive</kanji> you are.","reading_mnemonic":"\"I am <kanji>tall</kanji>er and more <kanji>expensive</kanji> than you.\" \n\nYou're saying this because there are some <reading>こう</reading>いちs in the room, and you want to make them feel inferior (you're a こういち hater). You keep comparing your height to the こういちs in the room, and you keep checking price tags. Then you tell them you're taller and more expensive than they are.","scene_hook":"There's a lid on your mouth and mustache, covering up all your talking holes."}]},{"word":"発見","reading":"はっけん","meaning":"Discovery","frequency_in_section":16,"kanji":[{"character":"発","meaning":"Departure","reading":"はつ","meaning_mnemonic":"Go to the <radical>tent</radical> and take the <radical>lantern</radical> from it, then we will be ready for <kanji>departure</kanji>. We can't leave the lantern inside of the tent; that's a fire hazard. We'd best take it with us before the departure. Don't you agree?","reading_mnemonic":"Oh! Don't forget your <reading>hats</reading> (はつ) either. Wouldn’t want to start a <kanji>departure</kanji> without hats or a lantern. That'd be a short journey.","scene_hook":"Go to the tent and take the lantern from it, then we will be ready for departure."},{"character":"見","meaning":"See","reading":"み","meaning_mnemonic":"The radical <radical>see</radical> and the kanji <kanji>see</kanji> are exactly the same!","reading_mnemonic":"You see something. It's walking towards you, but you need to see better. When the person comes close, you realize \"That person is <reading>me</reading> (み)!\"","scene_hook":"The radical see and the kanji see are exactly the same!"}]},{"word":"初めて","reading":"はじめて","meaning":"For The First Time","frequency_in_section":15,"kanji":[{"character":"初","meaning":"First","reading":"しょ","meaning_mnemonic":"You wear a special <radical>outfit</radical> and equip a <radical>sword</radical> whenever you do something for the <kanji>first</kanji> time. Doing something for the first time is always scary, but the right outfit and a sword at your side can give you the confidence and courage to overcome your jitters!","reading_mnemonic":"So, what is it you're doing for the <kanji>first</kanji> time? A fashion <reading>show</reading> (しょ). Your special outfit and sword aren't just to calm your nerves — they're also what you'll be showing off on the catwalk.","scene_hook":"You wear a special outfit and equip a sword whenever you do something for the first time."}]},{"word":"受ける","reading":"うけ","meaning":"To Receive Something","frequency_in_section":15,"kanji":[{"character":"受","meaning":"Accept","reading":"じゅ","meaning_mnemonic":"Someone throws a <radical>cleat</radical> at your <radical>forehead</radical> while you sit on a <radical>stool</radical>. You must <kanji>accept</kanji> this. Then another guy cleats you in the forehead, but you remain on the stool and <kanji>receive</kanji> it without complaint. This is some kind of acceptance ritual for the most prestigious Spanish soccer club in the world. If a cleat to the forehead doesn't knock you off the stool, you'll receive an offer to join.","reading_mnemonic":"After they <kanji>accept</kanji> you, they give you a small <reading>ju</reading>ice (じゅ) box. It's to help you recover from the trauma of getting kicked. And you <kanji>receive</kanji> the juice with grace.","scene_hook":"Someone throws a cleat at your forehead while you sit on a stool."}]},{"word":"食う","reading":"くう","meaning":"To Eat","frequency_in_section":15,"kanji":[{"character":"食","meaning":"Eat","reading":"しょく","meaning_mnemonic":"The radical for <radical>eat</radical> and the kanji for <kanji>eat</kanji> are the same! Lucky you.","reading_mnemonic":"Thank goodness, you finally get to <kanji>eat</kanji> your <kanji>meal</kanji>. You're so hungry. Someone has been starving you and now they've finally given you food. Unfortunately, though, every time you take a bite, you get a <reading>shock</reading> (しょく) from somewhere.","scene_hook":"The radical for eat and the kanji for eat are the same!"}]},{"word":"一つ","reading":"ひとつ","meaning":"One Thing","frequency_in_section":15,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live.","reading_mnemonic":"As you're sitting there next to <kanji>One</kanji>, holding him up, you start feeling a weird sensation all over your skin. From the wound comes a fine powder (obviously coming from the special bullet used to kill One) that causes the person it touches to get extremely <reading>itchy</reading> (いち).","scene_hook":"Lying on the ground is something that looks just like the ground, the number One."}]},{"word":"可能","reading":"かのう","meaning":"Possible","frequency_in_section":15,"kanji":[{"character":"可","meaning":"Possible","reading":"か","meaning_mnemonic":"With a <radical>lip ring</radical>, anything is <kanji>possible</kanji>. Having a lip ring grants you the power to conquer any obstacle, achieve any goal. As long as it's a <kanji>passable</kanji> lip ring, that is. If it isn't good enough, it isn't possible to be passable.","reading_mnemonic":"Since anything and everything is <kanji>possible</kanji> with your new <kanji>passable</kanji> lip ring, you use it to get a new <reading>ca</reading>r (か). You go to the car dealership and ask for a free (passable) car. The manager is impressed with your lip ring and gladly hands over the keys to the latest model of your favorite car. Not bad.","scene_hook":"With a lip ring, anything is possible."},{"character":"能","meaning":"Ability","reading":"のう","meaning_mnemonic":"In a <radical>private</radical> place on the
