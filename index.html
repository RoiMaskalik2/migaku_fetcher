<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語 · Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ede8;
  --surface:  #ffffff;
  --raised:   #f8f7f5;
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.16);
  --text:     #18160f;
  --dim:      #6b6456;
  --muted:    #aaa090;
  --accent:   #5a4fcf;
  --accent-l: rgba(90,79,207,0.10);
  --wk-r:     #0093dd;
  --wk-k:     #f0a000;
  --wk-v:     #9820c8;
  --wk-rd:    #555;
  --green:    #1a9e6a;
  --rr:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.header-sub {
  font-size: 0.8rem;
  color: var(--dim);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-all, .filter-pending {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-all.active, .filter-pending.active,
.filter-all:hover, .filter-pending:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--dim);
  white-space: nowrap;
}

/* ── Word list ────────────────────────────────────────────── */
.list {
  max-width: 800px;
  margin: 18px auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
.card.learned { opacity: 0.45; }
.card.hidden  { display: none; }

/* Collapsed row */
.card-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
}
.card-row:hover { background: rgba(0,0,0,0.015); }

.rank {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.row-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.word-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.55rem;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
  color: var(--text);
}

.row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.kanji-chips {
  display: flex;
  gap: 3px;
}
.kanji-chip {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-l);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

.freq {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--raised);
  padding: 3px 8px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.btn-learn {
  padding: 5px 13px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-learn:hover { opacity: 0.82; }
.btn-learn.done  { background: var(--green); }

.chevron {
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Expanded body ────────────────────────────────────────── */
.card-body {
  display: none;
  padding: 0 18px 20px;
  border-top: 1px solid var(--border);
}
.card.open .card-body { display: block; }

/* Word header */
.word-header {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.word-display {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.4rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}

.word-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-bottom: 3px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  width: 50px;
  flex-shrink: 0;
}

.meta-value {
  font-size: 0.95rem;
  color: var(--text);
}

.meta-value.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--dim);
}

/* Kanji section */
.kanji-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.kanji-entry {
  display: flex;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.kanji-entry:last-child { border-bottom: none; }

.kanji-glyph {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  width: 76px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2px;
}

.kanji-info { flex: 1; min-width: 0; }

.kanji-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.kanji-meaning {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.kanji-reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--dim);
}

/* Mnemonic blocks */
.mne-block { margin-top: 8px; }
.mne-block + .mne-block { margin-top: 12px; }

.mne-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.mne-text {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}

/* ── WaniKani tag colours ─────────────────────────────────── */
.t-r  { color: var(--wk-r); font-weight: 600; cursor: help;
        border-bottom: 1px dashed var(--wk-r); }
.t-k  { color: var(--wk-k); font-weight: 600; }
.t-v  { color: var(--wk-v); font-weight: 600; }
.t-rd { color: var(--wk-rd); font-weight: 600;
        background: rgba(0,0,0,0.055); padding: 0 3px; border-radius: 3px; }

/* ── Radical tooltip ─────────────────────────────────────── */
.tt {
  position: fixed;
  pointer-events: none;
  background: #1c1a14;
  color: #f0ede8;
  border-radius: 9px;
  padding: 9px 13px 8px;
  display: none;
  z-index: 999;
  text-align: center;
  min-width: 68px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}
.tt.vis { display: flex; flex-direction: column; align-items: center; }

.tt-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
  color: var(--wk-r);
}
.tt-char.none { font-size: 0.85rem; color: #888; font-style: italic; }
.tt-name { font-size: 0.72rem; color: #bbb; margin-top: 2px; text-transform: lowercase; }
.tt-desc { font-size: 0.68rem; color: #888; margin-top: 1px; max-width: 110px; line-height: 1.3; }

/* ── Mnemonic legend ─────────────────────────────────────── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--raised);
  border-radius: 7px;
  margin-bottom: 14px;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; }
.ld-r  { background: var(--wk-r); }
.ld-k  { background: var(--wk-k); }
.ld-v  { background: var(--wk-v); }
.ld-rd { background: var(--wk-rd); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">日本語</span>
    <span class="header-sub" id="hSub">loading...</span>
  </div>
  <div class="header-right">
    <button class="filter-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pending" onclick="setFilter('pending',this)">To Learn</button>
    <span class="progress-text" id="progTxt"></span>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Radical tooltip -->
<div class="tt" id="tt">
  <span class="tt-char" id="ttCh"></span>
  <span class="tt-name" id="ttNm"></span>
  <span class="tt-desc" id="ttDesc"></span>
</div>

<script>
const WORDS = [{"word":"熟練度","reading":"じゅくれんど","meaning":"deeply","frequency_in_section":127,"kanji":[{"character":"熟","meaning":"Ripen","reading":"じゅく","meaning_mnemonic":"If you <radical>receive</radical> something edible, arrange it in a <radical>circle</radical> and <radical>boil</radical> it. That way, it’ll <kanji>ripen</kanji> more quickly."},{"character":"練","meaning":"Practice","reading":"れん","meaning_mnemonic":"Pointing a <radical>thread</radical> to the <radical>east</radical> is what you <kanji>practice</kanji> every day. You're incredibly passionate about eastward thread-pointing, so you make sure to practice every day."},{"character":"度","meaning":"Degree","reading":"ど","meaning_mnemonic":"A <radical>yurt</radical>'s <radical>stool</radical> is always placed at certain <kanji>degree</kanji>s. The degrees change depending on specific <kanji>occurrence</kanji>s."}]},{"word":"操糸","reading":"みさおいと","meaning":null,"frequency_in_section":45,"kanji":[{"character":"操","meaning":null,"reading":null,"meaning_mnemonic":null},{"character":"糸","meaning":"Thread","reading":"いと","meaning_mnemonic":"The <radical>thread</radical> radical and <kanji>thread</kanji> are the same in looks as well as in meaning."}]},{"word":"合成","reading":"ごうせい","meaning":"composition","frequency_in_section":27,"kanji":[{"character":"合","meaning":null,"reading":null,"meaning_mnemonic":null},{"character":"成","meaning":"Become","reading":"せい","meaning_mnemonic":"When a <radical>drunkard</radical> holds a <radical>sword</radical> it <kanji>becomes</kanji> something else. The drunkard doesn't become a swordsman, they're still just a drunkard. But the sword in their hands does."}]},{"word":"平均","reading":"へいきん","meaning":"average","frequency_in_section":25,"kanji":[{"character":"平","meaning":"Flat","reading":"へい","meaning_mnemonic":"If you want to <radical>dry</radical> your <radical>horns</radical> you need to lay them <kanji>flat</kanji>. If they aren't flat they'll always be a little damp somewhere and you'll never have a moment's <kanji>peace</kanji>."},{"character":"均","meaning":"Equal","reading":"きん","meaning_mnemonic":"You have some <radical>dirt</radical> next to a <radical>pool</radical> that has an extra <radical>drop</radical> of water in it because you need them to be <kanji>equal</kanji>. If there's too much dirt outside the pool and not enough water inside, it's gonna look weird. We can't have that."}]},{"word":"一匹","reading":"いちひき","meaning":"one (small animal)","frequency_in_section":24,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live."},{"character":"匹","meaning":"Small Animal","reading":"ひき","meaning_mnemonic":"In the <radical>cage</radical> there are some <radical>legs</radical>. They are the legs attached to a <kanji>small animal</kanji>."}]},{"word":"突破","reading":"とっぱ","meaning":"breaking through","frequency_in_section":24,"kanji":[{"character":"突","meaning":"Stab","reading":"とつ","meaning_mnemonic":"How do you make a <radical>hole</radical> nice and <radical>big</radical>? You gotta <kanji>stab</kanji> something in it. Just <kanji>thrust</kanji> it right in there. And make sure your movements are really <kanji>sudden</kanji>. Stabs and thrusts are more effective when they're sudden."},{"character":"破","meaning":"Tear","reading":"は","meaning_mnemonic":"If you scrape a sharp <radical>stone</radical> against your <radical>skin</radical>, it will <kanji>tear</kanji>. The sharp stone tears your skin. It hurts!"}]},{"word":"勇者","reading":"ゆうしゃ","meaning":null,"frequency_in_section":21,"kanji":[{"character":"勇","meaning":"Courage","reading":"ゆう","meaning_mnemonic":"The radical for <radical>courage</radical> and the kanji for <kanji>courage</kanji> are exactly the same."},{"character":"者","meaning":"Someone","reading":"しゃ","meaning_mnemonic":"The radical and the kanji are exactly the same, so this means <kanji>someone</kanji>."}]},{"word":"三匹","reading":"さんひき","meaning":"The Three Little Pigs (fable)","frequency_in_section":21,"kanji":[{"character":"三","meaning":"Three","reading":"さん","meaning_mnemonic":"This kanji is made up of the ground radical (which also happens to be the kanji for \"one\") and the radical for two. Combine <radical>one</radical> and <radical>two</radical> together and what do you get? <kanji>Three</kanji>!"},{"character":"匹","meaning":"Small Animal","reading":"ひき","meaning_mnemonic":"In the <radical>cage</radical> there are some <radical>legs</radical>. They are the legs attached to a <kanji>small animal</kanji>."}]},{"word":"石化","reading":"いしか","meaning":"petrifaction","frequency_in_section":21,"kanji":[{"character":"石","meaning":"Stone","reading":"せき","meaning_mnemonic":"The <radical>stone</radical> radical and <kanji>stone</kanji> kanji are the same thing!"},{"character":"化","meaning":"Change","reading":"か","meaning_mnemonic":"A <radical>leader</radical> with a <radical>spoon</radical> is a powerful thing. Even something as ordinary as a spoon can create great <kanji>change</kanji> in the world when given to the right person."}]},{"word":"過食","reading":"かしょく","meaning":"overeating","frequency_in_section":21,"kanji":[{"character":"過","meaning":"Surpass","reading":"か","meaning_mnemonic":"While riding on your <radical>scooter</radical>, you grow a <radical>mustache</radical> on top of the <radical>mustache</radical> you already have in order to <kanji>surpass</kanji> the people around you. You're in a scooter race and your mustache is the only thing keeping you in the lead, but someone else has a mustache too! So you grow another mustache to surpass them once again!"},{"character":"食","meaning":"Eat","reading":"しょく","meaning_mnemonic":"The radical for <radical>eat</radical> and the kanji for <kanji>eat</kanji> are the same! Lucky you."}]},{"word":"令嬢","reading":"れいじょう","meaning":"(your) daughter","frequency_in_section":20,"kanji":[{"character":"令","meaning":"Orders","reading":"れい","meaning_mnemonic":"If you know the radical meaning <radical>orders</radical> you know the kanji meaning <kanji>orders</kanji> as well!"},{"character":"嬢","meaning":"Miss","reading":"じょう","meaning_mnemonic":"A <radical>woman</radical> who is a <radical>nurse</radical> should be called <kanji>miss</kanji>."}]},{"word":"外道","reading":"げどう","meaning":"tirthika","frequency_in_section":19,"kanji":[{"character":"外","meaning":"Outside","reading":"がい","meaning_mnemonic":"You're known to get the ailment <radical>evening</radical> <radical>toe</radical>, which is when your toe catches on fire after getting really, really hot (imagine this happening, ouch!). The only way to fix it is to cool your toe down, and the best way to do that is to go <kanji>outside</kanji>."},{"character":"道","meaning":"Road","reading":"どう","meaning_mnemonic":"Aim the <radical>scooter</radical>'s <radical>neck</radical> at the <kanji>road</kanji>! Scooters are only meant for driving on <kanji>street</kanji>s and <kanji>path</kanji>s, and if you go the wrong <kanji>way</kanji>, you'll probably break your own neck!"}]},{"word":"能力値","reading":"のうりょくち","meaning":"ability score (in role-playing games, etc.)","frequency_in_section":18,"kanji":[{"character":"能","meaning":"Ability","reading":"のう","meaning_mnemonic":"In a <radical>private</radical> place on the <radical>moon</radical>, you hide two <radical>spoon</radical>s that give you a special <kanji>ability</kanji>. It's the ability to predict the future! The private moon spoons reflect the knowledge of time and space into your brain. Now that's a cool ability!"},{"character":"力","meaning":"Power","reading":"りょく","meaning_mnemonic":"The radical and the meaning of this kanji are the same. Both are <kanji>power</kanji>."},{"character":"値","meaning":"Value","reading":"ち"," },{"character":"石","meaning":"Stone","reading":"せき","meaning_mnemonic":"The <radical>stone</radical> radical and <kanji>stone</kanji> kanji are the same thing!"}]},{"word":"人族","reading":"ひとぞく","meaning":null,"frequency_in_section":13,"kanji":[{"character":"人","meaning":"Person","reading":"にん","meaning_mnemonic":"Remember how the radical version of this kanji meant <radical>person</radical> because it looks like a person with their arms down and their legs spread out? Well this is a <kanji>person</kanji> too!"},{"character":"族","meaning":"Tribe","reading":"ぞく","meaning_mnemonic":"If someone is headed in your <radical>direction</radical> with a <radical>gun</radical>, nock an <radical>arrow</radical> in your bow and gather your <kanji>tribe</kanji> behind you because it’s about to get real! This man with a gun is headed your direction and he doesn’t even know what you and your tribe are gonna do to him. If he gets any closer, you’re likely to shoot that arrow right at him."}]},{"word":"軽減","reading":"けいげん","meaning":"abatement","frequency_in_section":13,"kanji":[{"character":"軽","meaning":null,"reading":null,"meaning_mnemonic":null},{"character":"減","meaning":null,"reading":null,"meaning_mnemonic":null}]},{"word":"予想通り","reading":"よそうどおり","meaning":"as expected","frequency_in_section":12,"kanji":[{"character":"予","meaning":"Beforehand","reading":"よ","meaning_mnemonic":"What does your <radical>mama</radical> tell you to do in the <radical>street</radical>? Look before you cross! You gotta do it <kanji>beforehand</kanji>, or it could be too late."},{"character":"想","meaning":"Imagine","reading":"そう","meaning_mnemonic":"Only a <radical>tree</radical> with <radical>eye</radical>s and a <radical>heart</radical> has the ability to <kanji>imagine</kanji> and to <kanji>contemplate</kanji>. For a tree to imagine and contemplate things, it needs eyes to see and a heart to feel."},{"character":"通","meaning":"Pass Through","reading":"つう","meaning_mnemonic":"There's a <radical>sc dirt as hard as you can. It looks like you're trying to <kanji>wave</kanji> at the ground now."},{"character":"向","meaning":"Yonder","reading":"こう","meaning_mnemonic":"A <radical>drop</radical> hits your <radical>mustache</radical>. Where did it come from? \"Ah, it came from <kanji>yonder</kanji>,\" you say, <kanji>facing</kanji> that way."}]},{"word":"難易度","reading":"なんいど","meaning":"degree of difficulty","frequency_in_section":6,"kanji":[{"character":"難","meaning":"Difficult","reading":"なん","meaning_mnemonic":"A <radical>Chinese</radical> <radical>turkey</radical> is <kanji>difficult</kanji> to find because they are so rare. Chinese turkeys are the rarest variety of turkey, so naturally, finding one is exceedingly difficult."},{"character":"易","meaning":"Easy","reading":"い","meaning_mnemonic":"The <radical>easy</radical> radical and the <kanji>easy</kanji> kanji are the same!"},{"character":"度","meaning":"Degree","reading":"ど","meaning_mnemonic":"A <radical>yurt</radical>'s <radical>stool</radical> is always placed at certain <kanji>degree</kanji>s. The degrees change depending on specific <kanji>occurrence</kanji>s."}]},{"word":"一個","reading":"いちこ","meaning":"one (thing)","frequency_in_section":6,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live."},{"character":"個","meaning":"Individual","reading":"こ","meaning_mnemonic":"The <radical>leader</radical>'s <radical>mouth</radical> has grown <radical>old</radical> from saying so many things. This is what makes them different from everyone else, they speak truly like an <kanji>individual</kanji>."}]},{"word":"一日","reading":"いちにち","meaning":"one day","frequency_in_section":6,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live."},{"character":"日","meaning":"Sun","reading":"にち","meaning_mnemonic":"The <radical>sun</radical> radical and <kanji>sun</kanji> kanji are the same, huzzah! Also, if you want to remember <kanji>day</kanji> as well, you can just think about how a day is the time it takes for the sun to cross the sky."}]},{"word":"調節","reading":"ちょうせつ","meaning":"regulation","frequency_in_section":6,"kanji":[{"character":"調","meaning":"Investigate","reading":"ちょう","meaning_mnemonic":"You <radical>say</radical> something about the <radical>circumference</radical> of this area. You've looked around this whole area, making a big circle around it, because you are trying to <kanji>investigate</kanji> something that happened here. You also say this thing in a really quiet <kanji>tone</kanji> of voice, because you don't want the person or thing you're investigating to know you're on to them."},{"character":"節","meaning":"Season","reading":"せつ","meaning_mnemonic":"On the bottom of <radical>bamboo</radical> <radical>root</radical>s, there’s a <radical>stamp</radical> that tells you the <kanji>season</kanji> in which it was cut.\n\nAdditionally, the stamp also has information on the condition of the bamboo’s <kanji>joint</kanji>s, because no one wants to buy bamboo with damaged joints! "}]},{"word":"絡まる","reading":"からまっ","meaning":"to be entwined","frequency_in_section":6,"kanji":[{"character":"絡","meaning":"Entangle","reading":"らく","meaning_mnemonic":"If you put a <radical>thread</radical> in the middle of a <radical>kiss</radical>, you’re going to <kanji>entangle</kanji> it. Things can get pretty messy in a kiss, so adding a thread to the mix will definitely entangle it."}]},{"word":"躱す","reading":"かわし","meaning":"to dodge nemonic":null},{"character":"穴","meaning":null,"reading":null,"meaning_mnemonic":null}]},{"word":"上空","reading":"じょうくう","meaning":"sky","frequency_in_section":6,"kanji":[{"character":"上","meaning":"Above","reading":"じょう","meaning_mnemonic":"You find a <radical>toe</radical> on the <radical>ground</radical>. It's weird, because it's <kanji>above</kanji> the ground, not where toes belong."},{"character":"空","meaning":null,"reading":null,"meaning_mnemonic":null}]},{"word":"二人目","reading":"ににんめ","meaning":"second person","frequency_in_section":5,"kanji":[{"character":"二","meaning":"Two","reading":"に","meaning_mnemonic":"The kanji <kanji>two</kanji> and the radical <radical>two</radical> are the exact same things. Therefore, you know the kanji for two already!"},{"character":"人","meaning":"Person","reading":"にん","meaning_mnemonic":"Remember how the radical version of this kanji meant <radical>person</radical> because it looks like a person with their arms down and their legs spread out? Well this is a <kanji>person</kanji> too!"},{"character":"目","meaning":"Eye","reading":"め","meaning_mnemonic":"The <radical>eye</radical> radical and <kanji>eye</kanji> kanji are the same as each other, so now you know them both."}]},{"word":"岡ちゃん","reading":"おかちゃん","meaning":"hill","frequency_in_section":5,"kanji":[{"character":"岡","meaning":"Hill","reading":"おか","meaning_mnemonic":"You have a scene going on inside your <radical>head</radical>. It is of a pair of <radical>horns</radical> on the <radical>ground</radical> atop a <radical>mountain</radical>. No. It is not just one pair of horns. It is many. So many that they create a giant <kanji>hill</kanji> atop the mountain, which is already pretty high."}]},{"word":"比較","reading":"ひかく","meaning":"comparison","frequency_in_section":5,"kanji":[{"character":"比","meaning":"Compare","reading":"ひ","meaning_mnemonic":"The <radical>compare</radical> radical and the <kanji>compare</kanji> kanji are exactly the same! Huzzah!"},{"character":"較","m // ── Mnemonic renderer ─────────────────────────────────────
function renderMne(text) {
  if (!text) return '<em style="color:var(--muted)">No mnemonic available.</em>';
  const d = document.createElement('div');
  d.innerHTML = text;
  const wrap = (tag, cls) =>
    d.querySelectorAll(tag).forEach(el => {
      const s = document.createElement('span');
      s.className = cls;
      if (cls === 't-r') s.dataset.radical = el.textContent.trim().toLowerCase();
      s.textContent = el.textContent;
      el.replaceWith(s);
    });
  wrap('radical','t-r'); wrap('kanji','t-k');
  wrap('vocabulary','t-v'); wrap('reading','t-rd');
  // Strip remaining unknown tags
  d.querySelectorAll(':not(span)').forEach(el => el.replaceWith(...el.childNodes));
  return d.innerHTML;
}

// ── Build card HTML ───────────────────────────────────────
function buildCard(w, i) {
  const kanji = w.kanji || [];
  const chips = kanji.map(k =>
    `<span class="kanji-chip">${k.character}</span>`
  ).join('');

  let kanjiHTML = '';
  if (kanji.length) {
    kanjiHTML = `
      <div class="legend">
        <div class="legend-item"><span class="legend-dot ld-r"></span>Radical</div>
        <div class="legend-item"><span class="legend-dot ld-k"></span>Kanji</div>
        <div class="legend-item"><span class="legend-dot ld-v"></span>Vocabulary</div>
        <div class="legend-item"><span class="legend-dot ld-rd"></span>Reading</div>
      </div>
      <div class="kanji-section">
    `;

    for (const k of kanji) {
      const mm = renderMne(k.meaning_mnemonic);

      kanjiHTML += `
        <div class="kanji-entry">
          <div class="kanji-glyph">${k.character}</div>
          <div class="kanji-info">
            <div class="kanji-head">
              <span class="kanji-meaning">${k.meaning ? escHtml(k.meaning) : '—'}</span>
              ${k.reading ? `<span class="kanji-reading">${escHtml(k.reading)}</span>` : ''}
            </div>
            <div class="mne-block">
              <div class="mne-label">Meaning mnemonic</div>
              <div class="mne-text">${mm}</div>
            </div>
          </div>
        </div>
      `;
    }
    kanjiHTML += '</div>';
  }

  return `
    <div class="card" id="c${i}" data-i="${i}">
      <div class="card-row" onclick="toggle(${i})">
        <span class="rank">${i+1}</span>
        <div class="row-main">
          <span class="word-jp">${w.word}</span>
        </div>
        <div class="row-right">
          <div class="kanji-chips">${chips}</div>
          <span class="freq">${w.frequency_in_section}×</span>
          <button class="btn-learn${learned.has(w.word)?` done`:''}"
                  onclick="toggleLearn(event,${i})">${learned.has(w.word)?'Learned':'Learn'}</button>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="word-header">
          <div class="word-display">${w.word}</div>
          <div class="word-meta">
            <div class="meta-row">
              <span class="meta-label">Reading</span>
              <span class="meta-value reading">${w.reading ? escHtml(w.reading) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Meaning</span>
              <span class="meta-value">${w.meaning ? escHtml(w.meaning) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Freq</span>
              <span class="meta-value">${w.frequency_in_section}× in text</span>
            </div>
          </div>
        </div>
        ${kanjiHTML}
      </div>
    </div>
  `;
}

// ── State ─────────────────────────────────────────────────
let learned  = new Set(JSON.parse(localStorage.getItem('kl-v3') || '[]'));
let curFilter = 'all';

function save() { localStorage.setItem('kl-v3', JSON.stringify([...learned])); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toggle(i) {
  const card = document.getElementById('c'+i);
  card.classList.toggle('open');
}

function toggleLearn(ev, i) {
  ev.stopPropagation();
  const w   = WORDS[i];
  const btn = ev.currentTarget;
  if (learned.has(w.word)) {
    learned.delete(w.word);
    btn.textContent = 'Learn'; btn.classList.remove('done');
    document.getElementById('c'+i).classList.remove('learned');
  } else {
    learned.add(w.word);
    btn.textContent = 'Learned'; btn.classList.add('done');
    document.getElementById('c'+i).classList.add('learned');
  }
  save();
  updateProgress();
  if (curFilter === 'pending') applyFilter();
}

function updateProgress() {
  const done  = WORDS.filter(w => learned.has(w.word)).length;
  const total = WORDS.length;
  document.getElementById('progTxt').textContent = `${done} / ${total} learned`;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-all,.filter-pending').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  WORDS.forEach((w, i) => {
    const card = document.getElementById('c'+i);
    if (curFilter === 'pending') {
      card.classList.toggle('hidden', learned.has(w.word));
    } else {
      card.classList.remove('hidden');
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttCh  = document.getElementById('ttCh');
const ttNm  = document.getElementById('ttNm');
const ttDesc= document.getElementById('ttDesc');
let ttOn = false;

function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const w = tt.offsetWidth  || 90;
  const h = tt.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 14, vw - w - 6) + 'px';
  tt.style.top  = Math.max(y - h - 10, 6) + 'px';
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('.t-r'); if (!t) return;
  const name = t.dataset.radical || '';
  const char = RC[name] ?? null;
  const desc = RDESC[name] ?? null;

  if (char) {
    ttCh.textContent = char;
    ttCh.className   = 'tt-char';
    ttDesc.textContent = '';
  } else {
    ttCh.textContent = '？';
    ttCh.className   = 'tt-char none';
    ttDesc.textContent = desc || 'WK custom radical (no Unicode equivalent)';
  }
  ttNm.textContent = name;
  moveTT(e);
  tt.classList.add('vis');
  ttOn = true;
});

document.addEventListener('mousemove', e => {
  if (ttOn && e.target.closest('.t-r')) moveTT(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.t-r')) return;
  const rel = e.relatedTarget;
  if (rel && rel.closest('.t-r')) return;
  tt.classList.remove('vis');
  ttOn = false;
});

// ── Init ──────────────────────────────────────────────────
(function() {
  const list = document.getElementById('list');
  list.innerHTML = WORDS.map((w,i) => buildCard(w,i)).join('');

  const done  = WORDS.filter(w => learned.has(w.word)).length;
  WORDS.forEach((w,i) => {
    if (learned.has(w.word)) document.getElementById('c'+i).classList.add('learned');
  });

  document.getElementById('hSub').textContent = `${WORDS.length} words · sorted by frequency`;
  updateProgress();
})();
</script>
</body>
