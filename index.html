<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本語 Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ede8;
  --surface:  #ffffff;
  --raised:   #f8f7f5;
  --border:   rgba(0,0,0,0.09);
  --border2:  rgba(0,0,0,0.16);
  --text:     #18160f;
  --dim:      #6b6456;
  --muted:    #aaa090;
  --accent:   #5a4fcf;
  --accent-l: rgba(90,79,207,0.10);
  --wk-r:     #0093dd;
  --wk-k:     #f0a000;
  --wk-v:     #9820c8;
  --wk-rd:    #555;
  --green:    #1a9e6a;
  --rr:       10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}

.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 900;
  letter-spacing: -0.01em;
}

.header-sub {
  font-size: 0.8rem;
  color: var(--dim);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-all, .filter-pending {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-all.active, .filter-pending.active,
.filter-all:hover, .filter-pending:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--dim);
  white-space: nowrap;
}

/* ── Word list ────────────────────────────────────────────── */
.list {
  max-width: 800px;
  margin: 18px auto;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* ── Card ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--rr);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
.card.learned { opacity: 0.45; }
.card.hidden  { display: none; }

/* Collapsed row */
.card-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
  user-select: none;
  -webkit-user-select: none;
}
.card-row:hover { background: rgba(0,0,0,0.015); }

.rank {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.row-main {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.word-jp {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.55rem;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
  color: var(--text);
}

.row-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.kanji-chips {
  display: flex;
  gap: 3px;
}
.kanji-chip {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-l);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

.freq {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--raised);
  padding: 3px 8px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.btn-learn {
  padding: 5px 13px;
  border-radius: 6px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-learn:hover { opacity: 0.82; }
.btn-learn.done  { background: var(--green); }

.chevron {
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Expanded body ────────────────────────────────────────── */
.card-body {
  display: none;
  padding: 0 18px 20px;
  border-top: 1px solid var(--border);
}
.card.open .card-body { display: block; }

/* Word header */
.word-header {
  display: flex;
  align-items: flex-end;
  gap: 18px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.word-display {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.4rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
}

.word-meta {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-bottom: 3px;
}

.meta-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.meta-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  width: 50px;
  flex-shrink: 0;
}

.meta-value {
  font-size: 0.95rem;
  color: var(--text);
}

.meta-value.reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 1rem;
  color: var(--dim);
}

/* Kanji section */
.kanji-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.kanji-entry {
  display: flex;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.kanji-entry:last-child { border-bottom: none; }

.kanji-glyph {
  font-family: 'Noto Serif JP', serif;
  font-size: 3.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  width: 76px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 2px;
}

.kanji-info { flex: 1; min-width: 0; }

.kanji-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.kanji-meaning {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.kanji-reading {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  color: var(--dim);
}

/* Mnemonic blocks */
.mne-block { margin-top: 8px; }
.mne-block + .mne-block { margin-top: 12px; }

.mne-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 5px;
}

.mne-text {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}

/* ── WaniKani tag colours ─────────────────────────────────── */
.t-r  { color: var(--wk-r); font-weight: 600; cursor: help;
        border-bottom: 1px dashed var(--wk-r); }
.t-k  { color: var(--wk-k); font-weight: 600; }
.t-v  { color: var(--wk-v); font-weight: 600; }
.t-rd { color: var(--wk-rd); font-weight: 600;
        background: rgba(0,0,0,0.055); padding: 0 3px; border-radius: 3px; }

/* ── Radical tooltip ─────────────────────────────────────── */
.tt {
  position: fixed;
  pointer-events: none;
  background: #1c1a14;
  color: #f0ede8;
  border-radius: 9px;
  padding: 9px 13px 8px;
  display: none;
  z-index: 999;
  text-align: center;
  min-width: 68px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
}
.tt.vis { display: flex; flex-direction: column; align-items: center; }

.tt-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 2rem;
  font-weight: 900;
  line-height: 1;
  color: var(--wk-r);
}
.tt-char.none { font-size: 0.85rem; color: #888; font-style: italic; }
.tt-name { font-size: 0.72rem; color: #bbb; margin-top: 2px; text-transform: lowercase; }
.tt-desc { font-size: 0.68rem; color: #888; margin-top: 1px; max-width: 110px; line-height: 1.3; }

/* ── Mnemonic legend ─────────────────────────────────────── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--raised);
  border-radius: 7px;
  margin-bottom: 14px;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--dim); }
.legend-dot  { width: 9px; height: 9px; border-radius: 50%; }
.ld-r  { background: var(--wk-r); }
.ld-k  { background: var(--wk-k); }
.ld-v  { background: var(--wk-v); }
.ld-rd { background: var(--wk-rd); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">日本語</span>
    <span class="header-sub" id="hSub">loading...</span>
  </div>
  <div class="header-right">
    <button class="filter-all active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pending" onclick="setFilter('pending',this)">To Learn</button>
    <span class="progress-text" id="progTxt"></span>
  </div>
</div>

<div class="list" id="list"></div>

<!-- Radical tooltip -->
<div class="tt" id="tt">
  <span class="tt-char" id="ttCh"></span>
  <span class="tt-name" id="ttNm"></span>
  <span class="tt-desc" id="ttDesc"></span>
</div>

<script>
const WORDS = [{"word":"熟練度","reading":"じゅくれんど","meaning":"deeply","frequency_in_section":56,"kanji":[{"character":"熟","meaning":"Ripen","reading":"じゅく","meaning_mnemonic":"If you <radical>receive</radical> something edible, arrange it in a <radical>circle</radical> and <radical>boil</radical> it. That way, it’ll <kanji>ripen</kanji> more quickly."},{"character":"練","meaning":"Practice","reading":"れん","meaning_mnemonic":"Pointing a <radical>thread</radical> to the <radical>east</radical> is what you <kanji>practice</kanji> every day. You're incredibly passionate about eastward thread-pointing, so you make sure to practice every day."},{"character":"度","meaning":"Degree","reading":"ど","meaning_mnemonic":"A <radical>yurt</radical>'s <radical>stool</radical> is always placed at certain <kanji>degree</kanji>s. The degrees change depending on specific <kanji>occurrence</kanji>s."}]},{"word":"迷宮","reading":"めいきゅう","meaning":null,"frequency_in_section":20,"kanji":[{"character":"迷","meaning":"Astray","reading":"めい","meaning_mnemonic":"If you're riding your <radical>scooter</radical> through some <radical>rice</radical>, it's likely you've gone <kanji>astray</kanji>. Also you might be <kanji>lost</kanji>."},{"character":"宮","meaning":"Shinto Shrine","reading":"みや","meaning_mnemonic":"It may just be a <radical>roof</radical> over a <radical>bathtub</radical>, but this here is actually a <kanji>Shinto shrine</kanji>."}]},{"word":"令嬢","reading":"れいじょう","meaning":null,"frequency_in_section":19,"kanji":[{"character":"令","meaning":"Orders","reading":"れい","meaning_mnemonic":"If you know the radical meaning <radical>orders</radical> you know the kanji meaning <kanji>orders</kanji> as well!"},{"character":"嬢","meaning":"Miss","reading":"じょう","meaning_mnemonic":"A <radical>woman</radical> who is a <radical>nurse</radical> should be called <kanji>miss</kanji>."}]},{"word":"石化","reading":"いしか","meaning":null,"frequency_in_section":17,"kanji":[{"character":"石","meaning":"Stone","reading":"せき","meaning_mnemonic":"The <radical>stone</radical> radical and <kanji>stone</kanji> kanji are the same thing!"},{"character":"化","meaning":"Change","reading":"か","meaning_mnemonic":"A <radical>leader</radical> with a <radical>spoon</radical> is a powerful thing. Even something as ordinary as a spoon can create great <kanji>change</kanji> in the world when given to the right person."}]},{"word":"通路","reading":"つうろ","meaning":"passage","frequency_in_section":14,"kanji":[{"character":"通","meaning":"Pass Through","reading":"つう","meaning_mnemonic":"There's a <radical>scooter</radical> with your <radical>mama</radical> carrying a <radical>task</radical> she needs to get done. You see her <kanji>pass through</kanji>, hurrying by to get that task done."},{"character":"路","meaning":"Road","reading":"ろ","meaning_mnemonic":"If you've been walking all day, your <radical>foot</radical> is the last thing anyone would want to <radical>kiss</radical>, especially after wandering barefoot down a <kanji>road</kanji>. Your feet are filthy, sweaty, and stinky. Nobody is going to want to kiss those feet."}]},{"word":"満たす","reading":"みたす","meaning":"to satisfy (conditions, one's appetite, etc.)","frequency_in_section":12,"kanji":[{"character":"満","meaning":"Full","reading":"まん","meaning_mnemonic":"If a <radical>tsunami</radical> hits these <radical>flowers</radical> they'll <radical>both</radical> become <kanji>full</kanji> of water. Tsunamis carry a lot of water, definitely enough to make both of these flowers full."}]},{"word":"一気に","reading":"いっきに","meaning":"In One Go","frequency_in_section":11,"kanji":[{"character":"一","meaning":"One","reading":"いち","meaning_mnemonic":"Lying on the <radical>ground</radical> is something that looks just like the ground, the number <kanji>One</kanji>. Why is this One lying down? It's been shot by the number two. It's lying there, bleeding out and dying. The number One doesn't have long to live."},{"character":"気","meaning":"Energy","reading":"き","meaning_mnemonic":"These days <radical>energy</radical> is the greatest <radical>treasure</radical>. Not gold, money, or anything like that. Imagine finding some in a literal treasure chest. As soon as you open it, out bursts the <kanji>energy</kanji> in a kind of <kanji>spirit</kanji> ball."}]},{"word":"漆原さん","reading":"うるしばらさん","meaning":"Yuki Urushibara","frequency_in_section":11,"kanji":[{"character":"漆","meaning":"Lacquer","reading":"しつ","meaning_mnemonic":"A <radical>tsunami</radical> hits a <radical>tree</radical> and your <radical>hat</radical> protects you from the <radical>water</radical>, but the hat itself is now covered in <kanji>lacquer</kanji>. You take it off and see that it's shiny and hard and protected."},{"character":"原","meaning":"Original","reading":"げん","meaning_mnemonic":"The <radical>original</radical> radical and the <kanji>original</kanji> kanji are the same!\n\nThis kanji can also mean <kanji>field</kanji>, probably because that's what everything originally looked like before humans: just a bunch of fields."}]},{"word":"脱皮","reading":"だっぴ","meaning":"ecdysis","frequency_in_section":11,"kanji":[{"character":"脱","meaning":"Undress","reading":"だつ","meaning_mnemonic":"The light of the <radical>moon</radical> is shining on a <radical>guard</radical> who’s been on duty all night. In fact, the moon light is making him so warm, he’s trying to <kanji>undress</kanji> and <kanji>escape</kanji>! Somebody stop him!"},{"character":"皮","meaning":"Skin","reading":"ひ","meaning_mnemonic":"You go down a <radical>slide</radical> made of <radical>branch</radical>es and your <kanji>skin</kanji> scrapes right off — ouch! Lucky for you, it was just your old outer layer of skin, and now you've got a fresh shiny layer. Yay for exfoliation! You're not sure what to do with this big, floppy layer of old skin, though…"}]},{"word":"外道","reading":"げどう","meaning":"tirthika","frequency_in_section":10,"kanji":[{"character":"外","meaning":"Outside","reading":"がい","meaning_mnemonic":"You're known to get the ailment <radical>evening</radical> <radical>toe</radical>, which is when your toe catches on fire after getting really, really hot (imagine this happening, ouch!). The only way to fix it is to cool your toe down, and the best way to do that is to go <kanji>outside</kanji>."},{"character":"道","meaning":"Road","reading":"どう","meaning_mnemonic":"Aim the <radical>scooter</radical>'s <radical>neck</radical> at the <kanji>road</kanji>! Scooters are only meant for driving on <kanji>street</kanji>s and <kanji>path</kanji>s, and if you go the wrong <kanji>way</kanji>, you'll probably break your own neck!"}]},{"word":"鑑定石","reading":"かんていせき","meaning":null,"frequency_in_section":10,"kanji":[{"character":"鑑","meaning":"Model","reading":"かん","meaning_mnemonic":"See that <radical>gold</radical> man <radical>oversee</radical>ing everyone? He's a <kanji>model</kanji> human. His goldenness is a sign of how exemplary he is, and he's overseeing all of us flawed, regular folks to try to help us get on his level."},{"character":"定","meaning":"Determine","reading":"てい","meaning_mnemonic":"You build a <radical>roof</radical> over your <radical>coat rack</radical> because you <kanji>determine</kanji> that this is the best way to protect your coats from the elements."},{"character":"石","meaning":"Stone","reading":"せき","meaning_mnemonic":"The <radical>stone</radical> radical and <kanji>stone</kanji> kanji are the same thing!"}]},{"word":"能力値","reading":"のうりょくち","meaning":"ability score (in role-playing games, etc.)","frequency_in_section":10,"kanji":[{"character":"能","meaning":"Ability","reading":"のう","meaning_mnemonic":"In a <radical>private</radical> place on the <radical>moon</radical>, you hide two <radical>spoon</radical>s that give you a special <kanji>ability</kanji>. It's the ability to predict the future! The private moon spoons reflect the knowledge of time and space into your brain. Now that's a cool ability!"},{"character":"力","meaning":"Power","reading":"りょく","meaning_mnemonic":"The radical and the meaning of this kanji are the same. Both are <kanji>power</kanji>."},{"character":"値","meaning":"Value","reading":"ち","meaning_mnemonic":"A great <radical>leader</radical> can look <radical>straight</radical> at something and know its <kanji>value</kanji>. That social media site? 44 billion dollars. That job position? 50k a year. A four-day work week? Um… sorry, no, there's no value there. See? Leaders can see straight to the heart of matters to grasp something's true value."}]},{"word":"上昇","reading":"じょうしょう","meaning":"rising","frequency_in_section":10,"kanji":[{"character":"上","meaning":"Above","reading":"じょう","meaning_mnemonic":"You find a <radical>toe</radical> on the <radical>ground</radical>. It's weird, because it's <kanji>above</kanji> the ground, not where toes belong."},{"character":"昇","meaning":"Ascend","reading":"しょう","meaning_mnemonic":"You want to go to the <radical>sun</radical> so you set up a <radical>slide</radical> <radical>twenty</radical> stories tall so you can <kanji>ascend</kanji> into the heavens."}]},{"word":"簡易","reading":"かんい","meaning":"Simple","frequency_in_section":10,"kanji":[{"character":"簡","meaning":"Simplicity","reading":"かん","meaning_mnemonic":"You line up stalks of <radical>bamboo</radical> with an equal <radical>interval</radical> between each one. This pattern creates a sense of <kanji>simplicity</kanji>. "},{"character":"易","meaning":"Easy","reading":"い","meaning_mnemonic":"The <radical>easy</radical> radical and the <kanji>easy</kanji> kanji are the same!"}]},{"word":"突破","reading":"とっぱ","meaning":"breaking through","frequency_in_section":9,"kanji":[{"character":"突","meaning":"Stab","reading":"とつ","meaning_mnemonic":"How do you make a <radical>hole</radical> nice and <radical>big</radical>? You gotta <kanji>stab</kanji> something in it. Just <kanji>thrust</kanji> it right in there. And make sure your movements are really <kanji>sudden</kanji>. Stabs and thrusts are more effective when they're sudden."},{"character":"破","meaning":"Tear","reading":"は","meaning_mnemonic":"If you scrape a sharp <radical>stone</radical> against your <radical>skin</radical>, it will <kanji>tear</kanji>. The sharp stone tears your skin. It hurts!"}]},{"word":"亀裂","reading":"きれつ","meaning":"crack","frequency_in_section":9,"kanji":[{"character":"亀","meaning":"Turtle","reading":"かめ","meaning_mnemonic":"The <radical>turtle</radical> radical and the <kanji>turtle</kanji> kanji are exactly the same! Nice!"},{"character":"裂","meaning":"Split","reading":"れつ","meaning_mnemonic":"When a <radical>yakuza</radical> takes a <radical>knife</radical> to <radical>clothes</radical>, it will of course cause a <kanji>split</kanji> or <kanji>tear</kanji>."}]},{"word":"探索","reading":"たんさく","meaning":"search","frequency_in_section":8,"kanji":[{"character":"探","meaning":"Look For","reading":"たん","meaning_mnemonic":"Put your <radical>fingers</radical> to your <radical>forehead</radical> and stand your <radical>legs</radical> high up in a <radical>tree</radical> if you want to <kanji>look for</kanji> something. After all, shielding your eyes and getting up high is the best way to look for something, isn’t it?"},{"character":"索","meaning":"Search","reading":"さく","meaning_mnemonic":"There is a <radical>cross</radical> in your <radical>forehead</radical> with a <radical>thread</radical> attached to it, forcing you to <kanji>search</kanji> where it leads. You’re not sure how the cross got stuck in your forehead, but you are interested in seeing where this piece of thread leads. The search is on."}]},{"word":"血縁","reading":"けつえん","meaning":"blood relationship","frequency_in_section":8,"kanji":[{"character":"血","meaning":"Blood","reading":"けつ","meaning_mnemonic":"The <radical>blood</radical> radical and <kanji>blood</kanji> are the same in looks as well as in meaning."},{"character":"縁","meaning":"Edge","reading":"えん","meaning_mnemonic":"A <radical>thread</radical> is all that's keepin   "flag":        "WK custom — rectangular cloth on a pole (if not 旗)",
  "wrap":        "WK custom — enclosing fold (Unicode: 勹)",
  "trash":       "WK custom — discarded-waste pile",
  "towel":       "WK custom — hanging cloth strip (Unicode: 巾)",
  "yurt":        "WK custom — round felt tent (Mongolian dwelling)",
  "triceratops": "WK custom — three-horned dinosaur",
  "both":        "WK custom — pair / two things together (Unicode: 双)",
  "surplus":     "WK custom — leftover / excess (Unicode: 余)",
  "interval":    "WK custom — gap between things (Unicode: 間)",
};

// ── Mnemonic renderer ─────────────────────────────────────
function renderMne(text) {
  if (!text) return '<em style="color:var(--muted)">No mnemonic available.</em>';
  const d = document.createElement('div');
  d.innerHTML = text;
  const wrap = (tag, cls) =>
    d.querySelectorAll(tag).forEach(el => {
      const s = document.createElement('span');
      s.className = cls;
      if (cls === 't-r') s.dataset.radical = el.textContent.trim().toLowerCase();
      s.textContent = el.textContent;
      el.replaceWith(s);
    });
  wrap('radical','t-r'); wrap('kanji','t-k');
  wrap('vocabulary','t-v'); wrap('reading','t-rd');
  // Strip remaining unknown tags
  d.querySelectorAll(':not(span)').forEach(el => el.replaceWith(...el.childNodes));
  return d.innerHTML;
}

// ── Build card HTML ───────────────────────────────────────
function buildCard(w, i) {
  const kanji = w.kanji || [];
  const chips = kanji.map(k =>
    `<span class="kanji-chip">${k.character}</span>`
  ).join('');

  let kanjiHTML = '';
  if (kanji.length) {
    kanjiHTML = `
      <div class="legend">
        <div class="legend-item"><span class="legend-dot ld-r"></span>Radical</div>
        <div class="legend-item"><span class="legend-dot ld-k"></span>Kanji</div>
        <div class="legend-item"><span class="legend-dot ld-v"></span>Vocabulary</div>
        <div class="legend-item"><span class="legend-dot ld-rd"></span>Reading</div>
      </div>
      <div class="kanji-section">
    `;

    for (const k of kanji) {
      const mm = renderMne(k.meaning_mnemonic);

      kanjiHTML += `
        <div class="kanji-entry">
          <div class="kanji-glyph">${k.character}</div>
          <div class="kanji-info">
            <div class="kanji-head">
              <span class="kanji-meaning">${k.meaning ? escHtml(k.meaning) : '—'}</span>
              ${k.reading ? `<span class="kanji-reading">${escHtml(k.reading)}</span>` : ''}
            </div>
            <div class="mne-block">
              <div class="mne-label">Meaning mnemonic</div>
              <div class="mne-text">${mm}</div>
            </div>
          </div>
        </div>
      `;
    }
    kanjiHTML += '</div>';
  }

  return `
    <div class="card" id="c${i}" data-i="${i}">
      <div class="card-row" onclick="toggle(${i})">
        <span class="rank">${i+1}</span>
        <div class="row-main">
          <span class="word-jp">${w.word}</span>
        </div>
        <div class="row-right">
          <div class="kanji-chips">${chips}</div>
          <span class="freq">${w.frequency_in_section}×</span>
          <button class="btn-learn${learned.has(w.word)?` done`:''}"
                  onclick="toggleLearn(event,${i})">${learned.has(w.word)?'Learned':'Learn'}</button>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
      <div class="card-body">
        <div class="word-header">
          <div class="word-display">${w.word}</div>
          <div class="word-meta">
            <div class="meta-row">
              <span class="meta-label">Reading</span>
              <span class="meta-value reading">${w.reading ? escHtml(w.reading) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Meaning</span>
              <span class="meta-value">${w.meaning ? escHtml(w.meaning) : '—'}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Freq</span>
              <span class="meta-value">${w.frequency_in_section}× in text</span>
            </div>
          </div>
        </div>
        ${kanjiHTML}
      </div>
    </div>
  `;
}

// ── State ─────────────────────────────────────────────────
let learned  = new Set(JSON.parse(localStorage.getItem('kl-v3') || '[]'));
let curFilter = 'all';

function save() { localStorage.setItem('kl-v3', JSON.stringify([...learned])); }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toggle(i) {
  const card = document.getElementById('c'+i);
  card.classList.toggle('open');
}

function toggleLearn(ev, i) {
  ev.stopPropagation();
  const w   = WORDS[i];
  const btn = ev.currentTarget;
  if (learned.has(w.word)) {
    learned.delete(w.word);
    btn.textContent = 'Learn'; btn.classList.remove('done');
    document.getElementById('c'+i).classList.remove('learned');
  } else {
    learned.add(w.word);
    btn.textContent = 'Learned'; btn.classList.add('done');
    document.getElementById('c'+i).classList.add('learned');
  }
  save();
  updateProgress();
  if (curFilter === 'pending') applyFilter();
}

function updateProgress() {
  const done  = WORDS.filter(w => learned.has(w.word)).length;
  const total = WORDS.length;
  document.getElementById('progTxt').textContent = `${done} / ${total} learned`;
}

function setFilter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-all,.filter-pending').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  WORDS.forEach((w, i) => {
    const card = document.getElementById('c'+i);
    if (curFilter === 'pending') {
      card.classList.toggle('hidden', learned.has(w.word));
    } else {
      card.classList.remove('hidden');
    }
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttCh  = document.getElementById('ttCh');
const ttNm  = document.getElementById('ttNm');
const ttDesc= document.getElementById('ttDesc');
let ttOn = false;

function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const w = tt.offsetWidth  || 90;
  const h = tt.offsetHeight || 80;
  const vw = window.innerWidth, vh = window.innerHeight;
  tt.style.left = Math.min(x + 14, vw - w - 6) + 'px';
  tt.style.top  = Math.max(y - h - 10, 6) + 'px';
}

document.addEventListener('mouseover', e => {
  const t = e.target.closest('.t-r'); if (!t) return;
  const name = t.dataset.radical || '';
  const char = RC[name] ?? null;
  const desc = RDESC[name] ?? null;

  if (char) {
    ttCh.textContent = char;
    ttCh.className   = 'tt-char';
    ttDesc.textContent = '';
  } else {
    ttCh.textContent = '？';
    ttCh.className   = 'tt-char none';
    ttDesc.textContent = desc || 'WK custom radical (no Unicode equivalent)';
  }
  ttNm.textContent = name;
  moveTT(e);
  tt.classList.add('vis');
  ttOn = true;
});

document.addEventListener('mousemove', e => {
  if (ttOn && e.target.closest('.t-r')) moveTT(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.t-r')) return;
  const rel = e.relatedTarget;
  if (rel && rel.closest('.t-r')) return;
  tt.classList.remove('vis');
  ttOn = false;
});

// ── Init ──────────────────────────────────────────────────
(function() {
  const list = document.getElementById('list');
  list.innerHTML = WORDS.map((w,i) => buildCard(w,i)).join('');

  const done  = WORDS.filter(w => learned.has(w.word)).length;
  WORDS.forEach((w,i) => {
    if (learned.has(w.word)) document.getElementById('c'+i).classList.add('learned');
  });

  document.getElementById('hSub').textContent = `${WORDS.length} words · sorted by frequency`;
  updateProgress();
})();
</script>
